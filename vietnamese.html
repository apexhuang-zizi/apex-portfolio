    if (_p.get('date') && _p.get('topic') && _p.get('content')) return;

<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#f0f4ff;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--text-muted:#64748b;--success:#10b981;--danger:#ef4444;--shadow:0 4px 24px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}

.btn{padding:8px 16px;border-radius:8px;border:none;font-size:.85rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-back{background:none;border:1px solid var(--border);color:var(--text-muted)}
.btn-back:hover{background:var(--bg)}
.btn-add{background:var(--primary);color:#fff}
.btn-add:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff;font-size:.75rem;padding:4px 10px}
.btn-download{background:#8b5cf6;color:#fff}
.btn-download:hover{background:#7c3aed}
.btn-play{background:#10b981;color:#fff}
.btn-play:hover{background:#059669}
.btn-play.playing{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.hero{padding:30px 24px 20px;text-align:center}
.hero h2{font-size:1.4rem;font-weight:600;margin-bottom:6px}
.hero p{color:var(--text-muted);font-size:.9rem}
.container{max-width:900px;margin:0 auto;padding:0 24px 40px}
.dialogue-list{display:flex;flex-direction:column;gap:12px}
.dialogue-item{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;transition:all .2s}
.dialogue-item:hover{box-shadow:0 6px 28px rgba(0,0,0,.12)}
.dialogue-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px}
.dialogue-header:hover{background:#f8fafc}
.dialogue-date{font-size:.8rem;color:var(--primary);font-weight:600;white-space:nowrap;background:#eff6ff;padding:4px 10px;border-radius:6px}
.dialogue-topic{font-size:1rem;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dialogue-arrow{color:var(--text-muted);font-size:1.2rem;transition:transform .3s}
.dialogue-item.open .dialogue-arrow{transform:rotate(90deg)}
.dialogue-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border)}
.dialogue-item.open .dialogue-body{display:block}
.dialogue-content{padding:16px 0;line-height:1.8;font-size:.9rem;white-space:pre-wrap;word-break:break-word}
.dialogue-content .cn-line{color:var(--text);margin-bottom:4px}
.dialogue-content .vn-line{color:var(--primary);font-style:italic;margin-bottom:12px}
.dialogue-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--border);margin-top:12px}
.add-form{display:none;background:var(--surface);border-radius:12px;box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.add-form.show{display:block}
.add-form h3{font-size:1rem;font-weight:600;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.9rem;resize:vertical}
.form-group textarea{min-height:200px}
.form-group textarea:focus,.form-group input:focus{outline:none;border-color:var(--primary)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* 筛选器样式 */
.filter-bar{background:linear-gradient(135deg,#eef2ff 0%,#f0fdf4 50%,#fefce8 100%);border-radius:12px;box-shadow:var(--shadow);padding:16px 20px;margin-bottom:16px;border:1px solid #e0e7ff}
.filter-bar .filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.filter-bar .filter-total{font-size:.9rem;color:var(--text-muted)}
.filter-bar .filter-total strong{color:var(--primary);font-size:1.1rem}
.filter-tags{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-tag{padding:6px 14px;border-radius:20px;border:1px solid #c7d2fe;background:#fff;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--text)}
.filter-tag:hover{border-color:var(--primary);color:var(--primary);background:#eff6ff}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{margin-bottom:12px}
.modal input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;margin-bottom:16px}
.modal input:focus{outline:none;border-color:var(--primary)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}

.auto-add-notice.show{display:block}
@media(max-width:600px){.dialogue-header{flex-wrap:wrap}.dialogue-date{font-size:.7rem}}
</style>

<script>
// Firebase 配置
const firebaseConfig = {

// 初始化 Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 匿名登录后再加载数据（用于 Firestore 安全规则）
auth.signInAnonymously().then(function() {
    console.log("Firebase 匿名登录成功");

// 预置对话数据（localStorage为空时使用）
var defaultDialogues = [
  {
    date: "2026-04-10",
    topic: "gọi đồ uống ở quán cà phê",
    content: "Bạn: Mình muốn một ly cà phê sữa đá, ít đường nhé. (我想要一杯冰牛奶咖啡，少糖。)\n\nNgười bán: Dạ được ạ. Bạn uống nóng hay lạnh ạ? (好的。您要热的还是冷的？)\n\nBạn: Lạnh luôn. Cho mình thêm một ít đá phin nha. (冷的。再加一点冰块吧。)\n\nNgười bán: Ok luôn! Bạn đợi một chút nha, có ngay ạ. (好的！您稍等，马上来。)",
    created: 1775830519260
  },
  {
    date: "2026-04-10",
    topic: "ở sân bay chuyển bị lên máy bay",
    content: "A, chào bạn, chuyến bay đi Hà Nội ở đâu vậy?\nB, dạ, quý khách đi quầy số 5 ạ. vé máy bay có sẫn(准备) chưa?\nA, rồi, đây là vé điện tử của tôi\nB, dạ, cảm ơn bạn, mời bạn để hành lý lên băng chuyền.(传送带)\nA, đươc rồi, bao nhiêu tiền phí hành lý?\nB, 15 kilogram miễn phí, hành lý của bạn 12 kilogram, không phí thêm ạ.\nA, tuyệt vời, cảm ơn bạn",
    created: 1775829772441
  },
  {
    date: "2026-04-10",
    topic: "gọi điện buổi sáng",
    content: "A, chào buổi sáng, hôm nay bạn có kế hoạch  gì không?\nB, hôm nay tôi phải đi họp lúc chín giớ sáng, sau đó ăn trưa với đồng nghiệp.\n\nA, ồ,bạn ăn trưa ở đâu vậy? gần công ty không?\nB, ăn ở quán cơm gần đây thôi, vừa ngon vừa rẻ, bạn có muốn đi cùng không?",
    created: 1775829169596
  }
];

var dialogues = [];
var deleteTarget = -1;
var currentFilter = 'all'; // 当前筛选分类
var dialogueCategories = {}; // 每条对话的分类缓存

// 分类关键词映射（越南语关键词 → 中文分类名）
var categoryKeywords = {
  '餐饮/购物': ['cà phê','ăn','uống','quán','mua','bán','giá','tiền','đồ ăn','thực đơn','đặt bàn','phục vụ','tính tiền','khách','đồ uống','bánh','cơm','phở','bún','nước','hóa đơn','thanh toán','trà','sữa','chua','ngọt','đắng','bánh mì','gọi món','nhà hàng','cafe','restaurant','coffee','shop','store','menu','bill','order'],
  '出行/交通': ['sân bay','máy bay','vé','chuyến bay','xe','taxi','bus','đi','đến','ga','khách sạn','phòng','đặt phòng','nơi ở','đường','phố','bản đồ','quê','về','lại','dắt xe','bãi đậu','xe máy','ô tô',' tàu','đò','cảng','bay','hành lý','vali','chuyến','check-in','passport','hộ chiếu'],
  '工作/职场': ['họp','công việc','làm','công ty','đồng nghiệp','sếp','lương','phòng ban','dự án','deadline','phỏng vấn','xin việc','cv','công','nhân viên','quản lý','giám đốc','tuyển','thử việc','ký hợp đồng','phúc lợi','tăng ca','nghỉ','phép','tháng','tuần','kế hoạch','báo cáo','tiến độ','kết quả','thành tích'],
  '社交/日常': ['chào','hẹn','bạn','bè','tự nhiên','thời tiết','nói chuyện','gặp','cuối tuần','phim','nhạc','xem','chơi','thể thao','bóng đá','gia đình','anh chị','em','ông bà','con cái','mẹ cha','bác','cậu','dì','chú','cô','sinh nhật','tiệc','đám cưới','kỷ niệm','cảm ơn','xin lỗi','tạm biệt','giúp','hỏi','trả lời'],
  '金融/银行': ['ngân hàng','tài khoản','thẻ','gửi','rút','chuyển','tiền','vay','trả góp','lãi suất','atm','pin','mật khẩu','sổ tiết kiệm','thanh toán','chuyển khoản','internet banking','phí','số dư','kim cương','bảo hiểm','đầu tư','cổ phiếu','hợp đồng','ủy quyền','khai báo'],
  '医疗/健康': ['bệnh viện','bác sĩ','khám','bệnh','thuốc','đau','sức khỏe','tiêm','phòng khám','xét nghiệm','cảm','sốt','xương','khớp','dị ứng','toàn thân','đơn thuốc','bảo hiểm y tế','kê đơn','chỉ định','nhịp tim','huyết áp','cấp cứu','kẹt xe','tai nạn'],
  '旅游/景点': ['du lịch','tham quan','di tích','chùa','đền','biển','đảo','núi','thác nước','cánh đồng','vườn','quốc gia','bảo tàng','photo','chụp ảnh','bưu thiếp','quà lưu niệm','hướng dẫn viên','tour','combo','vé tham quan','check-in','phong cảnh','cảnh đẹp']
};

// 空闲分类（未匹配到任何关键词的对话归入此类）
var uncategorizedLabel = '💬 其他';

// 为对话自动分类
function categorizeDialogue(d) {
  var topic = (d.topic || '').toLowerCase();
  var content = (d.content || '').toLowerCase();
  var text = topic + ' ' + content;
  
  var bestCat = '';
  var bestScore = 0;
  
  for (var cat in categoryKeywords) {
    var keywords = categoryKeywords[cat];
    var score = 0;
    for (var i = 0; i < keywords.length; i++) {
      if (text.indexOf(keywords[i]) !== -1) score++;
    }
    // 主题匹配权重更高（×3）
    for (var i = 0; i < keywords.length; i++) {
      if (topic.indexOf(keywords[i]) !== -1) score += 2; // 额外加2分
    }
    if (score > bestScore) {
      bestScore = score;
      bestCat = cat;
    }
  }
  
  return bestScore > 0 ? bestCat : uncategorizedLabel;
}

// 构建筛选器
function buildFilter() {
  if (!dialogues.length) {
    document.getElementById('filterBar').style.display = 'none';
    return;
  }
  
  document.getElementById('filterBar').style.display = 'block';
  document.getElementById('totalCount').textContent = dialogues.length;
  
  // 为所有对话分类
  var catCount = {};
  for (var i = 0; i < dialogues.length; i++) {
    var cat = categorizeDialogue(dialogues[i]);
    dialogueCategories[i] = cat;
    catCount[cat] = (catCount[cat] || 0) + 1;
  }
  
  // 固定分类（手动标签）
  var sourceCategories = ['VSL2']; // 可扩展：['VSL1', 'VSL2', '基础词汇', ...]
  
  // 统计手动分类（VSL2特殊逻辑：按标题筛选）
  var sourceCount = {};
  for (var i = 0; i < dialogues.length; i++) {
    // VSL2特殊逻辑：统计标题包含"VSL2"的对话
    if (dialogues[i].topic && dialogues[i].topic.includes('VSL2')) {
      sourceCount['VSL2'] = (sourceCount['VSL2'] || 0) + 1;
    }
    // 其他手动分类仍按source字段统计
    var src = dialogues[i].source || '';
    if (src && src !== 'VSL2') sourceCount[src] = (sourceCount[src] || 0) + 1;
  }
  
  // 生成标签：全部 + 手动分类(VSL2等) + 自动分类
  var html = '<span class="filter-tag active" onclick="filterBy(\'all\')">全部</span>';
  
  // 手动分类按钮（放在全部后面）
  for (var s = 0; s < sourceCategories.length; s++) {
    var srcCat = sourceCategories[s];
    var cnt = sourceCount[srcCat] || 0;
    html += '<span class="filter-tag" onclick="filterBySource(\'' + srcCat + '\')">' +
      escHtml(srcCat) + '<span class="tag-count">(' + cnt + ')</span></span>';
  }
  
  // 自动分类按钮
  var sortedCats = Object.keys(catCount).sort();
  for (var j = 0; j < sortedCats.length; j++) {
    var c = sortedCats[j];
    html += '<span class="filter-tag" onclick="filterBy(\'' + c.replace(/'/g, "\\'") + '\')">' +
      escHtml(c) + '<span class="tag-count">(' + catCount[c] + ')</span></span>';
  }
  document.getElementById('filterTags').innerHTML = html;
  
  // 重置筛选
  currentFilter = 'all';
  document.getElementById('filterInfo').style.display = 'none';
}

// 按 source 字段筛选（手动分类）
function filterBySource(source) {
  currentFilter = 'source:' + source;
  
  // 更新标签高亮
  var tags = document.querySelectorAll('.filter-tag');
  for (var t = 0; t < tags.length; t++) {
    tags[t].classList.remove('active');
    if (tags[t].textContent.startsWith(source)) {
      tags[t].classList.add('active');
    }
  }
  
  // 更新筛选信息
  var info = document.getElementById('filterInfo');
  var visibleCount = 0;
  for (var i = 0; i < dialogues.length; i++) {
    // VSL2特殊逻辑：按标题筛选（标题包含"VSL2"）
    if (source === 'VSL2') {
      if (dialogues[i].topic && dialogues[i].topic.includes('VSL2')) visibleCount++;
    } else {
      if (dialogues[i].source === source) visibleCount++;
    }
  }
  info.style.display = 'inline';
  document.getElementById('filterLabel').textContent = source + '（' + visibleCount + '篇）';
  
  // 显示/隐藏对话
  for (var i = 0; i < dialogues.length; i++) {
    var item = document.getElementById('item_' + i);
    if (!item) continue;
    // VSL2特殊逻辑：按标题筛选（标题包含"VSL2"）
    if (source === 'VSL2') {
      if (dialogues[i].topic && dialogues[i].topic.includes('VSL2')) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    } else {
      if (dialogues[i].source === source) {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    }
  }
}

// 按分类筛选
function filterBy(cat) {
  currentFilter = cat;
  
  // 更新标签高亮
  var tags = document.querySelectorAll('.filter-tag');
  for (var t = 0; t < tags.length; t++) {
    tags[t].classList.remove('active');
    if ((cat === 'all' && t === 0) || tags[t].textContent.startsWith(cat)) {
      tags[t].classList.add('active');
    }
  }
  
  // 更新筛选信息
  var info = document.getElementById('filterInfo');
  var visibleCount = 0;
  for (var i = 0; i < dialogues.length; i++) {
    if (cat === 'all' || dialogueCategories[i] === cat) visibleCount++;
  }
  if (cat === 'all') {
    info.style.display = 'none';
  } else {
    info.style.display = 'inline';
    document.getElementById('filterLabel').textContent = cat + '（' + visibleCount + '篇）';
  }
  
  // 显示/隐藏对话
  for (var i = 0; i < dialogues.length; i++) {
    var item = document.getElementById('item_' + i);
    if (!item) continue;
    if (cat === 'all' || dialogueCategories[i] === cat) {
      item.style.display = '';
    } else {
      item.style.display = 'none';
    }
  }
}

function getLocalDate() {
    var now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
}

function init() {
    document.getElementById('addDate').value = getLocalDate();
    
    // 数据加载在匿名登录完成后自动执行
    // loadFromFirebase() 已移到 auth.signInAnonymously().then() 中
    
    // 检查URL参数，自动添加对话
    checkUrlParams();
}

// 从 Firebase 加载数据
async function loadFromFirebase() {
    try {
        const snapshot = await db.collection('dialogues').orderBy('created', 'desc').get();
        if (snapshot.empty) {
            // Firebase 为空，检查 localStorage 是否有数据需要迁移
            var stored = localStorage.getItem('vnDialogues');
            if (stored) {
                try { 
                    dialogues = JSON.parse(stored); 
                    // 迁移到 Firebase（去重：只添加不存在于云端的数据）
                    var existingTopics = [];
                    for (var d of dialogues) {
                        if (d.topic && !existingTopics.includes(d.topic)) {
                            await db.collection('dialogues').add(d);
                            existingTopics.push(d.topic);
                        }
                    }
                    console.log('已将本地数据迁移到云端');
                } catch(e) { 
                    dialogues = []; 
                }
            } else {
                // 使用预置数据（添加到云端前先检查是否已存在）
                dialogues = defaultDialogues.slice();
                // 不再自动添加到云端，避免重复
                // 用户手动添加的对话才会保存到云端
                console.log('使用预置数据，共 ' + dialogues.length + ' 条对话');
            }
        } else {
            // 从 Firebase 加载数据
            dialogues = [];
            snapshot.forEach(doc => {
                dialogues.push({ id: doc.id, ...doc.data() });
            });
            // 同步到 localStorage 作为备份
            localStorage.setItem('vnDialogues', JSON.stringify(dialogues.map(d => {
                // 移除 id 字段（Firebase 特有）
                var copy = {};
                for (var k in d) if (k !== 'id') copy[k] = d[k];
                return copy;
            })));
        }
        renderList();
    } catch (e) {
        console.error('加载 Firebase 数据失败:', e);
        // 失败时从 localStorage 加载
        var stored = localStorage.getItem('vnDialogues');
        if (stored) {
            try { dialogues = JSON.parse(stored); } catch(e) { dialogues = []; }
        }
        renderList();
    }
}

function checkUrlParams() {
    var params = new URLSearchParams(window.location.search);
    var date = params.get('date');
    var topic = params.get('topic');
    var content = params.get('content');
    
    if (date && topic && content) {
        var decodedContent = decodeURIComponent(content);
        var exists = dialogues.some(function(d) { 
            return d.date === date && d.topic === topic; 
        });
        
        if (!exists) {
            var newDialogue = {
                date: date, 
                topic: decodeURIComponent(topic), 
                content: decodedContent, 
                created: Date.now(),
                _fromUrl: true
            };
            dialogues.push(newDialogue);
            dialogues.sort(function(a, b) { return b.date.localeCompare(a.date) || b.created - a.created; });
            localStorage.setItem('vnDialogues', JSON.stringify(dialogues));
            renderList();
            showAutoAddNotice('对话已添加，正在上传云端并翻译...');
            
            // 延迟等待 Firebase 初始化完成后保存到云端（含自动翻译）
            (function trySaveToCloud(retries) {
                if (typeof db !== 'undefined' && typeof saveToFirebase === 'function') {
                    saveToFirebase(newDialogue);
                } else if (retries > 0) {
                    setTimeout(function() { trySaveToCloud(retries - 1); }, 2000);
                } else {
                    showAutoAddNotice('云端保存超时，已保存到本地');
                }
            })(15);
        } else {
            showAutoAddNotice('今日对话已存在！');
        }
        
        window.history.replaceState({}, document.title, window.location.pathname);
    }
}

function showAutoAddNotice(text) {

}

function renderList() {
    // Sort dialogues by created/date descending (newest first)
    dialogues.sort(function(a, b) {
        var ta = a.created || a.date || 0;
        var tb = b.created || b.date || 0;
        // If created is number, compare directly
        if (typeof ta === 'number' && typeof tb === 'number') {
            return tb - ta; // descending (newest first)
        }
        // If date is string, compare as strings
        return String(tb).localeCompare(String(ta), 'zh-CN');
    });
    
    var list = document.getElementById('dialogueList');
    if (!dialogues.length) {
        list.innerHTML = '<div class="empty-state"><div class="icon">🗣️</div><p>暂无对话记录</p><p style="font-size:.8rem;margin-top:8px">点击「新增对话」添加内容</p></div>';
        buildFilter();
        return;
    }
    var html = '';
    for (var i = 0; i < dialogues.length; i++) {
        var d = dialogues[i];
        var cat = categorizeDialogue(d);
        dialogueCategories[i] = cat;
        html += '<div class="dialogue-item" id="item_' + i + '" data-cat="' + escHtml(cat) + '">' +
            '<div class="dialogue-header" onclick="toggleItem(' + i + ')">' +
            '<span class="dialogue-date">' + escHtml(d.date) + '</span>' +
            '<span class="dialogue-topic">' + escHtml(d.topic) + '</span>' +
            '<span class="dialogue-arrow">▶</span>' +
            '</div>' +
            '<div class="dialogue-body"><div class="dialogue-content" id="content_' + i + '">' + formatContent(d.content, i) + '</div>' +
            '<div class="dialogue-actions">' +
            '<button class="btn btn-play" onclick="playDialogue(' + i + ')">🔊 播放</button>' +
            '<button class="btn btn-danger" onclick="showDeleteModal(' + i + ')">删除</button>' +
            '</div></div></div>';
    }
    list.innerHTML = html;
    buildFilter();
}

function formatContent(content) {
    if (!content) return '';
    var lines = content.split('\n');
    var html = '';
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        html += '<div class="cn-line">' + escHtml(line) + '</div>';
    }
    return html;
}

function saveNew() {
    var date = document.getElementById('addDate').value;

    if (!date || !topic || !content) { alert('请填写完整信息'); return; }

    var processedContent = processNewContent(content);

// 保存到 Firebase
async function saveToFirebase(dialogue) {
    try {
        // 检查 Firebase 是否已存在相同日期+标题的对话（防止重复）
        var dupSnapshot = await db.collection('dialogues').where('date', '==', dialogue.date).where('topic', '==', dialogue.topic).get();
        if (!dupSnapshot.empty) {
            // 已存在，不重复添加，但仍触发翻译
            var existDoc = dupSnapshot.docs[0];
            dialogue.id = existDoc.id;
            showAutoAddNotice('该对话已存在于云端');
            translateAndSave(dialogue.id);
            return;
        }
        
        const docRef = await db.collection('dialogues').add(dialogue);
        dialogue.id = docRef.id;
        dialogues.unshift(dialogue);
        dialogues.sort(function(a, b) { return b.date.localeCompare(a.date) || b.created - a.created; });
        
        // URL 参数上传时不切换表单状态
        if (!dialogue._fromUrl) toggleAddForm();
        renderList();
        showAutoAddNotice('对话已保存到云端，正在翻译...');
        
        // 异步翻译
        translateAndSave(dialogue.id);
    } catch (e) {
        console.error('保存到 Firebase 失败:', e);
        alert('保存失败，请检查网络连接');
    }
}

// 处理新内容：自动添加 A/B 标签
function processNewContent(content) {
    var lines = content.split('\n').filter(function(l) { return l.trim(); });
    var result = [];
    var isA = true; // 第一句是 A
    
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        
        // 如果用户已经输入了 A: 或 B:，则保留
        if (line.match(/^[AB][:：]/i)) {
            result.push(line);
            isA = !isA;
            continue;
        }
        
        // 自动添加 A: 或 B:
        var prefix = isA ? 'A: ' : 'B: ';
        result.push(prefix + line);
        isA = !isA; // 交替
    }
    
    return result.join('\n');
}

// 异步翻译越南语到中文（保存后自动调用）
async function translateAndSave(dialogueId) {
    var d = dialogues.find(item => item.id === dialogueId);
    if (!d) return;
    
    var lines = d.content.split('\n');
    var translatedLines = [];
    var needsUpdate = false;
    
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        
        // 提取 A: 或 B: 前缀后面的内容
        var match = line.match(/^([AB][:：])\s*(.+)$/i);
        if (!match) {
            translatedLines.push(line);
            continue;
        }
        
        var prefix = match[1];
        var text = match[2];
        
        // 检测是否为越南语（包含越南语特殊字符）
        var isVn = /[ăâđêôơưàằầèềìòồờùừỳáắấéếíóốớúứýảẳẩẻểỉỏổởủửỷạặậẹệịọộợụựỵĐĂÂÊÔƠƯ]/i.test(text);
        
        // 如果是越南语，尝试翻译
        if (isVn) {
            try {
                var translated = await translateVietnamese(text);
                translatedLines.push(prefix + ' ' + text);
                translatedLines.push(prefix + ' ' + translated);
                needsUpdate = true;
            } catch (e) {
                translatedLines.push(prefix + ' ' + text);
            }
        } else {
            translatedLines.push(prefix + ' ' + text);
        }
    }
    
    // 如果有翻译，更新保存到 Firebase
    if (needsUpdate) {
        d.content = translatedLines.join('\n');
        
        // 更新到 Firebase
        if (d.id) {
            try {
                await db.collection('dialogues').doc(d.id).update({ content: d.content });
            } catch (e) {
                console.error('更新翻译失败:', e);
            }
        }
        
        renderList();
        showAutoAddNotice('翻译完成！');
    }
}

// 翻译越南语到中文（使用免费翻译服务）
async function translateVietnamese(text) {
    try {
        var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=vi&tl=zh-CN&dt=t&q=' + encodeURIComponent(text);
        var response = await fetch(url);
        var data = await response.json();
        if (data && data[0] && data[0][0] && data[0][0][0]) {
            return data[0][0][0];
        }
    } catch (e) {
        console.log('翻译失败:', e);
    }
    return text;
}

// TTS 语音播放功能
var speechSynthesis = window.speechSynthesis;
var currentUtterance = null;
var isPlaying = false;

// 收集并缓存越南语语音列表
// 手机→优先本地语音（支持pitch/rate，发音好）
// 电脑→优先在线语音（发音准，本地语音数据可能不完整会乱码）
var _viVoices = null;
function getVietnameseVoices() {
    if (_viVoices) return _viVoices;
    var all = speechSynthesis.getVoices();
    var viAll = all.filter(function(v) {
        return v.lang && (v.lang.startsWith('vi') || v.lang === 'vi');
    });
    var local = viAll.filter(function(v) { return v.localService; });
    var remote = viAll.filter(function(v) { return !v.localService; });
    var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    _viVoices = isMobile ? local.concat(remote) : remote.concat(local);
    return _viVoices;
}

// 从 voiceURI 和 name 中判断是否为女声/男声
function isFemaleVoice(v) {
    var s = (v.name + ' ' + (v.voiceURI || '')).toLowerCase();
    // 女声关键词
    if (/\bfemale\b/.test(s)) return true;
    if (/chi\b|linh\b|nguyen\b|hoai\b|minh(?!\s*(vu|nam|trung))/i.test(s)) return true;
    return false;
}
function isMaleVoice(v) {
    var s = (v.name + ' ' + (v.voiceURI || '')).toLowerCase();
    // 男声关键词
    if (/\bmale\b/.test(s)) return true;
    if (/\bdaniel\b|\ban\b|\bnam\b|\btrung\b|\bviet\b/i.test(s)) return true;
    return false;
}

// 获取越南语语音
// preferFemale=true → 优先女声；preferFemale=false → 优先男声
// avoidVoice → 排除的声音（确保 A/B 用不同声音）
function getVietnameseVoice(preferFemale, avoidVoice) {
    var viVoices = getVietnameseVoices();
    if (viVoices.length === 0) return null;
    if (viVoices.length === 1) return viVoices[0]; // 只有1个就没法区分了

    var candidates = [];
    if (preferFemale) {
        // A：优先女声
        candidates = viVoices.filter(function(v) { return isFemaleVoice(v) && v !== avoidVoice; });
        if (candidates.length === 0) {
            // 没有女声 → 找男声（排除当前用的）
            candidates = viVoices.filter(function(v) { return v !== avoidVoice; });
        }
    } else {
        // B：优先男声
        candidates = viVoices.filter(function(v) { return isMaleVoice(v) && v !== avoidVoice; });
        if (candidates.length === 0) {
            // 没有男声 → 找女声（排除当前用的）
            candidates = viVoices.filter(function(v) { return v !== avoidVoice; });
        }
    }
    if (candidates.length > 0) return candidates[0];

    // 最后防线：随便返回一个（不重复）
    var rest = viVoices.filter(function(v) { return v !== avoidVoice; });
    return rest.length > 0 ? rest[0] : viVoices[0];
}

// 调试：列出所有越南语语音（在浏览器控制台运行）
window.listViVoices = function() {
    var viVoices = getVietnameseVoices();
    console.log('越南语语音数量:', viVoices.length);
    viVoices.forEach(function(v) {
        var gender = isFemaleVoice(v) ? '♀女' : isMaleVoice(v) ? '♂男' : '?未知';
        var src = v.localService ? '📱本地' : '☁️在线';
        console.log(gender, src, v.name, '|', v.lang, '|', v.voiceURI);
    });
};

// 清理文本中的不可见字符和编码问题（TTS引擎会被这些字符干扰导致乱码）
function sanitizeForTTS(text) {
    return text
        // 去掉零宽空格、方向标记、BOM等不可见字符
        .replace(/[\u200B-\u200F\u2028-\u202F\u2060-\u206F\uFEFF]/g, '')
        // 不间断空格→普通空格
        .replace(/\u00A0/g, ' ')
        // Unicode NFC标准化（组合字符→预组合字符）
        .normalize('NFC')
        // 去掉其他不可打印字符
        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
        .trim();
}

// 仅解析越南语对话行，跳过 A:/B: 标签，跳过中文翻译
function parseVietnameseLines(content) {
    var lines = content.split('\n');
    var result = [];
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        
        // 去掉开头的 "A:" 或 "B:" 标签
        var clean = line.replace(/^[AB]:\s*/i, '').trim();
        if (!clean) continue;
        
        // 去掉括号内的中文翻译，只保留越南文
        var viOnly = clean.replace(/\([^)]+[\u4e00-\u9fff][^)]*\)/g, '').trim();
        if (!viOnly) viOnly = clean; // 如果全是中文翻译就用原文
        
        // 检测是否包含越南语特殊字符
        var isVi = /[ăâđêôơưàằầèềìòồờùừỳáắấéếíóốớúứýảẳẩẻểỉỏổởủửỷạặậẹệịọộợụựỵĐĂÂÊÔƠƯ]/i.test(viOnly);
        if (!isVi) continue; // 没有越南语，跳过
        
        // 清理不可见字符后再交给TTS
        viOnly = sanitizeForTTS(viOnly);
        if (!viOnly) continue;
        
        // 判断是 A 还是 B（奇数行为 A，偶数行为 B）
        // 遍历时只计入有越南文的行，所以用 result.length 判断
        var speaker = (result.length % 2 === 0) ? 'A' : 'B';
        
        result.push({ text: viOnly, speaker: speaker });
    }
    return result;
}

function playDialogue(idx) {
    var d = dialogues[idx];
    if (!d) return;
    if (event && event.target) var btn = event.target.closest('.btn-play');
    
    if (isPlaying) {
        speechSynthesis.cancel();
        isPlaying = false;
        document.querySelectorAll('.btn-play').forEach(function(b) {
            b.classList.remove('playing');
            b.textContent = '🔊 播放';
        });
        return;
    }
    
    btn.classList.add('playing');
    btn.textContent = '⏹ 停止';
    isPlaying = true;
    
    // 解析出纯越南语对话行（去掉 A:/B: 标签和中文翻译）
    var parsed = parseVietnameseLines(d.content);
    
    // 等待语音列表加载（Chrome 等浏览器需要延迟）
    var tryPlay = function() {
        var voices = speechSynthesis.getVoices();
        if (voices.length === 0) {
            // 语音未加载，再等一下
            setTimeout(tryPlay, 200);
            return;
        }
        playVietnameseLines(parsed, 0, btn, null);
    };
    tryPlay();
}

function playVietnameseLines(lines, index, btn, lastVoice) {
    if (index >= lines.length || !isPlaying) {
        isPlaying = false;
        btn.classList.remove('playing');
        btn.textContent = '🔊 播放';
        return;
    }
    
    var item = lines[index];
    var utterance = new SpeechSynthesisUtterance(item.text);
    
    // 选声音：优先选和上次不同的声音
    utterance.voice = getVietnameseVoice(item.speaker === 'A', lastVoice || null);
    
    // 用语音自身的lang，避免lang与voice不匹配导致乱码
    utterance.lang = utterance.voice ? utterance.voice.lang : 'vi-VN';
    
    // 判断是否本地语音（支持pitch），在线语音只能用rate区分
    var isLocal = utterance.voice && utterance.voice.localService;
    
    if (isLocal) {
        // 本地语音（手机）：pitch + rate 双参数区分
        utterance.pitch = item.speaker === 'A' ? 1.3 : 0.8;
        utterance.rate = item.speaker === 'A' ? 0.75 : 0.95;
    } else {
        // 在线语音（电脑）：仅用rate区分（pitch不生效）
        utterance.pitch = 1.0;
        utterance.rate = item.speaker === 'A' ? 0.8 : 1.05;
    }
    
    utterance.onend = function() {
        setTimeout(function() {
            playVietnameseLines(lines, index + 1, btn, utterance.voice);
        }, 700);
    };
    
    utterance.onerror = function() {
        setTimeout(function() {
            playVietnameseLines(lines, index + 1, btn, lastVoice);
        }, 700);
    };
    
    currentUtterance = utterance;
    speechSynthesis.speak(utterance);
}

// 预加载语音列表
if (speechSynthesis) {
    speechSynthesis.onvoiceschanged = function() {
        _viVoices = null; // 重置缓存，重新检测
        window.listViVoices && window.listViVoices();
    };
}

// Word下载功能 - 使用HTML格式配合Word特定标签
function downloadWord() {
    var content = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">';
    content += '<head><meta charset="utf-8"><title>越南语情景对话</title>';
    
    // 样式 - 页边距1.2cm (约680 twips)
    content += '<style>';
    content += '@page { ';
    content += 'size: A4; ';
    content += 'margin-top: 1.2cm; ';
    content += 'margin-right: 1.2cm; ';
    content += 'margin-bottom: 1.2cm; ';
    content += 'margin-left: 1.2cm; ';
    content += 'mso-page-orientation: portrait; ';
    content += 'mso-footer: url("#footer"); ';
    content += '} ';
    content += 'div.Section1 { page: Section1; } ';
    content += 'body { font-family: Arial, sans-serif; font-size: 12pt; line-height: 1.6; } ';
    content += 'h1 { color: #2563eb; font-size: 18pt; margin-bottom: 8pt; } ';
    content += '.date { color: #64748b; font-size: 10pt; margin-bottom: 12pt; } ';
    content += '.topic { font-weight: bold; color: #1e293b; margin: 16pt 0 8pt 0; font-size: 11pt; } ';
    content += '.line { margin: 6pt 0; } ';
    content += '.line.vn-cn { } ';
    content += '.vn { color: #2563eb; font-style: italic; } ';
    content += '.cn { color: #1e293b; } ';
    content += '.divider { text-align: center; color: #cbd5e1; margin: 20pt 0; font-family: monospace; } ';
    content += '</style>';
    
    // Word页脚定义
    content += '<xml xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word">';
    content += '<w:WordDocument>';
    content += '<w:footers>';
    content += '<w:footer w:type="odd" w:continue="on" id="footer">';
    content += '<w:p><w:pPr><w:jc w:val="center"/></w:pPr>';
    content += '<w:r><w:rPr><w:sz w:val="18"/><w:color w:val="64748B"/></w:rPr>';
    content += '<w:t>Apex Personal Workspace © 2026</w:t>';
    content += '</w:r></w:p>';
    content += '</w:footer>';
    content += '</w:footers>';
    content += '</w:WordDocument>';
    content += '</xml>';
    
    content += '</head><body>';
    
    // 使用Section1来应用页面设置
    content += '<div class="Section1">';
    
    // 标题
    var filterLabel = currentFilter === 'all' ? '全部' : currentFilter;
    content += '<h1>🗣️ 越南语情景对话' + (currentFilter !== 'all' ? ' · ' + escHtml(filterLabel) : '') + '</h1>';
    content += '<p class="date">导出日期: ' + new Date().toLocaleDateString('zh-CN') + ' | 分类: ' + escHtml(filterLabel) + '</p>';
    content += '<div class="divider">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>';
    
    // 对话内容 - 只导出当前筛选可见的对话
    var exportedCount = 0;
    for (var i = 0; i < dialogues.length; i++) {
        var d = dialogues[i];
        // 跳过被筛选隐藏的对话
        // VSL2特殊逻辑：按标题筛选（标题包含"VSL2"）
        var isVSL2 = d.topic && d.topic.includes('VSL2');
        var cat = isVSL2 ? 'VSL2' : categorizeDialogue(d);
        if (currentFilter !== 'all' && cat !== currentFilter) continue;
        content += '<p class="date">📅 ' + escHtml(d.date) + '</p>';
        content += '<p class="topic">📌 ' + escHtml(d.topic) + '</p>';
        
        var lines = d.content.split('\n');
        var j = 0;
        while (j < lines.length) {
            var line = lines[j].trim();
            if (!line) { j++; continue; }
            
            // 检测是否为越南语行
            var isVn = /[ăâđêôơưàằầèềìòồờùừỳáắấéếíóốớúứýảẳẩẻểỉỏổởủửỷạặậẹệịọộợụựỵ]/i.test(line);
            
            // 检查下一行
            var nextLine = (j + 1 < lines.length) ? lines[j + 1].trim() : '';
            var nextIsVn = nextLine ? /[ăâđêôơưàằầèềìòồờùừỳáắấéếíóốớúứýảẳẩẻểỉỏổởủửỷạặậẹệịọộợụựỵ]/i.test(nextLine) : false;
            
            // 如果当前是越南语且下一行是中文，合并为一行
            if (isVn && nextLine && !nextIsVn) {
                content += '<p class="line vn-cn"><span class="vn">' + escHtml(line) + '</span> ｜ <span class="cn">' + escHtml(nextLine) + '</span></p>';
                j += 2;
            }
            // 如果当前是中文且下一行是越南语，合并为一行
            else if (!isVn && nextLine && nextIsVn) {
                content += '<p class="line vn-cn"><span class="vn">' + escHtml(nextLine) + '</span> ｜ <span class="cn">' + escHtml(line) + '</span></p>';
                j += 2;
            }
            else {
                content += '<p class="line">' + escHtml(line) + '</p>';
                j++;
            }
        }
        content += '<div class="divider">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>';
        exportedCount++;
    }
    
    content += '</div>'; // Section1
    
    // 页脚版权说明
    content += '<div style="text-align: center; margin-top: 30pt; padding-top: 10pt; border-top: 1pt solid #e2e8f0;">';
    content += '<p style="color: #64748b; font-size: 9pt; font-family: Arial, sans-serif;">Apex Personal Workspace © 2026</p>';
    content += '</div>';
    
    content += '</body></html>';
    
    // 创建下载
    var blob = new Blob(['\ufeff' + content], {type: 'application/msword'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '越南语情景对话_' + (currentFilter === 'all' ? '全部' : filterLabel) + '_' + getLocalDate() + '.doc';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showAutoAddNotice('已导出 ' + exportedCount + ' 篇对话（' + filterLabel + '）');
}

function escXml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}
