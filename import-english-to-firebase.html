<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>英语星球 → Firebase 数据导入</title>
<style>
body { font-family: Arial, sans-serif; padding: 40px; background: #f0f4f8; }
h2 { color: #1e40af; }
.log { background: #1e293b; color: #a5f3fc; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 500px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; }
button { padding: 12px 24px; font-size: 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 12px; }
button:hover { background: #1d4ed8; }
button:disabled { background: #94a3b8; cursor: not-allowed; }
.info { background: #fef3c7; padding: 12px; border-radius: 8px; border-left: 4px solid #d97706; color: #92400e; margin-bottom: 16px; }
</style>
</head>
<body>
<h2>📤 英语星球 → Firebase 数据导入</h2>
<div class="info">从本地存储读取历史记录，从 GitHub 线上版本读取词汇库，一起导入 Firebase</div>
<button id="btn" onclick="startImport()">🚀 开始导入（点击后请耐心等待）</button>
<div class="log" id="log">等待开始...</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
var db;
var firebaseConfig = {
    apiKey: "AIzaSyCMPFTNEBWXA_EnkF7Yk__F1gdHYfPg8kM",
    authDomain: "vietnames-data.firebaseapp.com",
    projectId: "vietnames-data",
    storageBucket: "vietnames-data.firebasestorage.app",
    messagingSenderId: "474396114838",
    appId: "1:474396114838:web:0fc28fb08bfbd4b6bee7b7"
};
firebase.initializeApp(firebaseConfig);
db = firebase.firestore();
log("✅ Firebase 已连接");

function log(msg) {
    var el = document.getElementById("log");
    el.textContent += "\n" + new Date().toLocaleTimeString() + " " + msg;
    el.scrollTop = el.scrollHeight;
}

function fbWithTimeout(promise, ms) {
    ms = ms || 5000;
    return Promise.race([promise, new Promise(function(resolve) { setTimeout(function() { resolve(null); }, ms); })]);
}

async function startImport() {
    var btn = document.getElementById("btn");
    btn.disabled = true;
    btn.textContent = "导入中，请稍候...";

    // === 第一步：从 GitHub 加载词汇库 ===
    log("\n📚 第1步：加载线上词汇库...");
    var localVocab = null;
    try {
        var resp = await fetch("https://raw.githubusercontent.com/apexhuang-zizi/apex-portfolio/main/english.html");
        var html = await resp.text();
        // 提取 LOCAL_VOCAB 变量
        var match = html.match(/var\s+LOCAL_VOCAB\s*=\s*(\{[\s\S]*?\});/);
        if (match) {
            // 用 eval 解析（因为数据是 JS 对象字面量）
            eval("localVocab = " + match[1]);
            log("✅ 词汇库加载成功！共 " + Object.keys(localVocab).length + " 个学期");
        } else {
            log("⚠️ 无法从 GitHub 提取词汇库，将跳过词汇库导入");
        }
    } catch(e) {
        log("⚠️ GitHub 请求失败: " + e.message);
    }

    // === 第二步：导入历史记录 ===
    log("\n📊 第2步：导入历史记录...");
    var records = JSON.parse(localStorage.getItem("quest_history_all") || "[]");
    log("本地历史记录: " + records.length + " 条");

    if (records.length === 0) {
        log("⚠️ 无历史记录，跳过");
    } else {
        var uploaded = 0;
        var skipped = 0;
        for (var i = 0; i < records.length; i++) {
            var r = records[i];
            var ts = r.timestamp;
            try {
                if (ts && typeof ts.toDate === "function") ts = ts.toDate().toISOString();
                else if (ts) ts = new Date(ts).toISOString();
                else ts = new Date().toISOString();
            } catch(e) { ts = new Date().toISOString(); }

            var doc = {
                user: r.user || r.username || "未知",
                username: r.username || r.user || "未知",
                grade: r.grade || "",
                semester: r.semester || "1",
                type: r.type || "word-quest",
                score: Number(r.score || 0),
                scoreStr: String(r.score || "0"),
                correct: Number(r.correct || 0),
                total: Number(r.total || 0),
                maxCombo: Number(r.maxCombo || 0),
                accScore: Number(r.accScore || 0),
                comboScore: Number(r.comboScore || 0),
                timeScore: Number(r.timeScore || 0),
                wrongCount: Number(r.wrongCount || 0),
                wrongWords: r.wrongWords || [],
                timestamp: ts
            };

            try {
                var res = await fbWithTimeout(db.collection("english_records").add(doc));
                if (res && res.id) uploaded++;
                else skipped++;
                if ((i+1) % 20 === 0 || i === records.length - 1) {
                    log("  上传进度: " + (i+1) + "/" + records.length + " (成功:" + uploaded + " 已存在:" + skipped + ")");
                }
            } catch(e) {
                skipped++;
                log("  ⚠ 第" + (i+1) + "条失败: " + e.message);
            }
        }
        log("✅ 历史记录导入完成！成功: " + uploaded + "，跳过: " + skipped);
    }

    // === 第三步：导入词汇库 ===
    if (localVocab) {
        log("\n📖 第3步：导入词汇库到 Firebase...");
        var keys = Object.keys(localVocab);
        var vocabUploaded = 0;
        for (var k = 0; k < keys.length; k++) {
            var key = keys[k];
            var words = localVocab[key];
            try {
                await fbWithTimeout(db.collection("english_vocabulary").doc(key).set({ words: words }), 5000);
                vocabUploaded++;
                if ((k+1) % 2 === 0 || k === keys.length - 1) {
                    log("  词汇进度: " + (k+1) + "/" + keys.length + " — " + key + " (" + words.length + "词)");
                }
            } catch(e) {
                log("  ⚠ " + key + " 上传失败: " + e.message);
            }
        }
        log("✅ 词汇库导入完成！共 " + vocabUploaded + "/" + keys.length + " 个学期");
    } else {
        log("\n⚠️ 词汇库导入已跳过（无数据）");
    }

    log("\n🎉 全部导入完成！可以关闭此页面");
    btn.textContent = "✅ 导入完成";
    btn.disabled = false;
}
</script>
</body>
</html>
