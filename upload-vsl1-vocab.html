<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSL1词库上传工具</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #059669; margin-bottom: 20px; }
        .info { background: #d1fae5; border-radius: 8px; padding: 12px; margin: 12px 0; }
        .info code { background: #a7f3d0; padding: 2px 6px; border-radius: 4px; }
        button { background: #059669; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px 4px; }
        button:hover { background: #047857; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { background: #1e1e1e; color: #0f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 16px; }
        .stat-box { background: #f0f0f0; border-radius: 8px; padding: 12px; text-align: center; }
        .stat-box .num { font-size: 1.5rem; font-weight: 700; color: #059669; }
        .stat-box .label { font-size: 0.8rem; color: #666; }
        .chunk-preview { margin-top: 16px; max-height: 300px; overflow-y: auto; }
        .chunk-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .chunk-item .doc-id { color: #059669; font-family: monospace; }
        .chunk-item .count { color: #10b981; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📤 VSL1词库上传工具</h1>
        <div class="info">
            <strong>上传规则：</strong><br>
            · 自动按 100 条/切片分片<br>
            · 文档 ID 格式：<code>vsl1_000</code>, <code>vsl1_001</code>, ...<br>
            · 文档字段：<code>word</code> / <code>translation</code> / <code>translation_en</code> / <code>unit</code><br>
            · 目标 Firebase 项目：<code>vietnames-data</code>
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="num" id="stat-total">-</div>
                <div class="label">总词数</div>
            </div>
            <div class="stat-box">
                <div class="num" id="stat-chunks">-</div>
                <div class="label">切片数量</div>
            </div>
            <div class="stat-box">
                <div class="num" id="stat-last">-</div>
                <div class="label">最后切片词数</div>
            </div>
        </div>

        <div style="margin-top: 16px;">
            <button id="btnUpload" onclick="uploadToFirebase()">🚀 开始上传到 Firebase</button>
            <button id="btnCheck" onclick="checkFirebaseData()">🔍 检查云端数据</button>
        </div>

        <div class="chunk-preview" id="chunkPreview"></div>
        <div id="log"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="vsl1-vocab.js"></script>

    <script>
        // Firebase配置（同 vietnamese-words.html）
        const firebaseConfig = {
            apiKey: "AIzaSyCMPFTNEBWXA_EnkF7Yk__F1gdHYfPg8kM",
            authDomain: "vietnames-data.firebaseapp.com",
            projectId: "vietnames-data",
            storageBucket: "vietnames-data.appspot.com",
            messagingSenderId: "1059372537828",
            appId: "1:1059372537828:web:bf84e3f09d8e2b2f16e809"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 日志函数
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colorClass = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : '';
            logDiv.innerHTML += `<div class="${colorClass}">[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 页面加载
        window.onload = function() {
            if (typeof VN_VOCAB !== 'undefined' && VN_VOCAB.vsl1) {
                const words = VN_VOCAB.vsl1;
                const total = words.length;
                const chunks = Math.ceil(total / 100);
                const lastChunkSize = total % 100 || 100;

                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-chunks').textContent = chunks;
                document.getElementById('stat-last').textContent = lastChunkSize;

                log(`✅ 本地词库加载成功：${total} 条数据`, 'success');
                log(`   切片数：${chunks}，前 ${chunks-1} 个切片各 100 条，最后切片 ${lastChunkSize} 条`);

                renderChunkPreview(words, chunks);
            } else {
                document.getElementById('stat-total').textContent = '❌';
                log('❌ 无法加载 vsl1-vocab.js，请确认文件存在', 'error');
            }
        };

        // 渲染切片预览
        function renderChunkPreview(words, chunks) {
            const preview = document.getElementById('chunkPreview');
            let html = '';
            for (let i = 0; i < chunks; i++) {
                const start = i * 100;
                const end = Math.min(start + 100, words.length);
                const count = end - start;
                const docId = 'vsl1_' + String(i).padStart(3, '0');
                html += `<div class="chunk-item">
                    <span class="doc-id">${docId}</span>
                    <span>位置 ${start + 1} ~ ${end}</span>
                    <span class="count">${count} 条</span>
                </div>`;
            }
            preview.innerHTML = html;
        }

        // 检查 Firebase 数据
        async function checkFirebaseData() {
            const btn = document.getElementById('btnCheck');
            btn.disabled = true;
            log('🔍 检查 Firebase 数据...');

            try {
                const registryDoc = await db.collection('vocab_registry').doc('vsl1').get();
                if (registryDoc.exists) {
                    const data = registryDoc.data();
                    log(`📋 vocab_registry.vsl1: wordCount=${data.wordCount}, chunks=${data.chunks}`, 'success');
                } else {
                    log('⚠️ vocab_registry.vsl1 不存在', 'warning');
                }

                log('--- 当前云端切片 ---');
                const chunksSnapshot = await db.collection('vocab_data').where('vocabId', '==', 'vsl1').get();
                log(`切片数量: ${chunksSnapshot.size}`);

                let totalWords = 0;
                chunksSnapshot.forEach(doc => {
                    const data = doc.data();
                    const cnt = data.words?.length || 0;
                    totalWords += cnt;
                    log(`  文档: ${doc.id} | words=${cnt}`);
                });
                log(`总词数: ${totalWords}`, totalWords > 0 ? 'success' : 'warning');
            } catch (err) {
                log(`❌ 检查失败: ${err.message}`, 'error');
            }
            btn.disabled = false;
        }

        // 上传到 Firebase
        async function uploadToFirebase() {
            const btn = document.getElementById('btnUpload');
            btn.disabled = true;
            log('🚀 开始上传到 Firebase...');
            log('---');

            try {
                const words = VN_VOCAB.vsl1;
                const total = words.length;
                const chunks = Math.ceil(total / 100);

                log(`📊 本地词库: ${total} 条，切片数: ${chunks}`);

                // 构建切片数据
                const chunksData = {};
                for (let i = 0; i < chunks; i++) {
                    const docId = 'vsl1_' + String(i).padStart(3, '0');
                    const start = i * 100;
                    const end = Math.min(start + 100, total);
                    chunksData[docId] = words.slice(start, end).map(w => ({
                        word: w[0],
                        translation: w[1],
                        translation_en: w[2],
                        unit: w[3]
                    }));
                }

                // 删除旧数据
                log('🗑️ 删除旧数据...');
                const oldChunks = await db.collection('vocab_data').where('vocabId', '==', 'vsl1').get();
                if (!oldChunks.empty) {
                    const batchDel = db.batch();
                    oldChunks.forEach(doc => batchDel.delete(doc.ref));
                    await batchDel.commit();
                    log(`已删除 ${oldChunks.size} 个旧文档`, 'success');
                } else {
                    log('无旧数据', 'warning');
                }

                // 上传新切片
                log('📤 上传新数据...');
                const batchSet = db.batch();
                let uploaded = 0;

                for (const docId of Object.keys(chunksData)) {
                    const chunkWords = chunksData[docId];
                    if (chunkWords.length === 0) continue;

                    const docRef = db.collection('vocab_data').doc(docId);
                    batchSet.set(docRef, {
                        vocabId: 'vsl1',
                        chunkIndex: parseInt(docId.split('_')[1]),
                        words: chunkWords,
                        wordCount: chunkWords.length,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    uploaded += chunkWords.length;
                    log(`  ${docId}: ${chunkWords.length} 条 ✓`);
                }

                await batchSet.commit();
                log(`✅ 上传成功：${chunks} 个切片，${uploaded} 条词`, 'success');

                // 更新 vocab_registry
                log('📋 更新 vocab_registry...');
                await db.collection('vocab_registry').doc('vsl1').set({
                    id: 'vsl1',
                    name: 'VSL1',
                    name_vi: 'VSL1',
                    wordCount: total,
                    chunks: chunks,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                log('✅ vocab_registry 更新成功', 'success');

                log('━━━━━━━━━━━━━━━━━━━', 'success');
                log('🎉 上传完成！', 'success');
                alert('上传成功！共上传 ' + chunks + ' 个切片，' + uploaded + ' 条词。');
            } catch (err) {
                log(`❌ 上传失败: ${err.message}`, 'error');
                console.error(err);
                alert('上传失败: ' + err.message);
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
