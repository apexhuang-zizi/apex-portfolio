<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #2563eb; --primary-dark: #1d4ed8; --bg: #f0f4ff; --surface: #fff;
    --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; --success: #10b981;
    --danger: #ef4444; --warning: #f59e0b; --shadow: 0 4px 24px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Outfit", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh }
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px }
.login-box { background: var(--surface); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center }
.login-box h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent }
.login-box p { color: var(--text-muted); margin-bottom: 24px; font-size: .9rem }
.login-box input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: .95rem; font-family: inherit; margin-bottom: 12px; transition: border-color .2s }
.login-box input:focus { outline: none; border-color: var(--primary) }
.login-box button { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .2s }
.login-box button:hover { background: var(--primary-dark) }
.login-error { color: var(--danger); font-size: .85rem; margin-top: 8px; display: none }
.app-page { display: none }
.topbar { background: var(--surface); padding: 16px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100 }
.topbar h1 { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent }
.topbar-right { display: flex; gap: 12px; align-items: center }
.topbar .user-info { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--bg); border-radius: 20px; font-size: .9rem; }
.topbar .logout-btn { padding: 8px 16px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-family: inherit; font-size: .85rem; transition: all .2s }
.topbar .logout-btn:hover { background: #fef2f2; color: var(--danger); border-color: var(--danger) }

/* 蹇嵎鎿嶄綔鎸夐挳 */
.quick-actions { background: var(--surface); margin: 20px 24px 0; padding: 16px 24px; border-radius: 12px; box-shadow: var(--shadow); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.quick-actions h3 { font-size: 1rem; font-weight: 600; margin-right: auto; }
.quick-btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; display: flex; align-items: center; gap: 6px; }
.btn-users { background: #fef2f2; color: var(--danger); }
.btn-users:hover { background: var(--danger); color: #fff; }
.btn-password { background: #fef3c7; color: var(--warning); }
.btn-password:hover { background: var(--warning); color: #fff; }

/* 涓诲唴瀹瑰尯 */
.hero { padding: 40px 24px 20px; text-align: center; }
.hero h2 { font-size: 1.6rem; font-weight: 600; margin-bottom: 8px; }
.hero p { color: var(--text-muted); font-size: .95rem; }

/* 妯″潡缃戞牸 */
.modules { max-width: 1200px; margin: 0 auto; padding: 0 24px 40px; }
.modules h3 { font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.module-card { background: var(--surface); border-radius: 14px; padding: 24px; box-shadow: var(--shadow); cursor: pointer; transition: all .3s; border: 2px solid transparent; text-decoration: none; color: inherit; display: block; text-align: center; }
.module-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 8px 32px rgba(37,99,235,.15); }
.module-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
.module-card h4 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
.module-card p { color: var(--text-muted); font-size: .85rem; line-height: 1.4; }
.module-card.locked { opacity: 0.5; cursor: not-allowed; }
.module-card.locked:hover { transform: none; border-color: transparent; box-shadow: var(--shadow); }

/* 闈㈡澘 */
.panel { background: var(--surface); border-radius: 16px; padding: 30px; box-shadow: var(--shadow); margin: 20px 24px; max-width: 900px; }
.panel h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.panel h3 .icon { font-size: 1.5rem; }
.panel p { color: var(--text-muted); margin-bottom: 16px; font-size: .9rem; }
.panel table { width: 100%; border-collapse: collapse; margin-top: 16px; }
.panel table th, .panel table td { padding: 14px 12px; text-align: left; border-bottom: 1px solid var(--border); }
.panel table th { font-weight: 600; color: var(--text-muted); font-size: .85rem; text-transform: uppercase; background: var(--bg); }
.panel table tr:last-child td { border-bottom: none; }
.panel table tr:hover td { background: #f8fafc; }
.role-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .8rem; font-weight: 500; }
.role-admin { background: #fef2f2; color: var(--danger); }
.role-user { background: #eff6ff; color: var(--primary); }
.module-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: .75rem; background: #f1f5f9; color: var(--text-muted); margin: 2px; }
.module-badge.active { background: #dcfce7; color: #16a34a; }

/* 琛ㄥ崟 */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: .9rem; }
.form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: .95rem; font-family: inherit; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

/* 鎸夐挳 */
.btn-primary { padding: 12px 24px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .2s; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { padding: 10px 20px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: .9rem; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-secondary:hover { background: var(--border); }
.btn-success { padding: 10px 20px; background: var(--success); color: #fff; border: none; border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-success:hover { background: #059669; }
.btn-danger { padding: 10px 16px; background: #fef2f2; color: var(--danger); border: none; border-radius: 8px; font-size: .85rem; cursor: pointer; font-family: inherit; transition: all .2s; }
.btn-danger:hover { background: var(--danger); color: #fff; }

/* 妯℃€佹 */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal.active { display: flex; }
.modal-content { background: var(--surface); border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
.modal-close { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
.modal-footer { margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end; }

/* 鎻愮ず */
.toast { position: fixed; top: 80px; right: 20px; padding: 14px 20px; border-radius: 10px; font-size: .9rem; font-weight: 500; z-index: 2000; animation: slideIn .3s ease; box-shadow: var(--shadow); }
.toast-success { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
.toast-error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: .8rem; }

/* 鍝嶅簲寮?*/
@media (max-width: 600px) { 
    .module-grid { grid-template-columns: 1fr; } 
    .quick-actions { flex-direction: column; align-items: stretch; }
    .quick-actions h3 { text-align: center; }
    .quick-btn { justify-content: center; }
    .hero { padding: 24px 16px 16px; }
    .panel { margin: 16px; padding: 20px; }
    .topbar { flex-direction: column; gap: 12px; }
    .topbar-right { flex-wrap: wrap; justify-content: center; }
}
.hidden { display: none !important; }
</style>
</head>

<script>
// ==================== 鏁版嵁缁撴瀯 ====================
var DEFAULT_USERS = [
    { username: "apex", password: "apex2026", role: "admin", modules: "full", createdBy: "system" },
    { username: "test", password: "test2026", role: "user", modules: "basic", createdBy: "system" }
];

function initData() {
    if (!localStorage.getItem("apex_users")) {
        localStorage.setItem("apex_users", JSON.stringify(DEFAULT_USERS));
    }
}

function getUsers() { return JSON.parse(localStorage.getItem("apex_users") || "[]"); }
function saveUsers(users) { localStorage.setItem("apex_users", JSON.stringify(users)); }

// ==================== 璁よ瘉 ====================
function checkAuth() {
    var auth = sessionStorage.getItem("apex_auth");
    var username = sessionStorage.getItem("apex_username");
    if (auth === "true" && username) {
        var users = getUsers();
        var user = users.find(u => u.username === username);
        if (user) { showAppPage(user); return; }
    }
    showLoginPage();
}

function doLogin() {
    var user = document.getElementById("loginUser").value.trim().toLowerCase();
    var pass = document.getElementById("loginPass").value;
    var users = getUsers();
    var found = users.find(u => u.username === user && u.password === pass);
    if (found) {
        sessionStorage.setItem("apex_auth", "true");
        sessionStorage.setItem("apex_username", found.username);
        document.getElementById("loginError").style.display = "none";
        showAppPage(found);
    } else {
        document.getElementById("loginError").style.display = "block";
        showToast("鐢ㄦ埛鍚嶆垨瀵嗙爜閿欒", "error");
    }
}

function doLogout() {
    sessionStorage.removeItem("apex_auth");
    sessionStorage.removeItem("apex_username");
    showLoginPage();
    showToast("宸查€€鍑虹櫥褰?, "success");
}

function showLoginPage() {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("appPage").style.display = "none";
}

function showAppPage(user) {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("appPage").style.display = "block";
    
    // 鏇存柊鐢ㄦ埛淇℃伅
    document.getElementById("currentUserName").textContent = user.username;
    var roleEl = document.getElementById("currentUserRole");
    roleEl.textContent = user.role === "admin" ? "绠＄悊鍛? : "鏅€氱敤鎴?;
    roleEl.className = "role-badge role-" + user.role;
    
    // 绠＄悊鍛樻樉绀虹敤鎴风鐞嗘寜閽?    document.getElementById("btnUserMgmt").style.display = user.role === "admin" ? "flex" : "none";
    
    // 鏇存柊妯″潡璁块棶
    updateModuleAccess(user);
    
    // 闅愯棌鎵€鏈夐潰鏉?    hideAllPanels();
}

function hideAllPanels() {
    document.getElementById("userManagementPanel").classList.add("hidden");
    document.getElementById("passwordPanel").classList.add("hidden");
}

function updateModuleAccess(user) {
    // 瓒婂崡璇?- 鎵€鏈変汉
    document.getElementById("mod-vietnamese").classList.remove("locked");
    document.getElementById("mod-vietnamese").querySelector(".module-badge").textContent = "鍙敤";
    document.getElementById("mod-vietnamese").querySelector(".module-badge").className = "module-badge active";
    
    // 闂杩借釜
    if (user.role === "admin" || user.modules === "full") {
        document.getElementById("mod-tracker").classList.remove("locked");
        document.getElementById("mod-tracker-badge").textContent = "鍙敤";
        document.getElementById("mod-tracker-badge").className = "module-badge active";
    } else {
        document.getElementById("mod-tracker").classList.add("locked");
        document.getElementById("mod-tracker-badge").textContent = "闇€鏉冮檺";
        document.getElementById("mod-tracker-badge").className = "module-badge";
    }
    
    // 缁熻鎶ヨ〃 - 浠呯鐞嗗憳
    if (user.role === "admin") {
        document.getElementById("mod-stats").classList.remove("locked");
        document.getElementById("mod-stats-badge").textContent = "鍙敤";
        document.getElementById("mod-stats-badge").className = "module-badge active";
    } else {
        document.getElementById("mod-stats").classList.add("locked");
        document.getElementById("mod-stats-badge").textContent = "绠＄悊鍛?;
        document.getElementById("mod-stats-badge").className = "module-badge";
    }
    
    document.getElementById("mod-locked").classList.add("locked");
    
    // 鏇存柊鎻愮ず
    document.getElementById("moduleHint").textContent = user.role === "admin" ? "鎮ㄦ槸绠＄悊鍛橈紝鍙闂叏閮ㄦā鍧? : "鎮ㄧ殑鏉冮檺锛氬熀纭€璁块棶";
}

// ==================== 闈㈡澘鍒囨崲 ====================
function showUserManagement() {
    hideAllPanels();
    document.getElementById("userManagementPanel").classList.remove("hidden");
    renderUserTable();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function showPasswordPanel() {
    hideAllPanels();
    document.getElementById("passwordPanel").classList.remove("hidden");
    document.getElementById("currentPass").value = "";
    document.getElementById("newPass").value = "";
    document.getElementById("confirmPass").value = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

// ==================== 鐢ㄦ埛绠＄悊 ====================
function renderUserTable() {
    var users = getUsers();
    var currentUser = sessionStorage.getItem("apex_username");
    var tbody = document.getElementById("userTableBody");
    
    tbody.innerHTML = users.map(u => {
        var roleText = u.role === "admin" ? "绠＄悊鍛? : "鏅€氱敤鎴?;
        var moduleText = u.modules === "full" ? "鍏ㄩ儴" : "鍩虹";
        var canDelete = u.username !== currentUser && u.username !== "apex";
        
        var deleteBtn = canDelete
            ? '<button class="btn-danger" onclick="deleteUser(\'' + u.username + '\')">馃棏 鍒犻櫎</button>'
            : '<span style="color: var(--text-muted); font-size: 0.8rem;">绯荤粺淇濇姢</span>';
        return '<tr>' +
            '<td>' + u.username + '</td>' +
            '<td><span class="role-badge role-' + u.role + '">' + roleText + '</span></td>' +
            '<td>' + moduleText + '</td>' +
            '<td>' + u.createdBy + '</td>' +
            '<td>' + deleteBtn + '</td>' +
        '</tr>';
    }).join("");
}

function showAddUserModal() {
    document.getElementById("newUserName").value = "";
    document.getElementById("newUserPass").value = "";
    document.getElementById("newUserRole").value = "user";
    document.getElementById("newUserModules").value = "basic";
    document.getElementById("addUserModal").classList.add("active");
}

function addUser() {
    var username = document.getElementById("newUserName").value.trim().toLowerCase();
    var password = document.getElementById("newUserPass").value;
    var role = document.getElementById("newUserRole").value;
    var modules = document.getElementById("newUserModules").value;
    
    if (!username || !password) {
        showToast("璇峰～鍐欑敤鎴峰悕鍜屽瘑鐮?, "error"); return;
    }
    if (password.length < 4) {
        showToast("瀵嗙爜鑷冲皯4浣?, "error"); return;
    }
    if (!/^[a-z0-9]+$/.test(username)) {
        showToast("鐢ㄦ埛鍚嶅彧鑳藉寘鍚嫳鏂囧拰鏁板瓧", "error"); return;
    }
    
    var users = getUsers();
    if (users.find(u => u.username === username)) {
        showToast("鐢ㄦ埛鍚嶅凡瀛樺湪", "error"); return;
    }
    
    users.push({
        username: username,
        password: password,
        role: role,
        modules: modules,
        createdBy: sessionStorage.getItem("apex_username")
    });
    
    saveUsers(users);
    closeModal("addUserModal");
    renderUserTable();
    showToast("鐢ㄦ埛 " + username + " 娣诲姞鎴愬姛", "success");
}

function deleteUser(username) {
    if (!confirm("纭畾瑕佸垹闄ょ敤鎴?\"" + username + "\" 鍚楋紵\n姝ゆ搷浣滀笉鍙挙閿€銆?)) return;
    
    var users = getUsers();
    users = users.filter(u => u.username !== username);
    saveUsers(users);
    renderUserTable();
    showToast("鐢ㄦ埛 " + username + " 宸插垹闄?, "success");
}

// ==================== 瀵嗙爜淇敼 ====================
function changePassword() {
    var currentPass = document.getElementById("currentPass").value;
    var newPass = document.getElementById("newPass").value;
    var confirmPass = document.getElementById("confirmPass").value;
    var username = sessionStorage.getItem("apex_username");
    
    var users = getUsers();
    var user = users.find(u => u.username === username);
    
    if (!user) { showToast("鐢ㄦ埛涓嶅瓨鍦?, "error"); return; }
    if (user.password !== currentPass) { showToast("褰撳墠瀵嗙爜閿欒", "error"); return; }
    if (newPass.length < 4) { showToast("鏂板瘑鐮佽嚦灏?浣?, "error"); return; }
    if (newPass !== confirmPass) { showToast("涓ゆ瀵嗙爜涓嶄竴鑷?, "error"); return; }
    
    user.password = newPass;
    saveUsers(users);
    
    document.getElementById("currentPass").value = "";
    document.getElementById("newPass").value = "";
    document.getElementById("confirmPass").value = "";
    
    showToast("瀵嗙爜淇敼鎴愬姛", "success");
}

// ==================== 宸ュ叿鍑芥暟 ====================
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

function showToast(message, type) {
    var container = document.getElementById("toastContainer");
    var toast = document.createElement("div");
    toast.className = "toast toast-" + type;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(function() {
        toast.style.animation = "slideIn .3s ease reverse";
        setTimeout(function() { toast.remove(); }, 300);
    }, 3000);
}

document.getElementById("loginPass").addEventListener("keydown", function(e) { if (e.key === "Enter") doLogin(); });
document.getElementById("loginUser").addEventListener("keydown", function(e) { if (e.key === "Enter") document.getElementById("loginPass").focus(); });
document.querySelectorAll(".modal").forEach(function(modal) {
    modal.addEventListener("click", function(e) { if (e.target === this) this.classList.remove("active"); });
});

initData();
checkAuth();
</script>
