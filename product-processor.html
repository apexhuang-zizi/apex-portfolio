<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>产品照片处理系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; }

/* ===== 弹窗遮罩 ===== */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.dialog {
  background: #fff; border-radius: 16px; padding: 28px 24px;
  width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.dialog h2 { font-size: 20px; margin-bottom: 20px; text-align: center; color: #1a73e8; }
.dialog label { font-size: 14px; color: #666; display: block; margin-bottom: 6px; font-weight: 500; }
.dialog input[type="text"] {
  width: 100%; padding: 12px 14px; border: 2px solid #ddd; border-radius: 10px;
  font-size: 16px; outline: none; transition: border-color 0.2s;
  margin-bottom: 8px;
}
.dialog input[type="text"]:focus { border-color: #1a73e8; }
.dialog .hint { font-size: 12px; color: #999; margin-bottom: 18px; line-height: 1.5; }
.dialog .checkbox-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 22px;
  font-size: 14px; color: #555;
}
.dialog .checkbox-row input { width: 18px; height: 18px; accent-color: #1a73e8; }
.dialog .btn-row { display: flex; gap: 12px; }
.dialog .btn-row button {
  flex: 1; padding: 13px; border-radius: 10px; font-size: 16px;
  font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s;
}
.dialog .btn-row button:active { opacity: 0.7; }
.btn-cancel { background: #eee; color: #555; }
.btn-confirm { background: #1a73e8; color: #fff; }

/* ===== 顶部栏 ===== */
.topbar {
  position: sticky; top: 0; background: #fff; padding: 12px 16px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); z-index: 100;
}
.topbar .project-name { font-size: 14px; font-weight: 600; color: #333; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar .stats { font-size: 12px; color: #888; }

/* ===== 步骤指示器 ===== */
.steps-indicator {
  display: flex; justify-content: center; gap: 0; padding: 16px 0 8px;
  background: #fff; margin-bottom: 2px;
}
.step-dot {
  display: flex; align-items: center; gap: 4px;
}
.step-dot .num {
  width: 28px; height: 28px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
  background: #ddd; color: #fff; transition: all 0.3s;
}
.step-dot.active .num { background: #1a73e8; transform: scale(1.1); }
.step-dot.done .num { background: #34a853; }
.step-line { width: 40px; height: 3px; background: #ddd; margin-top: -10px; border-radius: 2px; }
.step-line.done { background: #34a853; }

/* ===== 主内容区 ===== */
.main-area { flex: 1; padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }

/* 图片预览 */
.preview-box {
  width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 12px;
  overflow: hidden; position: relative; display: flex; align-items: center;
  justify-content: center; border: 2px dashed #ccc; margin-bottom: 16px;
}
.preview-box img { width: 100%; height: 100%; object-fit: contain; }
.preview-box .placeholder { color: #aaa; font-size: 14px; text-align: center; padding: 20px; }
.preview-box.has-image { border-style: solid; border-color: #ddd; }

/* 选项区 */
.options-section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.options-section h3 { font-size: 15px; margin-bottom: 12px; color: #333; }
.option-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; }
.option-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #1a73e8; }
.color-options { display: flex; gap: 8px; margin-top: 8px; }
.color-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.color-btn.selected { border-color: #1a73e8; transform: scale(1.1); }
.color-btn.white { background: #fff; border: 2px solid #ddd; }
.color-btn.transparent { background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50%/12px 12px; }
.color-btn.custom { background: linear-gradient(135deg, red, yellow, green, blue); }

/* OCR 结果 */
.ocr-result { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.ocr-result h3 { font-size: 15px; margin-bottom: 12px; }
.ocr-field { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.ocr-field:last-child { border-bottom: none; }
.ocr-field .label { font-size: 13px; color: #666; font-weight: 500; }
.ocr-field input {
  width: 120px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 15px; text-align: right; font-weight: 600; color: #1a73e8;
  outline: none;
}
.ocr-field input:focus { border-color: #1a73e8; }

.filename-preview {
  background: #e8f0fe; border-radius: 10px; padding: 12px 16px;
  text-align: center; font-family: monospace; font-size: 15px; font-weight: 600;
  color: #1a73e8; word-break: break-all; margin-top: 12px;
}

/* 最终预览 */
.final-preview { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.final-preview h3 { font-size: 15px; margin-bottom: 12px; }
.final-preview canvas { width: 100%; border-radius: 8px; border: 1px solid #eee; }

/* 底部操作栏 */
.bottom-bar {
  position: sticky; bottom: 0; background: #fff; padding: 12px 16px;
  display: flex; gap: 10px; box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
  z-index: 100;
}
.bottom-bar button {
  flex: 1; padding: 14px; border-radius: 12px; font-size: 15px;
  font-weight: 600; cursor: pointer; border: none; display: flex;
  align-items: center; justify-content: center; gap: 6px;
  transition: opacity 0.2s; white-space: nowrap;
}
.bottom-bar button:active { opacity: 0.7; }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-secondary { background: #f1f3f4; color: #333; }
.btn-success { background: #34a853; color: #fff; }
.btn-danger { background: #ea4335; color: #fff; }
.btn-warning { background: #fbbc04; color: #333; }

/* 加载状态 */
.loading-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
  align-items: center; justify-content: center; border-radius: 12px; z-index: 10;
}
.spinner {
  width: 40px; height: 40px; border: 4px solid #e0e0e0;
  border-top-color: #1a73e8; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #555; text-align: center; padding: 0 20px; }

/* Toast 提示 */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: #333; color: #fff; padding: 12px 24px; border-radius: 10px;
  font-size: 14px; z-index: 10000; animation: fadeInOut 2.5s ease forwards;
  white-space: nowrap; max-width: 90vw; text-align: center;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

/* 汇总表格页面 */
.summary-page { padding: 16px; max-width: 800px; margin: 0 auto; }
.summary-table-wrap { overflow-x: auto; background: #fff; border-radius: 12px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #1a73e8; color: #fff; padding: 10px 8px; text-align: left; font-weight: 600; white-space: nowrap; }
td { padding: 8px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
tr:nth-child(even) td { background: #fafafa; }
.total-row { background: #e8f0fe !important; font-weight: 700; }
.total-row td { border-top: 2px solid #1a73e8; }

/* 隐藏的文件/相机输入 */
.hidden-input { display: none; }

/* 状态标签 */
.status-badge {
  display: inline-block; padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.status-ok { background: #e6f4ea; color: #137333; }
.status-dup { background: #fce8e6; color: #c5221f; }
</style>
<script src="https://unpkg.com/@imgly/background-removal@2.2.1/dist/browser/index.js"></script>

<script>
// ============================================================
// 前端图片处理辅助函数
// ============================================================

// 透明图叠白底
async function addWhiteBackground(transparentBlob) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(resolve, 'image/png', 1.0);
    };
    img.src = URL.createObjectURL(transparentBlob);
  });
}

// 透视变换：根据四角点矫正图片
// corners: [{x, y}, ...] 四角点（左上、右上、右下、左下），范围为 0~1（比例）
async function applyPerspectiveCorrection(imageBlob, corners) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const w = img.width, h = img.height;
      // 目标矩形（占满画布）
      const dstW = w, dstH = h;
      const canvas = document.createElement('canvas');
      canvas.width = dstW;
      canvas.height = dstH;
      const ctx = canvas.getContext('2d');

      // 使用 Canvas 2D 的 transform 做仿射变换（近似透视）
      // 精确透视需要 WebGL，此处用双线性插值手动实现
      const srcPts = corners.map(c => [c.x * w, c.y * h]);
      const dstPts = [[0,0],[dstW,0],[dstW,dstH],[0,dstH]];

      // 计算透视变换矩阵（简化：使用仿射变换）
      // 对于产品照片，仿射变换已足够
      const matrix = computeAffineTransform(srcPts, dstPts);

      // 手动绘制变换后的图像
      // 由于 Canvas 不支持任意透视，使用三角形分割法
      const warped = warpImage(img, srcPts, dstPts, dstW, dstH);
      ctx.drawImage(warped, 0, 0);
      canvas.toBlob(resolve, 'image/png', 1.0);
    };
    img.src = URL.createObjectURL(imageBlob);
  });
}

// 计算仿射变换矩阵（3x2）
function computeAffineTransform(src, dst) {
  // 使用最小二乘法求解仿射变换矩阵
  // 仿射变换: x' = a*x + b*y + c, y' = d*x + e*y + f
  // 6个未知数，需要3个点（这里用4个点的最小二乘）
  const n = src.length;
  let sumX=0, sumY=0, sumU=0, sumV=0;
  let sumXX=0, sumXY=0, sumYY=0, sumUX=0, sumUY=0, sumVX=0, sumVY=0;
  for (let i = 0; i < n; i++) {
    const [x, y] = src[i];
    const [u, v] = dst[i];
    sumX += x; sumY += y; sumU += u; sumV += v;
    sumXX += x*x; sumXY += x*y; sumYY += y*y;
    sumUX += u*x; sumUY += u*y;
    sumVX += v*x; sumVY += v*y;
  }
  const det = n*(sumXX*sumYY - sumXY*sumXY) - sumX*(sumX*sumYY - sumXY*sumY) + sumY*(sumX*sumXY - sumY*sumXX);
  const a = (n*(sumUX*sumYY - sumUY*sumXY) - sumU*(sumX*sumYY - sumXY*sumY) + sumV*(sumX*sumXY - sumY*sumXX)) / det;
  const b = (n*(sumXX*sumUY - sumXY*sumUX) - sumU*(sumXX*sumY - sumXY*sumX) + sumV*(sumXX*sumXY - sumY*sumXX)) / det;
  const c = (sumU - a*sumX - b*sumY) / n;
  const d = (n*(sumVX*sumYY - sumVY*sumXY) - sumV*(sumX*sumYY - sumXY*sumY) + sumU*(sumX*sumXY - sumY*sumXX)) / det;
  const e = (n*(sumXX*sumVY - sumXY*sumVX) - sumV*(sumXX*sumY - sumXY*sumX) + sumU*(sumXX*sumXY - sumY*sumXX)) / det;
  const f = (sumV - d*sumX - e*sumY) / n;
  return { a, b, c, d, e, f };
}

// 使用仿射变换扭曲图像
function warpImage(img, srcPts, dstPts, dstW, dstH) {
  const canvas = document.createElement('canvas');
  canvas.width = dstW;
  canvas.height = dstH;
  const ctx = canvas.getContext('2d');
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = img.width;
  srcCanvas.height = img.height;
  const srcCtx = srcCanvas.getContext('2d');
  srcCtx.drawImage(img, 0, 0);
  const srcData = srcCtx.getImageData(0, 0, img.width, img.height);

  const matrix = computeAffineTransform(srcPts, dstPts);

  // 逆变换：对目标每个像素，计算源图像坐标
  const dstData = ctx.createImageData(dstW, dstH);
  for (let y = 0; y < dstH; y++) {
    for (let x = 0; x < dstW; x++) {
      // 逆变换：x' = a*x + b*y + c, y' = d*x + e*y + f
      const srcX = matrix.a * x + matrix.b * y + matrix.c;
      const srcY = matrix.d * x + matrix.e * y + matrix.f;
      // 双线性插值
      const ix = Math.floor(srcX), iy = Math.floor(srcY);
      const fx = srcX - ix, fy = srcY - iy;
      for (let c = 0; c < 4; c++) {
        const tl = getPixel(srcData, ix, iy, img.width, c);
        const tr = getPixel(srcData, ix+1, iy, img.width, c);
        const bl = getPixel(srcData, ix, iy+1, img.width, c);
        const br = getPixel(srcData, ix+1, iy+1, img.width, c);
        const val = (1-fx)*(1-fy)*tl + fx*(1-fy)*tr + (1-fx)*fy*bl + fx*fy*br;
        setPixel(dstData, x, y, dstW, c, val);
      }
    }
  }
  ctx.putImageData(dstData, 0, 0);
  return canvas;
}

function getPixel(imgData, x, y, w, c) {
  x = Math.max(0, Math.min(w-1, x));
  y = Math.max(0, Math.min(imgData.height-1, y));
  return imgData.data[(y * w + x) * 4 + c];
}
function setPixel(imgData, x, y, w, c, val) {
  imgData.data[(y * w + x) * 4 + c] = Math.round(Math.max(0, Math.min(255, val)));
}


</script>

<body>

<!-- ==================== 项目ID输入弹窗 ==================== -->
<div id="projectDialog" class="overlay">
  <div class="dialog">
    <h2>📦 新建项目</h2>
    <label>项目ID</label>
    <input type="text" id="projectInput" placeholder="例如：PROJECT_20240523_001" autocomplete="off">
    <div class="hint">项目ID将作为所有照片文件名的前缀<br>示例：PROJECT_001_ABC123.png</div>
    <div class="checkbox-row">
      <input type="checkbox" id="rememberProject" checked>
      <span>记住此项目ID（下次自动填充）</span>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeProjectDialog()">取消</button>
      <button class="btn-confirm" onclick="confirmProject()">开始处理</button>
    </div>
  </div>
</div>

<!-- ==================== API Key 输入弹窗 ==================== -->
<div id="apiKeyDialog" class="overlay" style="display:none;">
  <div class="dialog">
    <h2>🔑 API 设置</h2>
    <label>Gemini API Key</label>
    <input type="text" id="apiKeyInput" placeholder="粘贴你的 Gemini API Key" autocomplete="off">
    <div class="hint">Key 仅保存在本机浏览器中，不会上传到任何服务器<br>获取地址：https://aistudio.google.com/apikey</div>
    <div class="checkbox-row">
      <input type="checkbox" id="rememberApiKey" checked>
      <span>记住 API Key（下次自动填充）</span>
    </div>
    <div class="btn-row">
      <button class="btn-confirm" onclick="confirmApiKey()" style="flex:1;">确认</button>
    </div>
  </div>
</div>

<!-- ==================== 主界面 ==================== -->
<div id="mainApp" style="display:none; display:flex; flex-direction:column; min-height:100vh;">

  <!-- 顶部栏 -->
  <div class="topbar">
    <div class="project-name" id="topProjectName">-</div>
    <div class="stats" id="topStats">已保存: 0 张</div>
  </div>

  <!-- 步骤指示器 -->
  <div class="steps-indicator">
    <div class="step-dot active" id="stepDot1"><div class="num">1</div></div>
    <div class="step-line" id="stepLine1"></div>
    <div class="step-dot" id="stepDot2"><div class="num">2</div></div>
    <div class="step-line" id="stepLine2"></div>
    <div class="step-dot" id="stepDot3"><div class="num">3</div></div>
  </div>

  <!-- 主内容 -->
  <div class="main-area" id="mainContent">
    <!-- 动态渲染各步骤内容 -->
  </div>

  <!-- 底部操作栏 -->
  <div class="bottom-bar" id="bottomBar">
    <!-- 动态渲染按钮 -->
  </div>

</div>

<!-- ==================== 汇总页面 ==================== -->
<div id="summaryPage" style="display:none;">
  <div class="topbar">
    <div class="project-name" id="summaryProjectName">汇总报表</div>
    <div class="stats" id="summaryStats"></div>
  </div>
  <div class="summary-page" id="summaryContent"></div>
  <div class="bottom-bar">
    <button class="btn-secondary" onclick="backToMain()">← 继续处理</button>
    <button class="btn-primary" onclick="downloadExcel()">📥 下载 Excel</button>
  </div>
</div>

<!-- 隐藏的文件/相机输入 -->
<input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden-input">
<input type="file" id="galleryInput" accept="image/*" class="hidden-input">

<script>
// ============================================================
// 全局状态
// ============================================================
const STATE = {
  step: 1,
  projectId: '',
  apiKey: '',
  productImage: null,       // 原始产品图 Blob
  processedImageBlob: null, // Gemini 处理后的图 Blob
  barcodeImage: null,       // 条码照片 Blob
  ocrData: { a: '', b: '', c: '', d: '' },
  records: [],              // 已保存记录 [{filename, a, b, c, area, imageData}]
  corners: null,             // [{x, y}, ...] 四角点（比例坐标）
};

// ============================================================
// 初始化
// ============================================================
(function init() {
  const savedKey = localStorage.getItem('gemini_api_key');
  if (savedKey) {
    STATE.apiKey = savedKey;
  } else {
    showApiKeyDialog();
    return;
  }

  const savedProject = localStorage.getItem('product_project_id');
  if (savedProject) {
    document.getElementById('projectInput').value = savedProject;
  }
  document.getElementById('projectDialog').style.display = 'flex';
})();

function showApiKeyDialog() {
  const savedKey = localStorage.getItem('gemini_api_key');
  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
  document.getElementById('apiKeyDialog').style.display = 'flex';
}

function confirmApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { showToast('请输入 API Key'); return; }
  STATE.apiKey = key;
  if (document.getElementById('rememberApiKey').checked) {
    localStorage.setItem('gemini_api_key', key);
  }
  document.getElementById('apiKeyDialog').style.display = 'none';

  // 显示项目ID弹窗
  const savedProject = localStorage.getItem('product_project_id');
  if (savedProject) document.getElementById('projectInput').value = savedProject;
  document.getElementById('projectDialog').style.display = 'flex';
}

function closeProjectDialog() {
  // 不允许取消，必须输入
  showToast('请先输入项目ID');
}

function confirmProject() {
  // 检查 API Key 是否已设置
  if (!STATE.apiKey) {
    showApiKeyDialog();
    showToast('请先设置 API Key');
    return;
  }

  const pid = document.getElementById('projectInput').value.trim();
  if (!pid) { showToast('请输入项目ID'); return; }
  STATE.projectId = pid;
  if (document.getElementById('rememberProject').checked) {
    localStorage.setItem('product_project_id', pid);
  }
  document.getElementById('projectDialog').style.display = 'none';

  // 加载历史记录
  loadRecords();

  // 显示主界面
  document.getElementById('mainApp').style.display = 'flex';
  document.getElementById('topProjectName').textContent = pid;
  updateStats();
  renderStep();
}

// ============================================================
// 步骤渲染
// ============================================================
function renderStep() {
  const content = document.getElementById('mainContent');
  const bar = document.getElementById('bottomBar');

  // 更新步骤指示器
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById('stepDot' + i);
    dot.className = 'step-dot' + (i === STATE.step ? ' active' : (i < STATE.step ? ' done' : ''));
  }
  for (let i = 1; i <= 2; i++) {
    const line = document.getElementById('stepLine' + i);
    line.className = 'step-line' + (i < STATE.step ? ' done' : '');
  }

  if (STATE.step === 1) renderStep1(content, bar);
  else if (STATE.step === 2) renderStep2(content, bar);
  else if (STATE.step === 3) renderStep3(content, bar);
}

// ---------- 步骤1：产品照片 ----------
let bgOption = 'white'; // white | transparent

function renderStep1(content, bar) {
  let imgHtml = '';
  if (STATE.processedImageBlob || STATE.productImage) {

async function renderFinalCanvas() {
  const canvas = document.getElementById('finalCanvas');
  if (!canvas || !STATE.processedImageBlob) return;

  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    // 左上角叠加文字
    const { a, b, c } = STATE.ocrData;
    const fontSize = Math.max(Math.round(img.width * 0.02), 24);
    ctx.font = `bold ${fontSize}px Arial, sans-serif`;

    // 半透明背景条
    const text = `长度: ${a}  |  宽度: ${b}  |  数量: ${c}`;
    const metrics = ctx.measureText(text);
    const padX = fontSize * 0.8;
    const padY = fontSize * 0.5;
    const bgH = fontSize * 2.2;
    const bgW = metrics.width + padX * 2;

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(padX * 0.5, padY * 0.5, bgW, bgH);

    ctx.fillStyle = '#ffffff';
    ctx.fillText(text, padX, padY + fontSize * 1.35);
  };
  img.src = URL.createObjectURL(STATE.processedImageBlob);
}

async function handleImageFile(file, type) {
  if (!file) return;
  const blob = file.slice(0, file.size, file.type);

  if (type === 'product') {
    STATE.productImage = blob;
    STATE.processedImageBlob = null; // 清除旧的处理结果
    renderStep();

    await processProductImage(blob);
  } else if (type === 'barcode') {
    STATE.barcodeImage = blob;
    renderStep();
    // 自动调用 Gemini OCR
    await recognizeBarcode(blob);
  }
}

// --- 产品图片处理（去背景+矫正，不美化） ---
async function processProductImage(imageBlob) {
  showLoading(1);
  try {
    const removeBg = document.getElementById('optRemoveBg')?.checked ?? true;
    const correctDist = document.getElementById('optCorrectDistortion')?.checked ?? true;

    let processedBlob = imageBlob;

    // ① 去背景（前端库）
    if (removeBg) {
      showToast('正在去背景...');
      try {
        if (window.removeBackground) {
          processedBlob = await window.removeBackground(imageBlob);
        } else {
          showToast('背景移除库加载中，跳过');
        }
      } catch (e) {
        console.warn('背景移除失败:', e);
        showToast('去背景失败，已使用原图');
        processedBlob = imageBlob;
      }
    }

    // ② 背景颜色（白底 / 透明）
    if (bgOption === 'white') {
      processedBlob = await addWhiteBackground(processedBlob);
    }

    // ③ 畸变矫正（前端 Canvas 透视变换，四角点选择）
    if (correctDist) {
      // 畸变矫正在用户确认四角后触发，此处仅标记需要矫正
      // 实际矫正由 applyPerspectiveCorrection() 完成
      // 当前如果有已保存的四角点数据则自动应用
      if (STATE.corners && STATE.corners.length === 4) {
        processedBlob = await applyPerspectiveCorrection(processedBlob, STATE.corners);
      }
    }

    STATE.processedImageBlob = processedBlob;
    showToast('✅ 处理完成');
  } catch (err) {
    console.error('Process error:', err);
    showToast('处理失败: ' + err.message);
    STATE.processedImageBlob = imageBlob;
  }
  hideLoading(1);
  renderStep();
}

// --- 条码OCR识别 ---
async function recognizeBarcode(barcodeBlob) {
  showLoading(2);
  try {
    const prompt = `Look at this barcode/product label image and extract the following data:

The image contains a barcode with numbers around it. I need you to extract:

1. **d** (name/code): The number at the TOP LEFT of the image (above or beside the barcode)
2. **a** (length): The FIRST number from the LEFT at the BOTTOM of the image
3. **b** (width): The SECOND number from the left at the BOTTOM of the image
4. **c** (quantity): The THIRD number from the left at the BOTTOM of the image

IMPORTANT:
- Only extract numeric values (and the top code which may be alphanumeric)
- Ignore any other numbers at the bottom (there may be price or other data after the first 3)
- Return ONLY a JSON object in this exact format, no other text:
{"d":"value","a":"value","b":"value","c":"value"}

If any field is unclear, use your best judgment but always return valid JSON.`;

    const result = await callGemini(prompt, barcodeBlob);

    if (result.text) {
      // 尝试从返回文本中解析 JSON
      let parsed = null;
      try {
        // 方法1：直接解析整个文本（如果Gemini返回纯JSON）
        const trimmed = result.text.trim();
        if (trimmed.startsWith('{') && trimmed.endsWith('}')) {
          parsed = JSON.parse(trimmed);
        } else {
          // 方法2：查找第一个 '{' 和最后一个 '}' 之间的内容
          const start = result.text.indexOf('{');
          const end = result.text.lastIndexOf('}');
          if (start !== -1 && end !== -1 && start < end) {
            const jsonStr = result.text.substring(start, end + 1);
            parsed = JSON.parse(jsonStr);
          }
        }
      } catch (e) {
        console.warn('JSON parse failed, falling back to manual extraction:', e);
      }

      if (parsed && parsed.d !== undefined) {
        STATE.ocrData.d = parsed.d;
        if (parsed.a) STATE.ocrData.a = parsed.a;
        if (parsed.b) STATE.ocrData.b = parsed.b;
        if (parsed.c) STATE.ocrData.c = parsed.c;
      } else {
        // 尝试从文本中智能提取数字
        showToast('未能自动解析，请手动填写识别结果');
      }
    }
  } catch (err) {
    console.error('OCR error:', err);
    // 检查是否是 API Key 错误
    if (err.message && err.message.includes('API Key')) {
      showToast('API Key 无效，请重新设置');
      showApiKeyDialog();
      hideLoading(2);
      return; // 停留当前步骤
    }
    showToast('识别失败: ' + err.message);
  }
  hideLoading(2);
  renderStep();
}

// --- Gemini API 通用调用 ---
async function callGemini(prompt, imageBlob) {
  const base64 = await blobToBase64(imageBlob);
  const mime = imageBlob.type || 'image/jpeg';

  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${STATE.apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{
        parts: [
          { text: prompt },
          { inline_data: { mime_type: mime, data: base64 } }
        ]
      }]
      // 仅返回文本（OCR），不请求图片输出
    })
  });

  if (!response.ok) {
    const errBody = await response.json().catch(() => ({}));
    const errorMsg = errBody.error?.message || `API 错误 (${response.status})`;
    if (response.status === 401 || response.status === 403) {
      throw new Error('API Key 无效或已过期，请重新设置: ' + errorMsg);
    }
    throw new Error(errorMsg);
  }

  const data = await response.json();
  const parts = data.candidates?.[0]?.content?.parts || [];

  let result = { text: '' };
  for (const part of parts) {
    if (part.text) result.text += part.text;
  }

  return result;
}

// ============================================================
// 工具函数
// ============================================================
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function base64ToBlob(base64, mimeType) {
  const byteChars = atob(base64);
  const byteArray = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) {
    byteArray[i] = byteChars.charCodeAt(i);
  }
  return new Blob([byteArray], { type: mimeType });
}

function showLoading(stepNum) {

function showToast(msg) {

// ============================================================
// 存档逻辑
// ============================================================
function checkDuplicate(filename) {
  return STATE.records.some(r => r.filename === filename);
}

async function saveRecord() {
  const d = STATE.ocrData.d, a = STATE.ocrData.a, b = STATE.ocrData.b, c = STATE.ocrData.c;
  const filename = `${d}_${a}_${b}_${c}.png`;
  const area = (parseFloat(a)||0) * (parseFloat(b)||0) * (parseFloat(c)||0) / 10000;

  if (checkDuplicate(filename)) {
    showToast('⚠ 文件名已存在，不可重复提交！');
    return;
  }

  // 从 canvas 获取最终图片
  const canvas = document.getElementById('finalCanvas');
  if (!canvas) { showToast('生成图片失败'); return; }

  return new Promise((resolve) => {
    canvas.toBlob(async (blob) => {
      if (!blob) { showToast('图片导出失败'); resolve(); return; }

      // 保存到本地
      try {
        await downloadToFile(blob, filename);
      } catch(e) {
        // fallback: 直接下载
        downloadFallback(blob, filename);
      }

      // 记录
      STATE.records.push({ filename, a, b, c, area, timestamp: Date.now() });
      saveRecords();
      updateStats();

      showToast('✅ 已保存: ' + filename);

      // 重置状态，准备下一张
      resetForNext();
      resolve();
    }, 'image/png', 1.0);
  });
}

async function downloadToFile(blob, filename) {
  // 优先尝试 File System Access API
  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'PNG Image', accept: { 'image/png': ['.png'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch(e) {
      if (e.name !== 'AbortError') console.warn('showSaveFilePicker failed:', e);
      // fall through
    }
  }
  // fallback
  downloadFallback(blob, filename);
}

function downloadFallback(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function resetForNext() {
  STATE.productImage = null;
  STATE.processedImageBlob = null;
  STATE.barcodeImage = null;
  STATE.ocrData = { a: '', b: '', c: '', d: '' };
  STATE.step = 1;
  renderStep();
}

// ============================================================
// 数据持久化 (IndexedDB)
// ============================================================
const DB_NAME = 'ProductProcessorDB';
const DB_VERSION = 1;
const STORE_NAME = 'records';
let dbInstance = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (dbInstance) return resolve(dbInstance);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'filename' });
      }
    };
    req.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
    req.onerror = (e) => reject(e.target.error);
  });
}

function saveRecords() {
  // 用 localStorage 作为简单存储（避免 IndexedDB 异步复杂度）
  localStorage.setItem('pp_records_' + STATE.projectId, JSON.stringify(STATE.records));
}

function loadRecords() {
  const data = localStorage.getItem('pp_records_' + STATE.projectId);
  if (data) {
    try { STATE.records = JSON.parse(data); } catch(e) { STATE.records = []; }
  }
}

function updateStats() {
  document.getElementById('topStats').textContent = `已保存: ${STATE.records.length} 张`;
}

// ============================================================
// Excel 下载
// ============================================================
function downloadExcel() {
  const records = STATE.records;
  if (records.length === 0) { showToast('没有数据'); return; }

  const totalQty = records.reduce((s, r) => s + (parseFloat(r.c)||0), 0);
  const totalArea = records.reduce((s, r) => s + (r.area||0), 0);

  // 构建 CSV 内容（Excel 可直接打开）
  let csv = '\uFEFF'; // BOM for UTF-8
  csv += '序号,图片名称,a(长度),b(宽度),c(数量),面积(m²)\n';
  records.forEach((r, i) => {
    csv += `${i+1},${r.filename},${r.a},${r.b},${r.c},${(r.area||0).toFixed(2)}\n`;
  });
  csv += `,合计,-,-,${totalQty},${totalArea.toFixed(2)}\n`;

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const filename = STATE.projectId + '_汇总表_' + formatDateTime() + '.csv';
  downloadToFile(blob, filename);
  showToast('正在下载汇总表...');
}

function formatDateTime() {
  const now = new Date();
  return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
}
