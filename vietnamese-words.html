<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>越南文单词 - Apex's Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{--pri:#7c3aed;--pri-l:#a78bfa;--pri-d:#5b21b6;--bg:#faf5ff;--sf:#fff;--bd:#e9d5ff;--tx:#3b0764;--tx-m:#7c3aed;--ok:#10b981;--no:#ef4444;--wn:#f59e0b}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
        /* Header: 左侧返回按钮 + 右侧用户名 */
        .hdr{background:linear-gradient(135deg,var(--pri-d),var(--pri));color:#fff;padding:.75rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
        .hdr-l{display:flex;align-items:center;gap:.8rem}
        .hdr-r{font-size:.85rem;opacity:.9}
        .btn-back{background:none;border:1px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);border-radius:8px;padding:.35rem .9rem;font-size:.85rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;transition:all .2s}
        .btn-back:hover{background:rgba(255,255,255,.15);color:#fff}
        .hdr h1{font-size:1.2rem;margin:0;font-weight:700}
        /* 主容器 */
        .mc{padding:1.2rem;max-width:1000px;margin:0 auto}
        .mc.wide{max-width:100%;padding:1rem 1.5rem}
        /* 选择区块 */
        .sel-row{display:flex;align-items:center;gap:1rem;padding:1rem;background:var(--sf);border:1px solid var(--bd);border-radius:12px;margin-bottom:1rem;flex-wrap:wrap}
        .sel-label{font-weight:700;color:var(--tx);min-width:70px;font-size:.9rem}
        .sel-btns{display:flex;gap:.5rem;flex-wrap:wrap;flex:1}
        .sel-btn{padding:.45rem 1rem;border:2px solid var(--bd);border-radius:8px;background:var(--sf);cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s}
        .sel-btn:hover{border-color:var(--pri);background:var(--bg)}
        .sel-btn.on{border-color:var(--pri);background:#ede9fe;color:var(--pri-d)}
        .sel-btn .badge{background:var(--pri);color:#fff;padding:.1rem .35rem;border-radius:4px;font-size:.7rem;margin-left:.3rem}
        .sel-btn.loading{opacity:.6;cursor:wait}
        .btn-o{color:var(--pri);border:1.5px solid var(--pri);background:var(--sf);border-radius:8px;padding:.4rem .9rem;font-weight:600;cursor:pointer;font-size:.85rem;transition:all .2s}
        .btn-o:hover{background:var(--pri);color:#fff}
        .btn-p{background:var(--pri);border-color:var(--pri);color:#fff;border-radius:8px;padding:.5rem 1.2rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-size:.9rem}
        .btn-p:hover{background:var(--pri-d)}
        /* 游戏卡片 */
        .cd{border:1px solid var(--bd);border-radius:12px;background:var(--sf);box-shadow:0 2px 8px rgba(124,58,237,.06)}
        .cd-h{background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;border:none;font-weight:600;border-radius:12px 12px 0 0!important;padding:.65rem 1.2rem;font-size:1rem}
        .game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem}
        .game-card{border:2px solid var(--bd);border-radius:12px;padding:1.2rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--sf)}
        .game-card:hover{border-color:var(--pri);background:var(--bg);transform:translateY(-2px);box-shadow:0 4px 12px rgba(124,58,237,.15)}
        .game-card .em{font-size:2rem;margin-bottom:.3rem}
        .game-card .tt{font-size:.95rem;font-weight:700;color:var(--pri)}
        .game-card .st{font-size:.75rem;color:var(--tx-m);margin-top:.2rem}
        .game-card.off{opacity:.4;cursor:not-allowed;pointer-events:none}

        /* ====== 三栏布局（子模块） ====== */
        #sub-layout{display:none}
        #sub-layout.on{display:grid!important;grid-template-columns:220px 1fr 240px;gap:0;align-items:start;width:100vw;margin-left:calc(-50vw + 50%);position:relative}
        /* 左侧栏 */
        .side-l{background:var(--sf);border:1px solid var(--bd);border-radius:0;overflow:hidden;position:sticky;top:0;height:100vh;border-right:1px solid var(--bd)}
        .side-h{background:var(--pri-d);color:#fff;padding:.5rem 1rem;font-size:.85rem;font-weight:700}
        .stat-item{padding:.7rem 1rem;border-bottom:1px solid var(--bd)}
        .stat-item:last-child{border-bottom:none}
        /* 历史记录卡片 */
        .hist-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:.6rem .8rem;margin-bottom:.5rem;font-size:.75rem;line-height:1.5}
        .hist-card .hc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
        .hist-card .hc-type{font-weight:700;font-size:.8rem}
        .hist-card .hc-type.dict{color:var(--pri)}
        .hist-card .hc-type.pron{color:#e67e22}
        .hist-card .hc-score{font-weight:700;font-size:1rem;color:var(--pri)}
        .hist-card .hc-info{color:var(--text-muted);font-size:.7rem}
        .hist-card .hc-info span{margin-right:.6rem}
        .hist-card .hc-wrong{margin-top:.3rem;border-top:1px dashed var(--bd);padding-top:.3rem}
        .hist-card .hc-wrong-title{font-size:.7rem;color:var(--err);font-weight:600;margin-bottom:.2rem}
        .hist-card .hc-w-item{display:inline-flex;align-items:center;gap:.2rem;background:var(--sf);border-radius:4px;padding:.1rem .4rem;margin:.15rem .1rem;font-size:.7rem}
        .hist-card .hc-w-item .hc-w-btn{cursor:pointer;font-size:.8rem;border:none;background:none;padding:0}
        .stat-num{font-size:1.6rem;font-weight:900;color:var(--pri)}
        .stat-lbl{font-size:.75rem;color:var(--tx-m)}
        /* 右侧栏 */
        .side-r{background:var(--sf);border:1px solid var(--bd);border-radius:0;overflow:hidden;position:sticky;top:0;height:100vh;border-left:1px solid var(--bd)}
        .rules-content{padding:.8rem 1rem;font-size:.82rem;color:var(--tx-m);line-height:1.7}
        .rules-content b{color:var(--tx)}
        .rules-content .rule-item{margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px dashed var(--bd)}
        .rules-content .rule-item:last-child{border-bottom:none;margin-bottom:0}
        /* 中间栏 */
        .mid-col{min-width:0;display:flex;flex-direction:column;align-items:center;padding:0 1.5rem}
        .mid-col>#ga,.mid-col>#gr,.mid-col>#pa{width:100%;max-width:600px}

        /* 游戏顶栏 */
        #ga{display:none}
        #ga.on{display:block}
        .gtb{display:flex;justify-content:space-between;align-items:center;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:.5rem .9rem;margin-bottom:.7rem;flex-wrap:wrap;gap:.3rem}
        .gtm{font-size:1.2rem;font-weight:800;color:var(--pri)}
        .gtm.warn{color:var(--no);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .gsc{font-size:.95rem;font-weight:600;color:var(--ok)}
        .gpg{font-size:.82rem;color:var(--tx-m)}
        .gco{font-size:.82rem;color:var(--wn);font-weight:600}

        /* 游戏卡片 */
        .gc{background:var(--sf);border:2px solid var(--bd);border-radius:16px;padding:1.5rem;text-align:center;margin-bottom:.6rem}
        .gc.ok{border-color:var(--ok);background:#f0fdf4}
        .gc.no{border-color:var(--no);background:#fef2f2}
        .g-q{font-size:2.6rem;font-weight:800;color:var(--pri);margin-bottom:.3rem;line-height:1.2}
        .g-hint{font-size:.9rem;color:var(--tx-m);margin-bottom:.5rem;letter-spacing:.1em}
        .g-inp-wrap{display:flex;gap:.6rem;max-width:600px;margin:.8rem auto;align-items:center;flex-wrap:wrap;justify-content:center}
        /* 输入框扩大一倍 */
        .g-inp{flex:1;min-width:320px;padding:.9rem 1.2rem;border:2px solid var(--bd);border-radius:12px;font-size:1.5rem;text-align:center;outline:none;transition:border-color .2s;font-family:'Segoe UI',sans-serif;color:var(--tx);background:var(--sf)}
        .g-inp:focus{border-color:var(--pri)}
        .g-inp.err{border-color:var(--no);background:#fef2f2;animation:shake .3s}
        .g-inp.correct{border-color:var(--ok);background:#f0fdf4}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
        /* 游戏引导文字 */
        .g-guide{text-align:center;font-size:.85rem;color:var(--tx-m);margin:.4rem 0;padding:.3rem;background:var(--bg);border-radius:6px}
        .g-atmpts{margin:.5rem 0;font-size:1rem;color:var(--tx-m);font-weight:600;min-height:1.5em}
        .atm{color:var(--wn);font-weight:800;margin:0 .15em}
        .atm.done{color:var(--no)}
        .atm.ok{color:var(--ok)}
        .g-feedback{margin:.5rem 0;padding:.5rem;border-radius:8px;font-size:.95rem;font-weight:600}
        .g-feedback.err-fb{background:#fee2e2;color:#991b1b}
        .g-feedback.ok-fb{background:#d1fae5;color:#065f46}
        .g-correct-word{margin:.3rem 0;font-size:1rem;color:#6b7280}
        .g-correct-word span{font-weight:700;color:var(--pri)}
        /* 进度条 */
        .g-bar{height:4px;background:var(--bd);border-radius:2px;margin-top:.5rem;overflow:hidden}
        .g-bar-fill{height:100%;background:var(--pri);transition:width .3s ease;border-radius:2px}
        /* 听音按钮组 */
        .speak-btns{display:flex;justify-content:center;gap:.6rem;margin-bottom:.6rem}
        .speak-btn{display:flex;align-items:center;gap:.3rem;padding:.4rem .9rem;border:1.5px solid var(--bd);border-radius:8px;background:var(--sf);cursor:pointer;font-size:.85rem;font-weight:600;color:var(--pri);transition:all .2s}
        .speak-btn:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
        .speak-btn .spd{font-size:.7rem;opacity:.7}
        .speak-btn.speaking{animation:pulse .5s infinite}

        /* 连击特效 */
        .combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.5rem;font-weight:900;color:var(--wn);pointer-events:none;z-index:999;animation:comboFly 1s ease-out forwards;text-shadow:0 0 20px rgba(245,158,11,.5)}
        @keyframes comboFly{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-70%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-100%) scale(1)}}

        /* 结果页 */
        .rs-big{font-size:3rem;font-weight:900;color:var(--pri);margin:.5rem 0}
        .rs-detail{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;max-width:380px;margin:.6rem auto;text-align:left;background:var(--bg);border-radius:10px;padding:.8rem}
        .rs-item{font-size:.88rem;color:var(--tx-m)}
        .rs-item span{font-weight:700;color:var(--tx);float:right}
        .rs-grade{font-size:1.1rem;font-weight:800;margin:.4rem 0}
        .rs-grade.s{color:var(--ok)}.rs-grade.a{color:var(--pri)}.rs-grade.b{color:var(--wn)}.rs-grade.c{color:var(--no)}
        /* 错题表 */
        .wrong-box{margin-top:.8rem;border:1px solid var(--no);border-radius:12px;background:#fef2f2}
        .wrong-h{background:var(--no);color:#fff;padding:.5rem 1rem;border-radius:12px 12px 0 0;font-weight:600;font-size:.9rem}
        .wrong-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem .8rem;border-bottom:1px solid var(--bd)}
        .wrong-item:last-child{border-bottom:none}
        .wrong-word{font-weight:700;color:var(--tx)}
        .wrong-trans{font-size:.82rem;color:var(--tx-m)}
        .wrong-speak{background:var(--pri);color:#fff;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:.9rem}

        /* ====== 跟读 ====== */
        .pwd{text-align:center;padding:1.5rem;background:var(--sf);border:2px solid var(--bd);border-radius:16px;margin-bottom:.8rem}
        .pw{font-size:3rem;font-weight:800;color:var(--pri);margin-bottom:.2rem;font-family:'Arial Unicode MS',sans-serif}
        .ptr{font-size:1.1rem;color:#6b7280;margin-bottom:.3rem}
        .pen{font-size:.8rem;color:#9ca3af;margin-bottom:.8rem}
        .pct{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:.6rem}
        .pb{width:52px;height:52px;border-radius:50%;border:2px solid var(--pri);background:var(--sf);color:var(--pri);font-size:1.3rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
        .pb:hover{background:var(--pri);color:#fff}
        .pb.spk{animation:pulse .5s infinite;background:var(--pri);color:#fff}
        .pb.rec{animation:pulse .5s infinite;border-color:var(--no);color:var(--no)}
        .pf{text-align:center;padding:.6rem;border-radius:8px;font-weight:600;font-size:1rem;margin-top:.4rem;min-height:3rem;display:flex;align-items:center;justify-content:center}
        .pf.great{background:#d1fae5;color:#065f46}.pf.good{background:#fef9c3;color:#854d0e}
        .pf.bad{background:#fee2e2;color:#991b1b}.pf.wait{background:var(--bg);color:var(--tx-m)}
        .phint{text-align:center;color:var(--tx-m);font-size:.78rem;margin-top:.3rem}
        .rec-btns{display:flex;justify-content:center;gap:.5rem;margin-bottom:.5rem}

        /* 加载状态 */
        .loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
        .loading-spinner{width:50px;height:50px;border:4px solid var(--bd);border-top-color:var(--pri);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{margin-top:1rem;color:var(--tx-m);font-size:.9rem}

        @media(max-width:900px){#sub-layout.on{grid-template-columns:1fr}.side-l,.side-r{display:none}}
        @media(max-width:768px){
            .hdr h1{font-size:1rem}
            .g-q{font-size:2rem}.pw{font-size:2.2rem}
            .gc,.pwd{padding:1rem}.g-inp{min-width:180px;font-size:1.2rem;padding:.7rem 1rem}
            .rs-detail{grid-template-columns:1fr}
            .sel-row{flex-direction:column;align-items:flex-start}
            #sub-layout.on{grid-template-columns:1fr}
            .side-l,.side-r{display:none}
        }
    </style>
</head>
<body>
    <!-- Header: 左侧返回 + 右侧用户 -->
    <div class="hdr">
        <div class="hdr-l">
            <a class="btn-back" onclick="goBack()">← 返回</a>
            <h1>🇻🇳 越南文单词</h1>
        </div>
        <div class="hdr-r" id="ud">👤 游客</div>
    </div>

    <div class="mc">
        <!-- ====== 主页面：选择词库 + 游戏选择 ====== -->
        <div id="main-page">
            <!-- 选择词库 -->
            <div class="sel-row">
                <span class="sel-label">选择词库:</span>
                <div class="sel-btns" id="vocabBtns">
                    <!-- 动态生成词库按钮 -->
                </div>
                <div style="display:flex;gap:.5rem">
                    <button class="btn-o" onclick="refreshVocabList()">🔄 刷新</button>
                </div>
            </div>

            <!-- 游戏选择 -->
            <div class="cd">
                <div class="cd-h">🎮 选择游戏</div>
                <div class="cd-body" style="padding:1rem">
                    <div class="game-grid">
                        <div class="game-card" onclick="startGame('dictation')">
                            <div class="em">✍️</div>
                            <div class="tt">单词听写</div>
                            <div class="st" id="dictation-desc">看中文写越南文</div>
                        </div>
                        <div class="game-card" onclick="startGame('pron')">
                            <div class="em">🎤</div>
                            <div class="tt">单词跟读</div>
                            <div class="st" id="pron-desc">听发音跟读练习</div>
                        </div>
                        <div class="game-card off">
                            <div class="em">📝</div>
                            <div class="tt">拼写挑战</div>
                            <div class="st">敬请期待</div>
                        </div>
                        <div class="game-card off">
                            <div class="em">🎯</div>
                            <div class="tt">词汇接龙</div>
                            <div class="st">敬请期待</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ====== 子模块三栏布局 ====== -->
        <div id="sub-layout">
            <!-- 左侧：历史成绩 -->
            <div class="side-l" id="side-left">
                <div class="side-h">📊 历史成绩</div>
                <div id="hist-list" style="padding:.5rem;overflow-y:auto;max-height:calc(100vh - 2rem)">
                    <div style="text-align:center;color:var(--text-muted);padding:1rem">暂无记录</div>
                </div>
            </div>

            <!-- 中间：游戏区 -->
            <div class="mid-col" id="mid-area">
                <!-- 单词听写 -->
                <div id="ga">
                    <div class="gtb">
                        <div class="gtm" id="gtm">⏱ 5:00</div>
                        <div class="gco" id="gco">🔥 0连击</div>
                        <div class="gpg" id="gpg">0 / 120</div>
                        <div class="gsc" id="gsc">0 分</div>
                    </div>
                    <div class="gc" id="gcard">
                        <div class="g-q" id="g-q">-</div>
                        <div class="g-hint" id="g-hint">提示：* _ _ _</div>
                        <div class="g-guide" id="g-guide">点击 🔊 听发音 → 输入越南文 → 按 Enter 提交</div>
                        <div class="g-atmpts" id="g-atmpts">● ● ● 还剩 3 次机会</div>
                        <div class="g-inp-wrap">
                            <input class="g-inp" id="g-inp" type="text" placeholder="输入越南文后按回车..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                        </div>
                        <div class="speak-btns">
                            <button class="speak-btn" id="spk-slow" onclick="playCur('slow')">
                                🐢 慢速 🔊 <span class="spd">×0.5</span>
                            </button>
                            <button class="speak-btn" id="spk-norm" onclick="playCur('normal')">
                                🐰 正常 🔊
                            </button>
                        </div>
                        <div class="g-feedback" id="g-fb" style="display:none"></div>
                        <div class="g-correct-word" id="g-cw" style="display:none"></div>
                        <div class="g-bar"><div class="g-bar-fill" id="g-bar-fill" style="width:0%"></div></div>
                    </div>
                    <div style="display:flex;justify-content:center;gap:.8rem">
                        <button class="btn-p" onclick="confirmQuit()">⏹ 结束游戏</button>
                    </div>
                </div>

                <!-- 结果页 -->
                <div id="gr" style="display:none">
                    <div class="cd">
                        <div class="cd-h">🎉 游戏结束！</div>
                        <div class="cd-body" style="padding:1.2rem;text-align:center">
                            <div id="rs-score" class="rs-big">0</div>
                            <div id="rs-grade" class="rs-grade"></div>
                            <div class="rs-detail" id="rs-detail"></div>
                            <button class="btn-p" onclick="goBack()" style="margin-top:.8rem">← 返回</button>
                        </div>
                    </div>
                    <div id="wrongBox" class="wrong-box" style="display:none">
                        <div class="wrong-h">❌ 错题回顾</div>
                        <div id="wrongItems"></div>
                    </div>
                </div>

                <!-- 单词跟读 -->
                <div id="pa" style="display:none">
                    <div class="gtb">
                        <div class="gtm">🎤 单词跟读</div>
                        <div class="gpg" id="p-pg">1 / 50</div>
                        <div class="gsc" id="p-score">0 分</div>
                    </div>
                    <div class="pwd">
                        <div class="pw" id="pw">加载中...</div>
                        <div class="ptr" id="ptr">-</div>
                        <div class="pen" id="pen"></div>
                        <div class="speak-btns">
                            <button class="speak-btn" id="pspk-slow" onclick="playWS('slow')">
                                🐢 慢速 🔊 <span class="spd">×0.5</span>
                            </button>
                            <button class="speak-btn" id="pspk-norm" onclick="playWS('normal')">
                                🐰 正常 🔊
                            </button>
                        </div>
                        <div class="rec-btns">
                            <button class="pb" id="br" onclick="startRec()" title="开始录音">🎙️</button>
                            <button class="pb" id="bplay" onclick="playMyRec()" title="播放录音" style="opacity:.4;pointer-events:none">🔊</button>
                        </div>
                        <div class="pf wait" id="pf">点击 🔊 听发音 → 🎙 录音跟读</div>
                        <div class="phint">建议使用 Chrome 浏览器以获得最佳语音识别效果</div>
                    </div>
                    <div style="display:flex;justify-content:center;gap:.8rem;margin-bottom:.7rem">
                        <button class="btn-o" onclick="pPrev()">← 上一题</button>
                        <button class="btn-p" onclick="pNext()">下一题 →</button>
                    </div>

                </div>
            </div>

            <!-- 右侧：规则 -->

    /* ========== IndexedDB 操作 ========== */
    function initIndexedDB(){
        return new Promise(function(resolve, reject){
            var request = indexedDB.open(DB_NAME, DB_VERSION);
            
            request.onerror = function(){
                reject(request.error);
            };
            
            request.onsuccess = function(){
                idb = request.result;
                resolve();
            };
            
            request.onupgradeneeded = function(event){
                var database = event.target.result;
                // 词库元数据存储
                if (!database.objectStoreNames.contains('vocab_meta')){
                    database.createObjectStore('vocab_meta', {keyPath: 'id'});
                }
                // 词库分片存储
                if (!database.objectStoreNames.contains('vocab_chunks')){
                    var chunkStore = database.createObjectStore('vocab_chunks', {keyPath: 'key'});
                    chunkStore.createIndex('vocabId', 'vocabId', {unique: false});
                }
            };
        });
    }

    function getFromIDB(storeName, key){
        return new Promise(function(resolve, reject){
            if (!idb) { resolve(null); return; }
            var tx = idb.transaction(storeName, 'readonly');
            var store = tx.objectStore(storeName);
            var request = store.get(key);
            request.onsuccess = function(){ resolve(request.result); };
            request.onerror = function(){ reject(request.error); };
        });
    }

    function putToIDB(storeName, data){
        return new Promise(function(resolve, reject){
            if (!idb) { resolve(); return; }
            var tx = idb.transaction(storeName, 'readwrite');
            var store = tx.objectStore(storeName);
            var request = store.put(data);
            request.onsuccess = function(){ resolve(); };
            request.onerror = function(){ reject(request.error); };
        });
    }

    function getChunksByVocabId(vocabId){
        return new Promise(function(resolve, reject){
            if (!idb) { resolve([]); return; }
            var tx = idb.transaction('vocab_chunks', 'readonly');
            var store = tx.objectStore('vocab_chunks');
            var index = store.index('vocabId');
            var request = index.getAll(vocabId);
            request.onsuccess = function(){ 
                var chunks = request.result || [];
                // 按 index 排序
                chunks.sort(function(a, b){ return a.index - b.index; });
                resolve(chunks);
            };
            request.onerror = function(){ reject(request.error); };
        });
    }

    /* ========== 词库加载 ========== */
    function loadVocabRegistry(){
        return new Promise(function(resolve, reject){
            // 先尝试从本地缓存读取
            getFromIDB('vocab_meta', '_registry').then(function(cached){
                if (cached && cached.data){
                    VOCAB_REGISTRY = cached.data;
                    console.log('[Registry] 从 IndexedDB 加载:', Object.keys(VOCAB_REGISTRY));
                }
                
                // 从 Firebase 获取最新注册表
                if (db){
                    return db.collection('vocab_registry').get();
                } else {
                    throw new Error('Firebase 未初始化');
                }
            }).then(function(snapshot){
                var registry = {};
                snapshot.forEach(function(doc){
                    registry[doc.id] = doc.data();
                });
                
                // 检查是否有更新
                var hasUpdate = false;
                for (var id in registry){
                    if (!VOCAB_REGISTRY[id] || 
                        VOCAB_REGISTRY[id].updatedAt !== registry[id].updatedAt){
                        hasUpdate = true;
                        break;
                    }
                }
                
                VOCAB_REGISTRY = registry;
                
                // 缓存到 IndexedDB
                return putToIDB('vocab_meta', {id: '_registry', data: VOCAB_REGISTRY, cachedAt: Date.now()});
            }).then(function(){
                resolve();
            }).catch(function(err){
                console.warn('[Registry] 从 Firebase 加载失败，使用缓存:', err);
                if (Object.keys(VOCAB_REGISTRY).length > 0){
                    resolve(); // 有缓存，继续
                } else {
                    reject(err);
                }
            });
        });
    }

    function loadVocabData(vocabId){
        return new Promise(function(resolve, reject){
            // 1. 检查内存缓存
            if (VOCAB_CACHE[vocabId]){
                console.log('[Vocab] 从内存缓存加载:', vocabId);
                resolve(VOCAB_CACHE[vocabId]);
                return;
            }
            
            // 2. 从本地 JS 文件加载
            if (typeof VN_VOCAB !== 'undefined' && VN_VOCAB[vocabId]){
                var words = VN_VOCAB[vocabId].map(function(w){
                    return {word: w[0], translation: w[1], translation_en: w[2], is_sino: w[3]};
                });
                VOCAB_CACHE[vocabId] = words;
                console.log('[Vocab] 从本地 JS 加载:', vocabId, words.length, '词');
                resolve(words);
                // 后台尝试从 Firebase 更新缓存
                tryUpdateFromFirebase(vocabId);
                return;
            }
            
            // 3. 从 IndexedDB 缓存加载
            var meta = VOCAB_REGISTRY[vocabId];
            getChunksByVocabId(vocabId).then(function(chunks){
                var needed = meta ? meta.chunks : 0;
                if (needed > 0 && chunks.length >= needed){
                    var words = [];
                    chunks.forEach(function(chunk){ words = words.concat(chunk.words); });
                    VOCAB_CACHE[vocabId] = words;
                    console.log('[Vocab] 从 IndexedDB 加载:', vocabId, words.length, '词');
                    resolve(words);
                    return;
                }
                // 4. 最后尝试 Firebase 下载
                if (db && meta){
                    downloadVocabFromFirebase(vocabId, meta).then(resolve).catch(reject);
                } else {
                    reject(new Error('词库 ' + vocabId + ' 不可用'));
                }
            });
        });
    }

    function tryUpdateFromFirebase(vocabId){
        if (!db) return;
        var meta = VOCAB_REGISTRY[vocabId];
        if (!meta) return;
        var cacheWords = VOCAB_CACHE[vocabId] || [];
        if (cacheWords.length >= (meta.count || 0)) return; // 本地已是最新的
        console.log('[Vocab] 后台从 Firebase 更新:', vocabId);
        downloadVocabFromFirebase(vocabId, meta).then(function(words){
            if (words.length > cacheWords.length){
                VOCAB_CACHE[vocabId] = words;
                console.log('[Vocab] Firebase 更新完成:', vocabId, words.length, '词');
            }
        }).catch(function(){});
    }

    function downloadVocabFromFirebase(vocabId, meta){
        return new Promise(function(resolve, reject){
            if (!db){
                reject(new Error('Firebase 未初始化'));
                return;
            }
            
            var promises = [];
            for (var i = 0; i < meta.chunks; i++){
                var chunkDocId = vocabId + '_' + String(i).padStart(3, '0');
                promises.push(db.collection('vocab_data').doc(chunkDocId).get());
            }
            
            Promise.all(promises).then(function(docs){
                var words = [];
                var chunkData = [];
                
                docs.forEach(function(doc, idx){
                    if (doc.exists){
                        var data = doc.data();
                        chunkData.push({
                            key: vocabId + '_' + String(idx).padStart(3, '0'),
                            vocabId: vocabId,
                            index: idx,
                            words: data.words
                        });
                        words = words.concat(data.words);
                    }
                });
                
                // 缓存分片到 IndexedDB
                var cachePromises = chunkData.map(function(chunk){
                    return putToIDB('vocab_chunks', chunk);
                });
                
                return Promise.all(cachePromises).then(function(){
                    return words;
                });
            }).then(function(words){
                resolve(words);
            }).catch(function(err){
                reject(err);
            });
        });
    }

            el.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:1rem">暂无记录</div>';

        var show = filtered.slice(0, 20);
        show.forEach(function(r){
            var d = new Date(r.date);
            var timeStr = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());

                html += '<div class="hc-top"><span class="hc-type dict">✍️ 听写</span><span class="hc-score">' + r.score + '分</span></div>';
                html += '<div class="hc-info"><span>👤 ' + (r.user || '游客') + '</span><span>🕐 ' + timeStr + '</span></div>';
                html += '<div class="hc-info"><span>✅ 正确 ' + correctInfo + '</span><span>🎯 准确率 ' + acc + '%</span><span>🔥 连击 ' + r.maxCombo + '</span></div>';
                if (r.wrongWords && r.wrongWords.length){
                    html += '<div class="hc-wrong"><div class="hc-wrong-title">❌ 错词 (' + r.wrongWords.length + ')</div>';
                    r.wrongWords.forEach(function(w){
                        html += '<span class="hc-w-item">' + w.word + '<button class="hc-w-btn" onclick="speakWord(\'' + w.word.replace(/'/g, "\\'") + '\')">🔊</button></span>';
                    });

            } else if (r.type === 'pronunciation_round'){
                html += '<div class="hist-card">';
                html += '<div class="hc-top"><span class="hc-type pron">🎤 跟读</span><span class="hc-score">' + r.score + '分</span></div>';
                html += '<div class="hc-info"><span>👤 ' + (r.user || '游客') + '</span><span>🕐 ' + timeStr + '</span></div>';

                    });
                    html += '</div>';
                }

            }

    function showWord(){

        G.currentWord = G.words[G.index];

        var remain = G.maxAttempts - G.attempts;

            var cls = i < G.attempts ? 'atm done' : 'atm';
            html += '<span class="' + cls + '">●</span> ';
        }
        var txt = remain === 3 ? '还有 3 次机会' : remain === 2 ? '还有 2 次机会' : remain === 1 ? '还有 1 次机会' : '机会用完';
        document.getElementById('g-atmpts').innerHTML = html + txt;
    }

    function submitAnswer(){
        if (G.done || !G.playing) return;
        var ans = document.getElementById('g-inp').value.trim().toLowerCase();
        G.done = true;
        var correct = (G.currentWord.word || '').toLowerCase().trim();
        G.attempts++;
        updateAttempts();

        var inpEl = document.getElementById('g-inp');
        var fbEl = document.getElementById('g-fb');
        var cwEl = document.getElementById('g-cw');

        if (ans === correct){
            G.correct++; G.total++; G.combo++;
            if (G.combo > G.maxCombo) G.maxCombo = G.combo;
            G.score = Math.min(Math.round(G.correct * 0.4), 20) + Math.min(G.combo, 20);

            inpEl.className = 'g-inp correct'; inpEl.disabled = true;
            fbEl.textContent = '✅ 正确！'; fbEl.className = 'g-feedback ok-fb'; fbEl.style.display = 'block';
            cwEl.innerHTML = '<span style="font-size:2.5rem;font-weight:800;color:var(--pri)">' + G.currentWord.word + '</span>';
            cwEl.style.display = 'block';
            document.getElementById('gcard').className = 'gc ok';
            document.getElementById('gco').textContent = '🔥 ' + G.combo + '连击';
            document.getElementById('gsc').textContent = G.score + ' 分';
            showComboEffect(G.combo > 1 && G.combo % 5 === 0 ? '🔥 ' + G.combo + '连击！' : '✓');
            playCur('normal');
            setTimeout(function(){G.index++; showWord();}, 1800);
        } else {
            G.combo = 0;
            document.getElementById('gco').textContent = '🔥 0连击';
            inpEl.className = 'g-inp err';
            playCur('normal');

            if (G.attempts >= G.maxAttempts){
                G.wrong++; G.total++;
                G.wrongWords.push(G.currentWord);
                inpEl.disabled = true;
                fbEl.textContent = '❌ 正确答案：'; fbEl.className = 'g-feedback err-fb'; fbEl.style.display = 'block';
                cwEl.innerHTML = '<span style="font-size:2.5rem;font-weight:800;color:var(--no)">' + G.currentWord.word + '</span> <small style="font-size:.9rem;color:#6b7280">(' + G.currentWord.translation_en + ')</small>';
                cwEl.style.display = 'block';
                document.getElementById('gcard').className = 'gc no';
                showComboEffect('✗');

                var remain = G.maxAttempts - G.attempts;
                fbEl.textContent = '❌ 不对，' + remain + '次机会'; fbEl.className = 'g-feedback err-fb'; fbEl.style.display = 'block';
                G.done = false;
                inpEl.value = ''; inpEl.className = 'g-inp'; inpEl.focus();
            }
        }

            speechSynthesis.cancel(); speechSynthesis.speak(u);
            // 原生 TTS 无法捕获音频，后台静默获取 Google TTS 用于对比
            prefetchTTSBuffer(w);

    // 静默预取 TTS 音频用于对比评分（通过 CORS 代理，尽力而为）
    function prefetchTTSBuffer(word){
        var ttsUrl = 'https://translate.google.com/translate_tts?ie=UTF-8&q=' + encodeURIComponent(word) + '&tl=vi&client=tw-ob';
        var proxies = [
            'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(ttsUrl),
            'https://thingproxy.freeboard.io/fetch/' + ttsUrl
        ];
        function tryProxy(idx){
            if (idx >= proxies.length) return; // 静默失败，用时长评分兜底
            try{
                var xhr = new XMLHttpRequest();
                xhr.open('GET', proxies[idx], true);
                xhr.responseType = 'arraybuffer';
                xhr.timeout = 6000;
                xhr.onload = function(){
                    if (xhr.status === 200 && xhr.response.byteLength > 100){
                        var actx = new (window.AudioContext || window.webkitAudioContext)();
                        actx.decodeAudioData(xhr.response, function(buf){
                            _ttsAudioBuffer = buf;
                            console.log('[预取] TTS音频已获取，时长:' + buf.duration.toFixed(2) + 's');
                            actx.close();
                        }, function(){actx.close();});
                    }
                };
                xhr.onerror = function(){};
                xhr.ontimeout = function(){};
                xhr.send();
            }catch(e){}
        }
        tryProxy(0);
    }

    function playGoogleTTS(word, rate, btn){
        if (_ttsAudio){ _ttsAudio.pause(); _ttsAudio = null; }
        var url = 'https://translate.google.com/translate_tts?ie=UTF-8&q=' + encodeURIComponent(word) + '&tl=vi&client=tw-ob';
        var audio = new Audio(url);
        audio.playbackRate = rate;
        var t0 = 0;
        audio.onplay = function(){ t0 = Date.now(); };
        audio.onended = function(){
            if (t0) P.lastTTSDuration = (Date.now() - t0) / 1000;
            if (btn) btn.classList.remove('speaking');
            _ttsAudio = null;
        };
        audio.onerror = function(){
            console.error('Google TTS 加载失败，尝试备用');
            if (btn) btn.classList.remove('speaking');
            _ttsAudio = null;
        };
        _ttsAudio = audio;
        audio.play().catch(function(e){
            console.error('Google TTS play 失败:', e);
            if (btn) btn.classList.remove('speaking');
            _ttsAudio = null;
        });
    }

    function doStartRec(){
        if (P.activeRec){try{P.activeRec.abort();}catch(e){}}
        if (P.recBusy) return;

        // 短音节（< 1s）用 MediaRecorder + 音量检测，不走 SpeechRecognition

    // ---- 短音节录音：MediaRecorder + 音量检测 ----
    function doShortWordRec(ttsDur){
        var recDur = Math.max(2000, Math.round(ttsDur * 4000)); // 录音时长 = TTS × 4，最短 2s
        document.getElementById('pf').className = 'pf wait';
        document.getElementById('pf').textContent = '🎤 录音中（' + Math.round(recDur/1000) + '秒）...请朗读';
        document.getElementById('br').classList.add('rec');

        navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream){
            var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var source = audioCtx.createMediaStreamSource(stream);
            var analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);

            var mr = new MediaRecorder(stream);
            var ch = [];
            var hasSound = false;
            mr.ondataavailable = function(e){if(e.data.size>0) ch.push(e.data);};
            var checkInterval = setInterval(function(){
                var data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                var sum = 0;
                for (var i = 0; i < data.length; i++) sum += data[i];
                var avg = sum / data.length;
                if (avg > 15) hasSound = true; // 有声音
            }, 100);

            mr.onstop = function(){
                clearInterval(checkInterval);
                source.disconnect();
                audioCtx.close();
                stream.getTracks().forEach(function(t){t.stop();});
                document.getElementById('br').classList.remove('rec');
                P.recBusy = false;
                if (ch.length){
                    var blob = new Blob(ch, {type: mr.mimeType});
                    saveRecBlob(blob);
                    if (hasSound){
                        // 有声音 → 尝试音频对比评分
                        document.getElementById('pf').textContent = '📊 对比评分中...';
                        compareAndScore(blob, function(result){
                            if (result) showAudioScore(result);
                            else {
                                document.getElementById('pf').className = 'pf good';
                                document.getElementById('pf').textContent = '✅ 已检测到声音！点击 🔊 回听对比';
                            }
                        });
                    } else {
                        document.getElementById('pf').className = 'pf wait';
                        document.getElementById('pf').textContent = '🔇 未检测到声音，请靠近麦克风再试';
                    }
                } else {
                    var word = P.words[P.index] ? P.words[P.index].word : '';
                    document.getElementById('pf').className = 'pf good';
                    document.getElementById('pf').textContent = '✅ 已录音！点击 🔊 回听对比';
                }
            };
            mr.start();
            setTimeout(function(){if (mr.state === 'recording') mr.stop();}, recDur);
        }).catch(function(e){
            P.recBusy = false;
            document.getElementById('br').classList.remove('rec');
            console.error('短音节录音失败:', e);
            document.getElementById('pf').className = 'pf bad';
            document.getElementById('pf').textContent = '❌ 录音失败，请重试';
        });
    }

    // ---- 长单词录音：SpeechRecognition + MediaRecorder 并行 ----
    function doLongWordRec(dur){
        var timeout = Math.max(3000, Math.min(8000, Math.round(dur * 5000)));
        var rec = new SpeechRec();
        rec.lang = 'vi-VN';
        rec.interimResults = false;
        rec.maxAlternatives = 5;
        rec.continuous = false;
        try { rec.speechDetectionTimeout = 1500; } catch(e){}
        P.activeRec = rec;
        var br = document.getElementById('br'); br.classList.add('rec');
        document.getElementById('pf').className = 'pf wait';
        document.getElementById('pf').textContent = '🔴 录音中...请朗读';

        var scored = false;
        var mrStream = null, mr = null, mrChunks = [];

        // 同时用 MediaRecorder 录音，供回放和音频对比
        navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream){
            mrStream = stream;
            mr = new MediaRecorder(stream);
            mr.ondataavailable = function(e){if(e.data.size>0) mrChunks.push(e.data);};
            mr.start();
        }).catch(function(e){console.warn('并行录音启动失败:', e);});

        function stopMr(){
            if (mr && mr.state === 'recording'){
                mr.onstop = function(){
                    if (mrChunks.length) saveRecBlob(new Blob(mrChunks, {type: mr.mimeType}));
                    if (mrStream) mrStream.getTracks().forEach(function(t){t.stop();});
                };
                mr.stop();
            } else if (mrStream){
                mrStream.getTracks().forEach(function(t){t.stop();});
            }
        }

        rec.onresult = function(e){
            br.classList.remove('rec'); P.activeRec = null; P.recBusy = false;
            var rs = [];
            for (var i = 0; i < e.results[0].length; i++) rs.push(e.results[0][i].transcript.trim().toLowerCase());
            scored = true;
            stopMr();
            scorePron(rs);
        };
        rec.onerror = function(err){
            br.classList.remove('rec'); P.activeRec = null; P.recBusy = false;
            stopMr();
            if (err.error === 'not-allowed' || err.error === 'service-not-allowed'){
                console.warn('SpeechRecognition 不可用，切换到录音模式:', err.error);
                startRecFallback();
            } else if (err.error === 'no-speech'){
                document.getElementById('pf').className = 'pf wait';
                document.getElementById('pf').textContent = '🔇 没听清，请靠近麦克风再试一次';
            } else if (err.error === 'aborted'){
                if (!scored){
                    document.getElementById('pf').className = 'pf wait';
                    document.getElementById('pf').textContent = '⏱ 超时，请再点一次麦克风';
                }
            } else {
                document.getElementById('pf').className = 'pf bad';
                document.getElementById('pf').textContent = '⚠️ 识别失败，请重试';
            }
        };
        rec.onend = function(){
            br.classList.remove('rec');
            if (P.activeRec === rec){P.activeRec = null; P.recBusy = false;}
        };
        try{rec.start();}catch(e){br.classList.remove('rec'); P.activeRec = null; P.recBusy = false;
            stopMr();
            document.getElementById('pf').className = 'pf bad';
            document.getElementById('pf').textContent = '❌ 无法开始识别，请刷新页面';
        }
        setTimeout(function(){if (P.activeRec === rec && !scored){try{rec.stop();}catch(e){}}}, timeout);
    }

    function stripVietTones(s){
        return s.normalize('NFD').replace(/[\u0300-\u036f\u0302\u0306\u0309\u0323\u031B]/g, '')
            .replace(/đ/g, 'd').replace(/Đ/g, 'D');
    }

    function scorePron(results){
        var tgt = P.words[P.index].word.toLowerCase().trim();
        var tgtNoTone = stripVietTones(tgt);
        var best = 0; var detail = '';
        for (var i = 0; i < results.length; i++){
            var r = results[i].toLowerCase().trim();
            var rNoTone = stripVietTones(r);
            if (r === tgt){best = 100; detail = '发音完全正确！'; break;}
            if (rNoTone === tgtNoTone){
                var toneScore = 90;
                if (best < toneScore){best = toneScore; detail = '声调略有偏差，字母正确';}
            }
            var simNoTone = similarity(rNoTone, tgtNoTone);
            var scNoTone = Math.round(simNoTone * 95);
            var simOrig = similarity(r, tgt);
            var scOrig = Math.round(simOrig * 100);
            var sc = Math.max(scNoTone, scOrig);
            if (sc > best){
                best = sc;
                if (sc >= 80) detail = '发音接近，细微差别';
                else if (sc >= 60) detail = '部分正确，继续练习';
                else detail = '差异较大，注意听原音';
            }
        }
        var cls = best >= 85 ? 'great' : best >= 60 ? 'good' : 'bad';
        var msg = best >= 85 ? '🌟 太棒了！' : best >= 60 ? '👍 不错！' : '💪 再试一次';
        var detailTxt = detail ? ' (' + detail + ')' : '';
        document.getElementById('pf').className = 'pf ' + cls;
        document.getElementById('pf').textContent = best + '分 - ' + msg + detailTxt;
        var brEl = document.getElementById('br');
        if (brEl) brEl.classList.remove('rec');
        P.totalScore += best;
        document.getElementById('p-score').textContent = P.totalScore + ' 分';
        if (best < 80){P.lowScores.push(P.words[P.index]);}
        savePronRecord(P.words[P.index].word, P.words[P.index].translation, best);
        if (P.index >= P.words.length - 1){showPronComplete();}
    }

    /* ========== 音频对比评分引擎 ========== */
    // 将 Blob 解码为 AudioBuffer
    function decodeBlob(blob, cb){
        var r = new FileReader();
        r.onload = function(){
            var actx = new (window.AudioContext || window.webkitAudioContext)();
            actx.decodeAudioData(r.result, function(buf){cb(buf); actx.close();}, function(e){console.error('解码失败:',e); cb(null); actx.close();});
        };
        r.readAsArrayBuffer(blob);
    }

    // 提取单声道 Float32Array，重采样到指定长度
    function resampleData(buffer, targetLen){
        var raw = buffer.getChannelData(0);
        var out = new Float32Array(targetLen);
        var ratio = raw.length / targetLen;
        for (var i = 0; i < targetLen; i++){
            var idx = Math.floor(i * ratio);
            out[i] = raw[Math.min(idx, raw.length - 1)];
        }
        return out;
    }

    // 计算 RMS 能量
    function rms(arr){
        var s = 0;
        for (var i = 0; i < arr.length; i++) s += arr[i] * arr[i];
        return Math.sqrt(s / arr.length);
    }

    // 归一化
    function normalize(arr){
        var r = rms(arr);
        if (r < 1e-6) return arr;
        var out = new Float32Array(arr.length);
        for (var i = 0; i < arr.length; i++) out[i] = arr[i] / r;
        return out;
    }

    // 提取频谱特征 (FFT 幅度谱)
    function spectralFeatures(data, sampleRate, frameSize, hopSize){
        var frames = [];
        for (var i = 0; i + frameSize <= data.length; i += hopSize){
            var frame = new Float32Array(frameSize);
            for (var j = 0; j < frameSize; j++) frame[j] = data[i + j];
            // 汉宁窗
            for (var j = 0; j < frameSize; j++) frame[j] *= 0.5 * (1 - Math.cos(2 * Math.PI * j / (frameSize - 1)));
            // FFT（简化：用 DFT 只取前 64 个频点，减少计算量）
            var nBins = 64;
            var mag = new Float32Array(nBins);
            for (var k = 0; k < nBins; k++){
                var re = 0, im = 0;
                for (var n = 0; n < frameSize; n++){
                    var angle = 2 * Math.PI * k * n / frameSize;
                    re += frame[n] * Math.cos(angle);
                    im -= frame[n] * Math.sin(angle);
                }
                mag[k] = Math.sqrt(re * re + im * im);
            }
            frames.push(mag);
        }
        return frames;
    }

    // 余弦相似度
    function cosineSim(a, b){
        var dot = 0, na = 0, nb = 0;
        var len = Math.min(a.length, b.length);
        for (var i = 0; i < len; i++){dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i];}
        if (na < 1e-12 || nb < 1e-12) return 0;
        return dot / (Math.sqrt(na) * Math.sqrt(nb));
    }

    // DTW 对齐两帧序列，返回距离
    function dtwDistance(seqA, seqB){
        var n = seqA.length, m = seqB.length;
        if (n === 0 || m === 0) return 1;
        // 限制带宽加速
        var w = Math.max(5, Math.abs(n - m));
        var INF = 1e9;
        var dp = [];
        for (var i = 0; i <= n; i++){dp[i] = []; for(var j=0;j<=m;j++) dp[i][j] = INF;}
        dp[0][0] = 0;
        for (var i = 1; i <= n; i++){
            for (var j = Math.max(1, i - w); j <= Math.min(m, i + w); j++){
                var cost = 1 - cosineSim(seqA[i-1], seqB[j-1]);
                dp[i][j] = cost + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
            }
        }
        return dp[n][m] / Math.max(n, m);
    }

    // 能量包络相似度
    function envelopeSim(buf1, buf2){
        var targetLen = 200;
        var d1 = resampleData(buf1, targetLen);
        var d2 = resampleData(buf2, targetLen);
        // 计算 10 帧能量包络
        var segLen = Math.floor(targetLen / 10);
        var e1 = [], e2 = [];
        for (var i = 0; i < 10; i++){
            var s1 = 0, s2 = 0;
            for (var j = 0; j < segLen; j++){
                var idx = i * segLen + j;
                s1 += d1[idx] * d1[idx];
                s2 += d2[idx] * d2[idx];
            }
            e1.push(Math.sqrt(s1 / segLen));
            e2.push(Math.sqrt(s2 / segLen));
        }
        // 归一化后余弦相似度
        return cosineSim(e1, e2);
    }

    // 主对比函数：有TTS原音时做频谱对比，无则用独立声学分析评分
    function compareAndScore(userBlob, cb){
        var ttsDur = P.lastTTSDuration || 0;
        decodeBlob(userBlob, function(userBuf){
            if (!userBuf){cb(null); return;}
            try{
                // ---- 方案A：有TTS原音 → 频谱DTW对比 ----
                if (_ttsAudioBuffer){
                    var envSim = envelopeSim(_ttsAudioBuffer, userBuf);
                    var envScore = Math.round(envSim * 100);
                    var dur1 = _ttsAudioBuffer.length / _ttsAudioBuffer.sampleRate;
                    var dur2 = userBuf.length / userBuf.sampleRate;
                    var targetSamples = 8000;
                    var d1 = normalize(resampleData(_ttsAudioBuffer, targetSamples));
                    var d2 = normalize(resampleData(userBuf, targetSamples));
                    var frameSize = 256, hopSize = 128;
                    var feat1 = spectralFeatures(d1, _ttsAudioBuffer.sampleRate, frameSize, hopSize);
                    var feat2 = spectralFeatures(d2, _ttsAudioBuffer.sampleRate, frameSize, hopSize);
                    var dtwDist = dtwDistance(feat1, feat2);
                    var specScore = Math.round(Math.max(0, (1 - dtwDist)) * 100);
                    var durRatio = Math.min(dur1, dur2) / Math.max(dur1, dur2);
                    var durScore = Math.round(durRatio * 100);
                    var finalScore = Math.round(envScore * 0.3 + specScore * 0.5 + durScore * 0.2);
                    finalScore = Math.max(20, Math.min(98, finalScore));
                    var detail = finalScore >= 85 ? '发音接近原音' : finalScore >= 65 ? '部分相似，注意声调' : finalScore >= 45 ? '差异较大，仔细听原音' : '发音差异明显，多听多练';
                    console.log('[频谱对比] 包络:'+envScore+' 频谱:'+specScore+' 时长:'+durScore+' → '+finalScore);
                    cb({score: finalScore, detail: detail});
                    return;
                }

                // ---- 方案B：无TTS原音 → 独立声学分析评分 ----
                var raw = userBuf.getChannelData(0);
                var recDur = userBuf.length / userBuf.sampleRate;

                // 1) 时长匹配分（40%权重）
                var durScore2 = 50;
                if (ttsDur > 0){
                    var ratio = recDur / ttsDur;
                    if (ratio >= 0.6 && ratio <= 2.0) durScore2 = 100;
                    else if (ratio >= 0.4 && ratio <= 3.0) durScore2 = 70;
                    else durScore2 = 40;
                }

                // 2) 语音活跃度分（30%权重）：有效语音段占比
                var frameLen = Math.floor(userBuf.sampleRate * 0.03); // 30ms帧
                var hop = Math.floor(frameLen / 2);
                var energyThresh = 0.01;
                var voiced = 0, total = 0;
                for (var i = 0; i + frameLen <= raw.length; i += hop){
                    var e = 0;
                    for (var j = 0; j < frameLen; j++) e += raw[i+j] * raw[i+j];
                    e = Math.sqrt(e / frameLen);
                    if (e > energyThresh) voiced++;
                    total++;
                }
                var voicedRatio = total > 0 ? voiced / total : 0;
                // 理想：40%-90% 是语音，太少=没说话，太多=全是噪音
                var voicedScore;
                if (voicedRatio >= 0.3 && voicedRatio <= 0.85) voicedScore = 90 + Math.round(voicedRatio * 10);
                else if (voicedRatio >= 0.15) voicedScore = 60;
                else voicedScore = 30;

                // 3) 清晰度分（30%权重）：分析频谱是否有清晰共振峰
                var targetSamples2 = 8000;
                var d = normalize(resampleData(userBuf, targetSamples2));
                var frameSize2 = 256, hopSize2 = 128;
                var feats = spectralFeatures(d, userBuf.sampleRate, frameSize2, hopSize2);
                // 计算频谱质心（spectral centroid）越高越清晰
                var centroidSum = 0, centroidCount = 0;
                for (var fi = 0; fi < feats.length; fi++){
                    var f = feats[fi];
                    var num = 0, den = 0;
                    for (var k = 0; k < f.length; k++){num += k * f[k]; den += f[k];}
                    if (den > 0) centroidSum += num / den;
                    centroidCount++;
                }
                var avgCentroid = centroidCount > 0 ? centroidSum / centroidCount : 0;
                // 归一化：越南语语音质心通常在 10-35 范围（64频点中）
                var clarityScore;
                if (avgCentroid >= 8 && avgCentroid <= 40) clarityScore = 85 + Math.round(Math.min(15, (40 - Math.abs(avgCentroid - 20)) * 0.5));
                else if (avgCentroid >= 5 && avgCentroid <= 50) clarityScore = 65;
                else clarityScore = 40;

                // 综合评分
                var finalScore2 = Math.round(durScore2 * 0.4 + voicedScore * 0.3 + clarityScore * 0.3);
                finalScore2 = Math.max(20, Math.min(95, finalScore2));

                var detail2 = finalScore2 >= 80 ? '发音清晰，节奏良好' : finalScore2 >= 60 ? '基本正确，注意节奏和声调' : finalScore2 >= 40 ? '发音偏弱，请大声清晰朗读' : '未检测到清晰发音，请重试';
                console.log('[独立分析] 时长:'+durScore2+' 活跃度:'+voicedScore+'(占比'+Math.round(voicedRatio*100)+'%) 清晰度:'+clarityScore+'(质心'+avgCentroid.toFixed(1)+') → '+finalScore2);
                cb({score: finalScore2, detail: detail2});
            }catch(e){
                console.error('评分失败:', e);
                cb(null);
            }
        });
    }

    // 用音频对比分数显示结果
    function showAudioScore(result){
        if (!result){
            document.getElementById('pf').className = 'pf good';
            document.getElementById('pf').textContent = '✅ 已录音！点击 🔊 回听对比';
            return;
        }
        var sc = result.score;
        var cls = sc >= 85 ? 'great' : sc >= 65 ? 'good' : 'bad';
        var msg = sc >= 85 ? '🌟 太棒了！' : sc >= 65 ? '👍 不错！' : '💪 再试一次';
        document.getElementById('pf').className = 'pf ' + cls;
        document.getElementById('pf').textContent = sc + '分 - ' + msg + ' (' + result.detail + ')';
        document.getElementById('br').classList.remove('rec');
        P.totalScore += sc;
        document.getElementById('p-score').textContent = P.totalScore + ' 分';
        if (sc < 80){P.lowScores.push(P.words[P.index]);}
        savePronRecord(P.words[P.index].word, P.words[P.index].translation, sc);
        if (P.index >= P.words.length - 1){showPronComplete();}
    }

    function startRecFallback(){
        // 录音模式：用于不支持 SpeechRecognition 的设备，录音后用音频对比评分
        document.getElementById('pf').className = 'pf wait';
        document.getElementById('pf').textContent = '🎤 录音中（3秒）...请朗读';
        document.getElementById('br').classList.add('rec');
        navigator.mediaDevices.getUserMedia({audio: true}).then(function(s){
            var mr = new MediaRecorder(s); var ch = [];
            mr.ondataavailable = function(e){ch.push(e.data);};
            mr.onstop = function(){
                s.getTracks().forEach(function(t){t.stop();});
                document.getElementById('br').classList.remove('rec');
                P.recBusy = false;
                if (ch.length){
                    var blob = new Blob(ch, {type: mr.mimeType});
                    saveRecBlob(blob);
                    // 音频对比评分
                    document.getElementById('pf').textContent = '📊 对比评分中...';
                    compareAndScore(blob, function(result){
                        showAudioScore(result);
                    });
                } else {
                    document.getElementById('pf').className = 'pf wait';
                    document.getElementById('pf').textContent = '🔇 未录到声音，请重试';
                }
            };
            mr.start();
            setTimeout(function(){if (mr.state === 'recording') mr.stop();}, 3000);
        }).catch(function(e){
            console.error('fallback录音失败:', e);
            document.getElementById('br').classList.remove('rec');
            P.micAllowed = false;
            var msg = '❌ 请允许麦克风权限后重试';
            if (e.name === 'NotAllowedError'){
                msg = '❌ 麦克风权限被拒绝，请在浏览器设置中允许后刷新页面';
            } else if (e.name === 'NotFoundError'){
                msg = '❌ 未检测到麦克风设备';
            }
            document.getElementById('pf').className = 'pf bad';
            document.getElementById('pf').textContent = msg;
        });
    }

    function similarity(a, b){
        if (a === b) return 1; if (!a.length || !b.length) return 0;
        var mx = []; for (var i = 0; i <= b.length; i++) mx[i] = [i];
        for (var j = 0; j <= a.length; j++) mx[0][j] = j;
        for (var i = 1; i <= b.length; i++){for (var j = 1; j <= a.length; j++){
            if (b.charAt(i - 1) === a.charAt(j - 1)) mx[i][j] = mx[i - 1][j - 1];
            else mx[i][j] = Math.min(mx[i - 1][j - 1] + 1, mx[i][j - 1] + 1, mx[i - 1][j] + 1);
        }}
        return 1 - mx[b.length][a.length] / Math.max(a.length, b.length);
    }

    function pNext(){P.index++; showPWord();}
    function pPrev(){P.index--; if (P.index < 0) P.index = P.words.length - 1; showPWord();}
    function quitPron(){backToMain();}

    function showPronComplete(){
        var pa = document.getElementById('pa');
        var existing = document.getElementById('pron-done');
        if (existing) existing.remove();
        var div = document.createElement('div');
        div.id = 'pron-done';
        div.style.cssText = 'text-align:center;padding:1.5rem;margin-top:1rem;background:var(--card);border-radius:12px;border:2px solid var(--pri)';
        div.innerHTML = '<div style="font-size:1.4rem;font-weight:700;margin-bottom:.5rem">🎉 本轮跟读完成！</div>' +
            '<div style="margin-bottom:.5rem">总分: <b>' + P.totalScore + '</b> 分 | 平均: <b>' + (P.words.length > 0 ? Math.round(P.totalScore / P.words.length) : 0) + '</b> 分/词 | 低分词: <b>' + P.lowScores.length + '</b> 个</div>' +
            '<button class="btn-p" onclick="pronAgain()" style="margin:.5rem">🔄 再来一次（30新词+20低分词）</button>' +
            '<button class="btn-o" onclick="goBack()" style="margin:.5rem">← 返回</button>';
        pa.appendChild(div);
        savePronRound();
        renderHistory();
    }

    function pronAgain(){
        var done = document.getElementById('pron-done');
        if (done) done.remove();
        var pool = fullPool.slice();
        var usedWords = P.words.map(function(w){return w.word;});
        var fresh = pool.filter(function(w){return usedWords.indexOf(w.word) === -1;});
        fresh.sort(function(){return Math.random() - 0.5;});
        var low = P.lowScores.slice().sort(function(){return Math.random() - 0.5;}).slice(0, 20);
        var newWords = fresh.slice(0, 30);
        P.words = newWords.concat(low);
        P.words.sort(function(){return Math.random() - 0.5;});
        P.index = 0; P.totalScore = 0; P.lowScores = [];
        document.getElementById('p-score').textContent = '0 分';
        showPWord();
    }

    /* ========== 记录存储 ========== */
    function saveRecord(score, accScore, comboScore, speedScore){
        var wrongList = G.wrongWords.map(function(w){
            return {word: w.word, translation: w.translation, translation_en: w.translation_en};
        });
        var rec = {
            type: 'dictation', level: currentVocab, score: score,
            accScore: accScore, comboScore: comboScore, speedScore: speedScore,
            correct: G.correct, wrong: G.wrong, maxCombo: G.maxCombo,
            accuracy: G.total > 0 ? Math.round(G.correct / G.total * 100) : 0,
            wrongWords: wrongList,
            timeUsed: 300 - G.timeLeft, date: new Date().toISOString(), user: CU
        };
        var h = JSON.parse(localStorage.getItem('vn_hist') || '[]');
        h.unshift(rec); if (h.length > 200) h = h.slice(0, 200);
        localStorage.setItem('vn_hist', JSON.stringify(h));
        if (typeof db !== 'undefined' && db.collection){
            db.collection('vietnamese_word_records').add(Object.assign({}, rec, {
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })).catch(function(){});
        }
    }

    function savePronRecord(word, translation, score){
        var rec = {type: 'pronunciation', word: word, translation: translation, score: score, date: new Date().toISOString(), user: CU};
        var h = JSON.parse(localStorage.getItem('vn_hist') || '[]');
        h.unshift(rec); if (h.length > 200) h = h.slice(0, 200);
        localStorage.setItem('vn_hist', JSON.stringify(h));
        if (typeof db !== 'undefined' && db.collection){
            db.collection('vietnamese_word_records').add(Object.assign({}, rec, {
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })).catch(function(){});
        }
    }

    function savePronRound(){
        var total = P.words.length;
        var avgScore = total > 0 ? Math.round(P.totalScore / total) : 0;
        var lowList = P.lowScores.map(function(w){
            return {word: w.word, translation: w.translation, translation_en: w.translation_en};
        });
        var rec = {
            type: 'pronunciation_round', level: currentVocab, score: P.totalScore,
            avgScore: avgScore, total: total, lowCount: P.lowScores.length,
            wrongWords: lowList,
            date: new Date().toISOString(), user: CU
        };
        var h = JSON.parse(localStorage.getItem('vn_hist') || '[]');
        h.unshift(rec); if (h.length > 200) h = h.slice(0, 200);
        localStorage.setItem('vn_hist', JSON.stringify(h));
        if (typeof db !== 'undefined' && db.collection){
            db.collection('vietnamese_word_records').add(Object.assign({}, rec, {
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })).catch(function(){});
        }
    }
