<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务清单 / Danh sách công việc</title>
    <style>
        :root {
            --primary: #25c461;
            --primary-dark: #1da34a;
            --bg: #161618;
            --surface: #232328;
            --surface-2: #2e2e35;
            --border: #3a3a42;
            --text: #e8e8ec;
            --text-muted: #9999a5;
            --danger: #ff5c5c;
            --warning: #ffb347;
            --info: #7eb6ff;
            --shadow: 0 4px 24px rgba(0,0,0,.35);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            max-width: 900px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.6rem; color: var(--primary); }
        .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .user-info {
            background: var(--surface);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ===== TABS ===== */
        .tabs {
            max-width: 900px;
            margin: 0 auto 20px;
            display: flex;
            gap: 8px;
            background: var(--surface);
            padding: 6px;
            border-radius: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: #fff;
        }
        .tab-btn:hover:not(.active) { background: var(--surface-2); color: var(--text); }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
            background: var(--surface);
            padding: 14px 16px;
            border-radius: 12px;
        }
        .filter-label {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .filter-tag {
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .filter-tag:hover { border-color: var(--primary); color: var(--primary); }
        .filter-tag.active {
            background: linear-gradient(135deg, #7eb6ff, #a78bfa);
            border-color: transparent;
            color: #fff;
        }
        .filter-count {
            margin-left: auto;
            font-size: 0.82rem;
            color: var(--text-muted);
            background: var(--surface-2);
            padding: 4px 10px;
            border-radius: 10px;
        }

        /* ===== ADD FORM ===== */
        .add-form {
            background: var(--surface);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 2px solid var(--border);
            transition: border-color 0.2s;
        }
        .add-form:focus-within { border-color: var(--primary); }
        .form-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--primary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: var(--surface-2);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 0.88rem;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group select { cursor: pointer; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1.5px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--text-muted); }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover { background: #e04444; }
        .btn-sm { padding: 5px 12px !important; font-size: 0.8rem !important; }

        /* ===== TASK LIST ===== */
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        .task-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .task-item:hover { background: var(--surface-2); }
        .task-item.urgency-high { border-left-color: var(--danger); }
        .task-item.urgency-medium { border-left-color: var(--warning); }
        .task-item.urgency-low { border-left-color: var(--primary); }
        .task-item.completed { opacity: 0.55; }
        .task-item.completed .task-text { text-decoration: line-through; }

        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }
        .task-text {
            font-size: 0.95rem;
            font-weight: 500;
            flex: 1;
            line-height: 1.5;
        }
        .task-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .badge {
            padding: 3px 9px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .badge-date { background: var(--surface-2); color: var(--text-muted); }
        .badge-urgency-h { background: #ff5c5c22; color: var(--danger); }
        .badge-urgency-m { background: #ffb34722; color: var(--warning); }
        .badge-urgency-l { background: #25c46122; color: var(--primary); }
        .badge-imp-h { background: #a78bfa22; color: #a78bfa; }
        .badge-imp-m { background: #7eb6ff22; color: var(--info); }
        .badge-imp-l { background: var(--surface-2); color: var(--text-muted); }
        .badge-done { background: #25c46122; color: var(--primary); }
        .badge-pending { background: #ffb34722; color: var(--warning); }

        .task-meta {
            display: flex;
            gap: 16px;
            font-size: 0.78rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .task-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .task-item:hover .task-actions { opacity: 1; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; }
        .empty-state p { font-size: 0.95rem; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--surface-2);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
            z-index: 9999;
            transition: transform 0.3s ease;
            border: 1.5px solid var(--border);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--primary); }
        .toast.error { border-color: var(--danger); }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            border: 1.5px solid var(--border);
        }
        .modal h3 { margin-bottom: 16px; font-size: 1.05rem; }
        .modal .form-group { margin-bottom: 12px; }
        .modal .form-actions { margin-top: 16px; }

        /* ===== STATS ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .stat-card .num {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-card .label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; align-items: flex-start; }
            .filter-bar { gap: 6px; }
            .filter-tag { font-size: 0.75rem; padding: 4px 9px; }
        }

        /* ===== BACK LINK ===== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 0;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }

        /* ===== LOADING ===== */
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

<a class="back-link" href="index.html">← 返回主页</a>

<div class="header">
    <h1>📋 任务清单</h1>
    <div class="header-right">
        <span class="user-info" id="userInfo">加载中...</span>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">📥 CSV</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all')">全部</button>
    <button class="tab-btn" onclick="switchTab('pending')">待完成</button>
    <button class="tab-btn" onclick="switchTab('done')">已完成</button>
</div>

<div class="container">
    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar">
        <span class="filter-label">筛选：</span>
        <span class="filter-tag active" data-filter="all" onclick="setFilter(this)">全部</span>
        <span class="filter-tag" data-filter="urgency-high" onclick="setFilter(this)">🔥紧急</span>
        <span class="filter-tag" data-filter="urgency-medium" onclick="setFilter(this)">⚠️一般</span>
        <span class="filter-tag" data-filter="urgency-low" onclick="setFilter(this)">☁️不急</span>
        <span class="filter-tag" data-filter="importance-high" onclick="setFilter(this)">⭐重要</span>
        <span class="filter-count" id="filterCount">0 条任务</span>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总任务</div></div>
        <div class="stat-card"><div class="num" id="statPending">0</div><div class="label">待完成</div></div>
        <div class="stat-card"><div class="num" id="statDone">0</div><div class="label">已完成</div></div>
        <div class="stat-card"><div class="num" id="statUrgent">0</div><div class="label">紧急</div></div>
    </div>

    <!-- Add form -->
    <div class="add-form" id="addForm">
        <div class="form-title">+ 新增任务</div>
        <div class="form-row full">
            <div class="form-group">
                <label>事项内容 *</label>
                <textarea id="fTask" placeholder="描述你要完成的事情..." rows="2"></textarea>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="fDate">
            </div>
            <div class="form-group">
                <label>紧急程度</label>
                <select id="fUrgency">
                    <option value="low">☁️ 不急</option>
                    <option value="medium" selected>⚠️ 一般</option>
                    <option value="high">🔥 紧急</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>重要程度</label>
                <select id="fImportance">
                    <option value="low">○ 不重要</option>
                    <option value="medium" selected>◐ 一般</option>
                    <option value="high">● 重要</option>
                </select>
            </div>
            <div class="form-group">
                <label>完成度</label>
                <select id="fCompletion">
                    <option value="pending">☐ 未完成</option>
                    <option value="done">☑ 已完成</option>
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-secondary" onclick="clearForm()">清空</button>
            <button class="btn btn-primary" onclick="addTask()">保存任务</button>
        </div>
    </div>

    <!-- Task list -->
    <div id="taskList">
        <div class="loading">⏳ 加载任务中...</div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>✏️ 编辑任务</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label>事项内容 *</label>
            <textarea id="editTask" rows="2"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="editDate">
            </div>
            <div class="form-group">
                <label>紧急程度</label>
                <select id="editUrgency">
                    <option value="low">☁️ 不急</option>
                    <option value="medium">⚠️ 一般</option>
                    <option value="high">🔥 紧急</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>重要程度</label>
                <select id="editImportance">
                    <option value="low">○ 不重要</option>
                    <option value="medium">◐ 一般</option>
                    <option value="high">● 重要</option>
                </select>
            </div>
            <div class="form-group">
                <label>完成度</label>
                <select id="editCompletion">
                    <option value="pending">☐ 未完成</option>
                    <option value="done">☑ 已完成</option>
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
            <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- CloudBase SDK -->
<script src="https://cdn.jsdelivr.net/gh/TencentCloudBase/cloudbase-js-sdk@master/cdnjs/1.7.1/cloudbase.full.js"></script>

<script>
// ==================== CloudBase 初始化 ====================
var db;
var currentUser = localStorage.getItem('taskUser') || '匿名用户';

try {
    if (typeof cloudbase !== "undefined") {
        var app = cloudbase.init({ env: "apex-english-4ga1ck7148c9e3" });
        db = app.database();
        app.auth().anonymousAuthProvider().signIn().then(function() {
            console.log("CloudBase 匿名登录成功");
            loadTasks();
        }).catch(function(err) {
            console.warn("CloudBase 登录失败，使用本地模式:", err.message);
            db = makeLocalDB();
            loadTasks();
        });
    } else {
        throw new Error("SDK未加载");
    }
} catch(e) {
    console.warn("CloudBase 初始化失败，使用本地模式");
    db = makeLocalDB();
    loadTasks();
}

function makeLocalDB() {
    var storageKey = 'task_list_data';
    function load() {
        var d = localStorage.getItem(storageKey);
        return d ? JSON.parse(d) : [];
    }
    function save(data) {
        localStorage.setItem(storageKey, JSON.stringify(data));
    }
    return {
        collection: function() {
            return {
                where: function() { return this; },
                orderBy: function() { return this; },
                get: function() {
                    return Promise.resolve({ data: load() });
                },
                add: function(doc) {
                    var list = load();
                    var item = Object.assign({ _id: Date.now().toString() }, doc.data || doc);
                    list.unshift(item);
                    save(list);
                    return Promise.resolve({ id: item._id });
                },
                doc: function(id) {
                    return {
                        update: function(doc) {
                            var list = load();
                            var idx = list.findIndex(function(i) { return i._id === id; });
                            if (idx !== -1) Object.assign(list[idx], doc);
                            save(list);
                            return Promise.resolve({ updated: 1 });
                        },
                        remove: function() {
                            var list = load();
                            var idx = list.findIndex(function(i) { return i._id === id; });
                            if (idx !== -1) list.splice(idx, 1);
                            save(list);
                            return Promise.resolve({ deleted: 1 });
                        }
                    };
                }
            };
        }
    };
}

// ==================== 状态管理 ====================
var allTasks = [];
var currentTab = 'all';
var currentFilter = 'all';
var editingId = null;

// ==================== 初始化 ====================
document.getElementById('fDate').valueAsDate = new Date();
document.getElementById('userInfo').textContent = '👤 ' + currentUser;

// ==================== 加载任务 ====================
function loadTasks() {
    document.getElementById('taskList').innerHTML = '<div class="loading">⏳ 加载任务中...</div>';
    db.collection('task_list').orderBy('createdAt', 'desc').get().then(function(res) {
        allTasks = res.data || [];
        renderTasks()
        checkUrlParams();;
    }).catch(function(err) {
        console.warn("加载失败:", err.message);
        allTasks = [];
        renderTasks();
    });
}

// ==================== URL 参数预填表单 ====================
function checkUrlParams() {
    var params = new URLSearchParams(window.location.search);
    if (!params.has('add')) return;

    var addVal = params.get('add');
    var dateVal = params.get('date');
    var urgVal = params.get('urgency');
    var impVal = params.get('importance');
    var compVal = params.get('completion') || 'pending';

    // 显示表单
    var form = document.getElementById('addForm');
    if (form) form.style.display = 'block';

    // 预填字段
    if (addVal) document.getElementById('fTask').value = decodeURIComponent(addVal);
    if (dateVal) document.getElementById('fDate').value = dateVal;
    if (urgVal) document.getElementById('fUrgency').value = urgVal;
    if (impVal) document.getElementById('fImportance').value = impVal;
    document.getElementById('fCompletion').value = compVal;

    // 自动聚焦到任务输入框
    var taskInput = document.getElementById('fTask');
    if (taskInput) taskInput.focus();

    // 清空 URL 参数（防止刷新重复添加）
    window.history.replaceState({}, '', window.location.pathname);
}


// ==================== 渲染 ====================
function renderTasks() {
    var filtered = allTasks.filter(function(t) {
        var tabMatch = currentTab === 'all' ||
            (currentTab === 'pending' && t.completion !== 'done') ||
            (currentTab === 'done' && t.completion === 'done');
        var filterMatch = currentFilter === 'all' || t[currentFilter] === 'yes' ||
            (currentFilter === 'urgency-high' && t.urgency === 'high') ||
            (currentFilter === 'urgency-medium' && t.urgency === 'medium') ||
            (currentFilter === 'urgency-low' && t.urgency === 'low') ||
            (currentFilter === 'importance-high' && t.importance === 'high');
        return tabMatch && filterMatch;
    });

    var listEl = document.getElementById('taskList');
    document.getElementById('filterCount').textContent = filtered.length + ' 条任务';

    if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无任务<br><small>添加一个开始规划吧！</small></p></div>';
        updateStats();
        return;
    }

    var html = '<div class="task-list">';
    filtered.forEach(function(t) {
        var urgencyClass = 'urgency-' + t.urgency;
        var completedClass = t.completion === 'done' ? 'completed' : '';
        var urgencyLabel = { high: '🔥 紧急', medium: '⚠️ 一般', low: '☁️ 不急' };
        var impLabel = { high: '●重要', medium: '◐一般', low: '○不重要' };
        var compLabel = t.completion === 'done' ? '☑ 已完成' : '☐ 未完成';
        var dateStr = t.date ? t.date.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3') : '无日期';

        html += '<div class="task-item ' + urgencyClass + ' ' + completedClass + '">';
        html += '<div class="task-header">';
        html += '<div class="task-text">' + escHtml(t.task || '') + '</div>';
        html += '<div class="task-badges">';
        html += '<span class="badge badge-date">' + dateStr + '</span>';
        html += '<span class="badge badge-urgency-' + t.urgency + '">' + urgencyLabel[t.urgency] + '</span>';
        html += '<span class="badge badge-imp-' + t.importance + '">' + impLabel[t.importance] + '</span>';
        html += '<span class="badge ' + (t.completion === 'done' ? 'badge-done' : 'badge-pending') + '">' + compLabel + '</span>';
        html += '</div></div>';
        html += '<div class="task-meta">';
        html += '<span>👤 ' + escHtml(t.creator || '未知') + '</span>';
        html += '<span>📅 ' + (t.createdAt ? new Date(t.createdAt).toLocaleString('zh-CN', {timeZone:'Asia/Saigon'}).replace(/\//g,'-') : '') + '</span>';
        html += '</div>';
        html += '<div class="task-actions">';
        if (t.completion !== 'done') {
            html += '<button class="btn btn-sm btn-primary" onclick="toggleDone(\'' + t._id + '\')">☑ 完成</button>';
        } else {
            html += '<button class="btn btn-sm btn-secondary" onclick="toggleDone(\'' + t._id + '\')">↩ 恢复</button>';
        }
        html += '<button class="btn btn-sm btn-secondary" onclick="openEditModal(\'' + t._id + '\')">✏️ 编辑</button>';
        html += '<button class="btn btn-sm btn-danger" onclick="deleteTask(\'' + t._id + '\')">🗑️ 删除</button>';
        html += '</div></div>';
    });
    html += '</div>';
    listEl.innerHTML = html;
    updateStats();
}

function updateStats() {
    var total = allTasks.length;
    var pending = allTasks.filter(function(t) { return t.completion !== 'done'; }).length;
    var done = allTasks.filter(function(t) { return t.completion === 'done'; }).length;
    var urgent = allTasks.filter(function(t) { return t.urgency === 'high' && t.completion !== 'done'; }).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statUrgent').textContent = urgent;
}

// ==================== 添加任务 ====================
function addTask() {
    var taskText = document.getElementById('fTask').value.trim();
    if (!taskText) { toast('请输入事项内容', 'error'); return; }

    var doc = {
        task: taskText,
        date: document.getElementById('fDate').value,
        urgency: document.getElementById('fUrgency').value,
        importance: document.getElementById('fImportance').value,
        completion: document.getElementById('fCompletion').value,
        creator: currentUser,
        createdAt: new Date().toISOString()
    };

    db.collection('task_list').add({ data: doc }).then(function(res) {
        doc._id = res.id;
        allTasks.unshift(doc);
        renderTasks();
        clearForm();
        toast('任务添加成功！', 'success');
    }).catch(function(err) {
        toast('添加失败: ' + err.message, 'error');
    });
}

function clearForm() {
    document.getElementById('fTask').value = '';
    document.getElementById('fDate').valueAsDate = new Date();
    document.getElementById('fUrgency').value = 'medium';
    document.getElementById('fImportance').value = 'medium';
    document.getElementById('fCompletion').value = 'pending';
}

// ==================== 切换完成状态 ====================
function toggleDone(id) {
    var task = allTasks.find(function(t) { return t._id === id; });
    if (!task) return;
    var newStatus = task.completion === 'done' ? 'pending' : 'done';
    db.collection('task_list').doc(id).update({ completion: newStatus }).then(function() {
        task.completion = newStatus;
        renderTasks();
        toast(newStatus === 'done' ? '任务已完成 ✓' : '已恢复为未完成', 'success');
    }).catch(function(err) {
        toast('更新失败: ' + err.message, 'error');
    });
}

// ==================== 编辑 ====================
function openEditModal(id) {
    var task = allTasks.find(function(t) { return t._id === id; });
    if (!task) return;
    editingId = id;
    document.getElementById('editId').value = id;
    document.getElementById('editTask').value = task.task || '';
    document.getElementById('editDate').value = task.date || '';
    document.getElementById('editUrgency').value = task.urgency || 'medium';
    document.getElementById('editImportance').value = task.importance || 'medium';
    document.getElementById('editCompletion').value = task.completion || 'pending';
    document.getElementById('editModal').classList.add('show');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('show');
    editingId = null;
}

function saveEdit() {
    if (!editingId) return;
    var taskText = document.getElementById('editTask').value.trim();
    if (!taskText) { toast('请输入事项内容', 'error'); return; }
    var updates = {
        task: taskText,
        date: document.getElementById('editDate').value,
        urgency: document.getElementById('editUrgency').value,
        importance: document.getElementById('editImportance').value,
        completion: document.getElementById('editCompletion').value
    };
    db.collection('task_list').doc(editingId).update(updates).then(function() {
        var task = allTasks.find(function(t) { return t._id === editingId; });
        if (task) Object.assign(task, updates);
        closeEditModal();
        renderTasks();
        toast('修改已保存 ✓', 'success');
    }).catch(function(err) {
        toast('保存失败: ' + err.message, 'error');
    });
}

// ==================== 删除 ====================
function deleteTask(id) {
    if (!confirm('确定删除这条任务吗？')) return;
    db.collection('task_list').doc(id).remove().then(function() {
        allTasks = allTasks.filter(function(t) { return t._id !== id; });
        renderTasks();
        toast('已删除', 'success');
    }).catch(function(err) {
        toast('删除失败: ' + err.message, 'error');
    });
}

// ==================== 筛选 ====================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.textContent.includes(tab === 'all' ? '全部' : tab === 'pending' ? '待完成' : '已完成'));
    });
    renderTasks();
}

function setFilter(el) {
    document.querySelectorAll('.filter-tag').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    currentFilter = el.dataset.filter;
    renderTasks();
}

// ==================== 导出CSV ====================
function exportCSV() {
    var rows = [['日期', '事项', '紧急', '重要', '完成度', '创建人', '创建时间']];
    allTasks.forEach(function(t) {
        var urgMap = { high: '紧急', medium: '一般', low: '不急' };
        var impMap = { high: '重要', medium: '一般', low: '不重要' };
        rows.push([
            t.date || '',
            (t.task || '').replace(/"/g, '""'),
            urgMap[t.urgency] || '',
            impMap[t.importance] || '',
            t.completion === 'done' ? '已完成' : '未完成',
            t.creator || '',
            t.createdAt || ''
        ]);
    });
    var csv = rows.map(function(r) {
        return r.map(function(c) { return '"' + c + '"'; }).join(',');
    }).join('\r\n');
    // BOM for Excel
    var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = '任务清单_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV 已下载 (' + allTasks.length + '条)', 'success');
}

// ==================== Toast ====================
function toast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (type || '');
    setTimeout(function() { el.className = 'toast'; }, 2500);
}

// ==================== 工具 ====================
function escHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ==================== URL参数 - 快速添加 ====================
(function() {
    var params = new URLSearchParams(window.location.search);
    var taskParam = params.get('add');
    if (taskParam) {
        document.getElementById('fTask').value = decodeURIComponent(taskParam);
        setTimeout(function() {
            document.getElementById('fTask').focus();
            document.querySelector('.add-form').scrollIntoView({ behavior: 'smooth' });
        }, 500);
    }
})();
</script>
</body>
