<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSL2词库上传工具</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #7c3aed; margin-bottom: 20px; }
        .info { background: #ede9fe; border-radius: 8px; padding: 12px; margin: 12px 0; }
        .info code { background: #c4b5fd; padding: 2px 6px; border-radius: 4px; }
        button { background: #7c3aed; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 8px 4px; }
        button:hover { background: #5b21b6; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { background: #1e1e1e; color: #0f0; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; margin-top: 16px; white-space: pre-wrap; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 16px; }
        .stat-box { background: #f0f0f0; border-radius: 8px; padding: 12px; text-align: center; }
        .stat-box .num { font-size: 1.5rem; font-weight: 700; color: #7c3aed; }
        .stat-box .label { font-size: 0.8rem; color: #666; }
        .chunk-preview { margin-top: 16px; max-height: 300px; overflow-y: auto; }
        .chunk-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .chunk-item .doc-id { color: #7c3aed; font-family: monospace; }
        .chunk-item .count { color: #10b981; font-weight: 600; }
        .warn-box { background: #fef3c7; border-radius: 8px; padding: 12px; margin: 12px 0; color: #92400e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📤 VSL2词库上传工具（v2 - 7切片格式）</h1>
        <div class="info">
            <strong>上传规则：</strong><br>
            · 固定 7 个切片文档：<code>vsl2_000</code> ~ <code>vsl2_006</code><br>
            · 每个切片预设 <code>100</code> 个位置，最后一个有多少算多少<br>
            · 文档字段：<code>word</code> / <code>translation</code> / <code>translation_en</code> / <code>unit</code><br>
            · 目标 Firebase 项目：<code>vietnames-data</code>
        </div>
        <div class="warn-box">
            ⚠️ 此操作将覆盖 Firebase 中的 VSL2 词库数据，请确认本地词库已更新后再执行上传
        </div>

        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="num" id="stat-total">-</div>
                <div class="label">总词数</div>
            </div>
            <div class="stat-box">
                <div class="num" id="stat-chunks">-</div>
                <div class="label">切片数量</div>
            </div>
            <div class="stat-box">
                <div class="num" id="stat-last">-</div>
                <div class="label">最后切片词数</div>
            </div>
        </div>

        <div style="margin-top: 16px;">
            <button id="btnUpload" onclick="uploadToFirebase()">🚀 开始上传到 Firebase</button>
            <button id="btnCheck" onclick="checkFirebaseData()">🔍 检查云端数据</button>
        </div>

        <div class="chunk-preview" id="chunkPreview"></div>
        <div id="log"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="vsl2-vocab.js"></script>

    <script>
        // Firebase配置
        const firebaseConfig = {
            apiKey: "AIzaSyCMPFTNEBWXA_EnkF7Yk__F1gdHYfPg8kM",
            authDomain: "vietnames-data.firebaseapp.com",
            projectId: "vietnames-data",
            storageBucket: "vietnames-data.appspot.com",
            messagingSenderId: "1059372537828",
            appId: "1:1059372537828:web:bf84e3f09d8e2b2f16e809"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 切片数量
        const NUM_CHUNKS = 7;

        // 日志函数
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colorClass = type === 'success' ? 'success' : type === 'error' ? 'error' : type === 'warning' ? 'warning' : '';
            logDiv.innerHTML += `<div class="${colorClass}">[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 页面加载
        window.onload = function() {
            if (typeof VN_VOCAB !== 'undefined' && VN_VOCAB.vsl2) {
                const words = VN_VOCAB.vsl2;
                const total = words.length;
                const lastChunkSize = total % 100 === 0 ? 100 : total % 100;
                const chunks = Math.ceil(total / 100);

                document.getElementById('stat-total').textContent = total;
                document.getElementById('stat-chunks').textContent = chunks + '/' + NUM_CHUNKS;
                document.getElementById('stat-last').textContent = lastChunkSize;

                log(`✅ 本地词库加载成功：${total} 条数据`, 'success');
                log(`   切片分布：前 ${chunks - 1} 个切片各 100 条，最后一个切片 ${lastChunkSize} 条`);

                // 显示切片预览
                renderChunkPreview(words, chunks);
            } else {
                document.getElementById('stat-total').textContent = '❌';
                log('❌ 无法加载本地词库，请确认 vsl2-vocab.js 存在', 'error');
            }
        };

        // 渲染切片预览
        function renderChunkPreview(words, chunks) {
            const preview = document.getElementById('chunkPreview');
            let html = '';
            for (let i = 0; i < Math.min(chunks, NUM_CHUNKS); i++) {
                const start = i * 100;
                const end = Math.min(start + 100, words.length);
                const count = end - start;
                const docId = 'vsl2_' + String(i).padStart(3, '0');
                html += `<div class="chunk-item">
                    <span class="doc-id">${docId}</span>
                    <span>位置 ${start + 1} ~ ${end}</span>
                    <span class="count">${count} 条</span>
                </div>`;
            }
            if (chunks > NUM_CHUNKS) {
                html += `<div class="chunk-item" style="color:#f59e0b;">⚠️ 注意：词库需要 ${chunks} 个切片，但只预置了 ${NUM_CHUNKS} 个位置</div>`;
            }
            preview.innerHTML = html;
        }

        // 检查 Firebase 数据
        async function checkFirebaseData() {
            const btn = document.getElementById('btnCheck');
            btn.disabled = true;
            log('🔍 检查 Firebase 数据...');

            try {
                // 检查 vocab_registry
                const registryDoc = await db.collection('vocab_registry').doc('vsl2').get();
                if (registryDoc.exists) {
                    const data = registryDoc.data();
                    log(`📋 vocab_registry.vsl2: wordCount=${data.wordCount}, chunksCount=${data.chunksCount}`, 'success');
                } else {
                    log('⚠️ vocab_registry.vsl2 不存在', 'warning');
                }

                // 检查 vocab_data
                log('--- 当前云端切片 ---');
                const chunksSnapshot = await db.collection('vocab_data').where('vocabId', '==', 'vsl2').get();
                log(`切片数量: ${chunksSnapshot.size}`);

                let totalWords = 0;
                const existingIds = [];
                chunksSnapshot.forEach(doc => {
                    const data = doc.data();
                    const cnt = data.words?.length || 0;
                    totalWords += cnt;
                    existingIds.push(doc.id + ' (' + cnt + '条)');
                    log(`  文档: ${doc.id} | unit=${data.unit} | words=${cnt}`);
                });
                log(`总词数: ${totalWords}`, totalWords > 0 ? 'success' : 'warning');

            } catch (err) {
                log(`❌ 检查失败: ${err.message}`, 'error');
                console.error(err);
            }

            btn.disabled = false;
        }

        // 上传到 Firebase（7切片格式）
        async function uploadToFirebase() {
            const btn = document.getElementById('btnUpload');
            btn.disabled = true;

            log('🚀 开始上传到 Firebase（7切片格式）...');
            log('---');

            try {
                const words = VN_VOCAB.vsl2;
                const total = words.length;
                const actualChunks = Math.ceil(total / 100);

                log(`📊 本地词库: ${total} 条，预估切片: ${actualChunks} 个`);

                // 1. 构建 7 个切片文档
                const chunks = {};
                for (let i = 0; i < NUM_CHUNKS; i++) {
                    const docId = 'vsl2_' + String(i).padStart(3, '0');
                    chunks[docId] = [];
                }

                // 分配词条到切片（每个切片最多100条）
                for (let i = 0; i < words.length; i++) {
                    const chunkIdx = Math.floor(i / 100);
                    if (chunkIdx >= NUM_CHUNKS) break; // 超出7个切片的忽略

                    const docId = 'vsl2_' + String(chunkIdx).padStart(3, '0');
                    const word = words[i];
                    chunks[docId].push({
                        word: word[0],           // 越南文
                        translation: word[1],    // 中文
                        translation_en: word[2], // 英文
                        unit: word[4] || word[3] // 单元号
                    });
                }

                // 统计
                let usedChunks = 0;
                let totalFilled = 0;
                for (const docId of Object.keys(chunks)) {
                    if (chunks[docId].length > 0) {
                        usedChunks++;
                        totalFilled += chunks[docId].length;
                    }
                }
                log(`📦 将上传 ${usedChunks} 个切片，共 ${totalFilled} 条词`);

                // 2. 删除旧数据（vocabId === 'vsl2'）
                log('🗑️ 删除旧数据...');
                const oldChunks = await db.collection('vocab_data').where('vocabId', '==', 'vsl2').get();
                if (oldChunks.size > 0) {
                    const batchDel = db.batch();
                    oldChunks.forEach(doc => batchDel.delete(doc.ref));
                    await batchDel.commit();
                    log(`已删除 ${oldChunks.size} 个旧文档`, 'success');
                } else {
                    log('无旧数据需要删除', 'warning');
                }

                // 3. 上传新的 7 个切片文档
                log('📤 上传新数据...');
                const batchSet = db.batch();
                let uploadedChunks = 0;
                let totalUploaded = 0;

                for (let i = 0; i < NUM_CHUNKS; i++) {
                    const docId = 'vsl2_' + String(i).padStart(3, '0');
                    const chunkWords = chunks[docId];

                    if (chunkWords.length === 0) {
                        log(`  ${docId}: (空，跳过)`);
                        continue;
                    }

                    const docRef = db.collection('vocab_data').doc(docId);
                    batchSet.set(docRef, {
                        vocabId: 'vsl2',
                        chunkIndex: i,
                        words: chunkWords,
                        wordCount: chunkWords.length,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    uploadedChunks++;
                    totalUploaded += chunkWords.length;
                    log(`  ${docId}: ${chunkWords.length} 条 ✓`);
                }

                if (uploadedChunks > 0) {
                    await batchSet.commit();
                    log(`✅ 上传成功：${uploadedChunks} 个切片，${totalUploaded} 条词`, 'success');
                } else {
                    log('⚠️ 没有需要上传的数据', 'warning');
                }

                // 4. 更新 vocab_registry
                log('📋 更新 vocab_registry...');
                await db.collection('vocab_registry').doc('vsl2').set({
                    id: 'vsl2',
                    name: 'VSL2',
                    name_vi: 'VSL2',
                    wordCount: total,
                    chunks: uploadedChunks,      // 实际使用的切片数（供 vietnamese-words.html 加载）
                    totalChunks: uploadedChunks, // 兼容旧字段
                    chunksCount: uploadedChunks, // 兼容旧字段
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                log('✅ vocab_registry 更新成功（chunks=' + uploadedChunks + '）', 'success');

                log('━━━━━━━━━━━━━━━━━━━', 'success');
                log('🎉 上传完成！', 'success');
                log(`   总词数: ${totalUploaded}`, 'success');
                log(`   切片数: ${uploadedChunks}/7`, 'success');
                log(`   最后一个切片: ${chunks['vsl2_' + String(uploadedChunks - 1).padStart(3, '0')].length} 条`, 'success');
                log('━━━━━━━━━━━━━━━━━━━', 'success');

                alert('上传成功！共上传 ' + uploadedChunks + ' 个切片，' + totalUploaded + ' 条词。');

            } catch (err) {
                log(`❌ 上传失败: ${err.message}`, 'error');
                console.error(err);
                alert('上传失败: ' + err.message);
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
