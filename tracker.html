<script>
// ========== Firebase 配置 ==========
var firebaseConfig = {
    apiKey: "AIzaSyCMPFTNEBWXA_EnkF7Yk__F1gdHYfPg8kM",
    authDomain: "vietnames-data.firebaseapp.com",
    projectId: "vietnames-data",
    storageBucket: "vietnames-data.appspot.com",
    messagingSenderId: "1099137360177",
    appId: "1:1099137360177:web:e9f5e8c7d4b3a6f1"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

// ========== 全局变量 ==========
var auth = null;
var currentUser = null;
var projectList = []; // 所有项目列表
var currentProject = null; // 当前选中的项目
var curRow = -1;
var currentViewerImg = '';
var currentUserRole = 'user'; // 当前用户角色

// ========== 获取用户角色 ==========
function getCurrentUserRole() {
    var storedRole = sessionStorage.getItem("apex_role");
    return storedRole || 'user';
}

// ========== 是否为管理员 ==========
function isAdmin() {
    var role = getCurrentUserRole();
    console.log('Checking admin - role:', role, 'username:', sessionStorage.getItem("apex_username"));
    return role === 'admin';
}

// ========== Firebase 初始化 ==========
async function initFirebase() {
    try {
        auth = firebase.auth();
        await auth.signInAnonymously();
        currentUser = auth.currentUser;
        console.log("Firebase 登录成功:", currentUser.uid);
        updateSyncStatus('加载中...', 'syncing');
        await loadProjectList();
        updateSyncStatus('已同步', 'synced');

        // 绑定侧边栏事件
        bindSidebarEvents();
    } catch (error) {
        console.error("Firebase 初始化失败:", error);
        updateSyncStatus('同步失败', 'error');
    }
}

// ========== 绑定侧边栏事件 ==========
function bindSidebarEvents() {
    // 新建按钮
    var newBtn = document.getElementById('newProjectBtn');
    if (newBtn) newBtn.addEventListener('click', createNewProject);

    // 搜索输入
    var searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.addEventListener('input', function(e) {
        renderProjectList(e.target.value);
    });

    // 表头输入变化时自动保存
    ['hDate', 'hRecorder', 'hProject', 'hTicket'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('input', function() {
            if (currentProject) {
                currentProject.header[id.replace('h', '').toLowerCase()] = el.value;
                autoSave();
            }
        });
    });
}

// ========== 同步状态显示 ==========
function updateSyncStatus(text, type) {
    var el = document.getElementById('syncStatus');
    var icons = {synced: '✓', syncing: '↻', error: '!'};
    el.textContent = icons[type] + ' ' + text;
    el.className = 'sync-status ' + type;
}

// ========== 显示保存提示 ==========
function showSavedIndicator(text) {
    var indicator = document.getElementById('savedIndicator');
    indicator.textContent = text || '已保存 / Da luu!';
    indicator.style.display = 'block';
    setTimeout(function() { indicator.style.display = 'none'; }, 2000);
}

// ========== 图片压缩（最大 100KB） ==========
function compressImage(file, maxSizeKB, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');

            // 计算缩放比例
            var maxDim = 1920;
            var width = img.width;
            var height = img.height;

            if (width > maxDim || height > maxDim) {
                if (width > height) {
                    height = (height / width) * maxDim;
                    width = maxDim;
                } else {
                    width = (width / height) * maxDim;
                    height = maxDim;
                }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            // 逐步降低质量直到小于 maxSizeKB
            var quality = 0.9;
            var dataUrl = canvas.toDataURL('image/jpeg', quality);

            while (dataUrl.length > maxSizeKB * 1024 * 1.37 && quality > 0.1) {
                quality -= 0.1;
                dataUrl = canvas.toDataURL('image/jpeg', quality);
            }

            callback(dataUrl);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// ========== 上传图片（本地优先：base64直接存Firestore） ==========
// 策略：直接存储base64，不使用Firebase Storage（更快更可靠）
// 如果需要迁移到云存储，可以后续处理
function uploadImageToStorage(base64Data, projectId, callback) {
    console.log('uploadImageToStorage: using base64 (no Firebase Storage)');
    
    // 直接返回base64作为"URL"（实际上是base64数据）
    // 这样就跳过了Firebase Storage的上传步骤
    if (base64Data && base64Data.startsWith('data:')) {
        console.log('Image stored as base64, length:', base64Data.length);
        callback(base64Data); // 直接返回base64
    } else {
        console.error('Invalid base64 data');
        callback(null);
    }
}

// ========== 加载项目列表 ==========
async function loadProjectList() {
    try {
        var username = sessionStorage.getItem("apex_username") || 'guest';
        var isUserAdmin = isAdmin();

        // 管理员可以看所有项目，普通用户只看自己的
        var query;
        if (isUserAdmin) {
            // 管理员：加载所有项目
            query = db.collection('tracker_projects');
        } else {
            // 普通用户：只加载自己的项目
            query = db.collection('tracker_projects').where('user', '==', username);
        }

        var snapshot = await query.get();

        projectList = [];
        snapshot.forEach(function(doc) {
            var data = doc.data();
            data.id = doc.id;
            projectList.push(data);
        });

        // 在本地按 updatedAt 排序
        projectList.sort(function(a, b) {
            var timeA = a.updatedAt ? new Date(a.updatedAt) : new Date(0);
            var timeB = b.updatedAt ? new Date(b.updatedAt) : new Date(0);
            return timeB - timeA;
        });

        renderProjectList();
    } catch (error) {
        console.error('加载项目列表失败:', error);
        updateSyncStatus('加载失败', 'error');
    }
}

// ========== 删除项目（仅管理员） ==========
async function deleteCurrentProject() {
    if (!currentProject) return;

    if (!isAdmin()) {
        alert('只有管理员可以删除项目 / Chi quan tri moi co the xoa du an');
        return;
    }

    if (!confirm('确定删除此项目？此操作不可撤销。\nXac nhan xoa du an nay? Khong the hoan tac.')) {
        return;
    }

    updateSyncStatus('删除中...', 'syncing');

    try {
        // 删除 Firestore 文档
        await db.collection('tracker_projects').doc(currentProject.id).delete();

        // 从本地列表移除
        for (var i = 0; i < projectList.length; i++) {
            if (projectList[i].id === currentProject.id) {
                projectList.splice(i, 1);
                break;
            }
        }

        // 清除当前项目
        currentProject = null;

        // 重新渲染
        renderProjectList();
        var content = document.getElementById('contentArea');

// ========== 渲染项目列表 ==========
function renderProjectList(filter) {
    var list = document.getElementById('projectList');
    var filtered = projectList;

    if (filter) {
        filter = filter.toLowerCase();
        filtered = projectList.filter(function(p) {
            return (p.header.project && p.header.project.toLowerCase().includes(filter)) ||
                   (p.header.ticket && p.header.ticket.toLowerCase().includes(filter)) ||
                   (p.header.recorder && p.header.recorder.toLowerCase().includes(filter));
        });
    }

    if (filtered.length === 0) {
        list.innerHTML = '<div class="sidebar-empty">无匹配项目 / Khong co du an</div>';
        return;
    }

    var html = '';
    filtered.forEach(function(p) {
        var isActive = currentProject && currentProject.id === p.id ? 'active' : '';
        var project = p.header.project || '';
        var ticket = p.header.ticket || '';
        // 显示格式: 项目号-工单号 (避免重复)
        var displayName = project + (ticket ? '-' + ticket : '');
        html += '<div class="sidebar-item ' + isActive + '" onclick="loadProject(\'' + p.id + '\')">' +
                '<div class="sidebar-item-title">' + escHtml(displayName) + '</div>' +
                '<div class="sidebar-item-meta">' + (p.header.date || '') + ' | ' + (p.header.recorder || '') + '</div>' +
                '</div>';
    });

    list.innerHTML = html;
}

// ========== 加载项目 ==========
async function loadProject(projectId) {
    console.log('开始加载项目:', projectId);
    showLoading(true);
    updateSyncStatus('加载中...', 'syncing');

    try {
        var doc = await db.collection('tracker_projects').doc(projectId).get();

        if (!doc.exists) {
            alert('项目不存在 / Du an khong ton tai');
            showLoading(false);
            return;
        }

        currentProject = doc.data();
        currentProject.id = doc.id;

        // 确保必要的字段存在
        if (!currentProject.records) currentProject.records = [];
        if (!currentProject.header) currentProject.header = {};
        if (!currentProject.header.productImgs) currentProject.header.productImgs = [];

        console.log('项目加载成功:', currentProject);

        // 渲染项目列表（高亮当前）
        renderProjectList();

        // 渲染内容
        renderContent();
        
        // 显示/隐藏删除按钮（仅管理员可见）
        var deleteBtn = document.getElementById('deleteProjectBtn');
        console.log('loadProject - checking delete button visibility, isAdmin():', isAdmin());
        if (deleteBtn) {
            if (isAdmin()) {
                deleteBtn.style.display = 'inline-flex';
                console.log('Delete button SHOWN (admin)');
            } else {
                deleteBtn.style.display = 'none';
                console.log('Delete button HIDDEN (non-admin)');
            }
        }
        
        updateSyncStatus('已同步', 'synced');
    } catch (error) {
        console.error('加载项目失败:', error);
        updateSyncStatus('加载失败', 'error');
        alert('加载失败: ' + error.message);
    }

    showLoading(false);
}

// ========== 表格事件绑定 ==========
function bindTableEvents() {
    var tb = document.getElementById('tableBody');
    if (!tb) return;

    // 图片点击查看
    var imgThumbs = tb.querySelectorAll('.image-thumb');
    imgThumbs.forEach(function(thumb) {
        thumb.addEventListener('click', function() { viewImg(this.getAttribute('data-src')); });
    });

    // 图片删除按钮
    var imgDelBtns = tb.querySelectorAll('.img-del-btn');
    imgDelBtns.forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var row = parseInt(this.getAttribute('data-row'));
            var imgidx = parseInt(this.getAttribute('data-imgidx'));
            if (confirm('删除这张图片? / Xoa anh nay?')) {
                currentProject.records[row].imgs.splice(imgidx, 1);
                render();
                autoSave();
            }
        });
    });

    // 添加图片按钮
    var addBtns = tb.querySelectorAll('.add-img-btn[data-row]');
    addBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            curRow = parseInt(this.getAttribute('data-row'));
            document.getElementById('imgInput').click();
        });
    });

    // 删除按钮
    var delBtns = tb.querySelectorAll('.delete-btn[data-idx]');
    delBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            if (confirm('删除此行? / Xoa dong nay?')) {
                currentProject.records.splice(idx, 1);
                render();
                autoSave();
            }
        });
    });

    // 分类选择
    var categorySelects = tb.querySelectorAll('.category-select');
    categorySelects.forEach(function(sel) {
        sel.addEventListener('change', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            currentProject.records[idx].category = parseInt(this.value);
            autoSave();
        });
    });

    // 部门选择
    var deptSelects = tb.querySelectorAll('.dept-select');
    deptSelects.forEach(function(sel) {
        sel.addEventListener('change', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            currentProject.records[idx].department = parseInt(this.value);
            autoSave();
        });
    });

    // 跟进人输入
    var picInputs = tb.querySelectorAll('.pic-input');
    picInputs.forEach(function(input) {
        input.addEventListener('input', function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            currentProject.records[idx].pic = this.value;
            autoSave();
        });
    });

    // 文本输入 - 自动翻译中文↔越南文
    var textareas = tb.querySelectorAll('textarea[data-field]');
    var translateTimeout = null;
    textareas.forEach(function(ta) {
        ta.addEventListener('input', function() {
            var tr = this.closest('tr');
            var idx = parseInt(tr.getAttribute('data-idx'));
            var field = this.getAttribute('data-field');
            var tp = this.getAttribute('data-tp');
            var parentDiv = this.closest('div[class*="-cell"]');
            var isCn = parentDiv && parentDiv.classList.contains('cn-cell');

            currentProject.records[idx][field] = this.value;

            // 防抖：清除之前的定时器
            if (translateTimeout) clearTimeout(translateTimeout);

            // 翻译：中文→越南文 或 越南文→中文
            translateTimeout = setTimeout(function() {
                if (isCn && ta.value.trim()) {
                    translateText(ta.value, 'zh-CN', 'vi', function(result) {
                        if (result) {
                            currentProject.records[idx][tp + 'Vi'] = result;
                            var viTa = tr.querySelector('.vi-cell textarea[data-tp="' + tp + '"]');
                            if (viTa && !viTa.value) viTa.value = result;
                        }
                        autoSave();
                    });
                } else if (!isCn && ta.value.trim()) {
                    translateText(ta.value, 'vi', 'zh-CN', function(result) {
                        if (result) {
                            currentProject.records[idx][tp + 'Cn'] = result;
                            var cnTa = tr.querySelector('.cn-cell textarea[data-tp="' + tp + '"]');
                            if (cnTa && !cnTa.value) cnTa.value = result;
                        }
                        autoSave();
                    });
                } else {
                    autoSave();
                }
            }, 800); // 800ms 防抖
        });
    });
}

// ========== 自动保存 ==========
var autoSaveTimer = null;
function autoSave() {
    if (!currentProject) return;

    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(function() {
        saveCurrentProject(true);
    }, 1000);
}

// ========== 保存项目 ==========
async function saveCurrentProject(showIndicator) {
    if (!currentProject) return;

    // 更新表头
    var h = currentProject.header;
    h.date = document.getElementById('hDate') ? document.getElementById('hDate').value : h.date;
    h.recorder = document.getElementById('hRecorder') ? document.getElementById('hRecorder').value : h.recorder;
    h.project = document.getElementById('hProject') ? document.getElementById('hProject').value : h.project;
    h.ticket = document.getElementById('hTicket') ? document.getElementById('hTicket').value : h.ticket;
    h.date = h.date || getLocalDate();

    // 更新时间
    currentProject.updatedAt = new Date().toISOString();

    updateSyncStatus('保存中...', 'syncing');

    try {
        await db.collection('tracker_projects').doc(currentProject.id).set(currentProject, {merge: true});

        // 更新本地列表
        for (var i = 0; i < projectList.length; i++) {
            if (projectList[i].id === currentProject.id) {
                projectList[i] = currentProject;
                break;
            }
        }
        renderProjectList(document.getElementById('searchInput').value);

        updateSyncStatus('已同步', 'synced');

        if (showIndicator !== false) {
            showSavedIndicator();
        }
    } catch (error) {
        console.error('保存失败:', error);
        updateSyncStatus('保存失败', 'error');
    }
}

// ========== 处理图片上传（压缩后上传到 Firebase Storage） ==========
document.getElementById('imgInput').addEventListener('change', function(e) {
    if (curRow < 0 || !e.target.files.length || !currentProject) {
        console.warn('Cannot upload: curRow=', curRow, 'files=', e.target.files.length, 'project=', !!currentProject);
        return;
    }

    if (!currentProject.records[curRow].imgs) currentProject.records[curRow].imgs = [];

    var files = Array.from(e.target.files).slice(0, 6 - currentProject.records[curRow].imgs.length);
    if (files.length === 0) { alert('最多6张图片 / Toi da 6 anh'); return; }
    
    var loadingDiv = document.getElementById('loadingOverlay');
    loadingDiv.querySelector('p').textContent = '上传中... / Dang tai len...';
    loadingDiv.classList.add('active');

    var loaded = 0;
    var errors = [];

    files.forEach(function(file) {
        // 压缩到 100KB
        compressImage(file, 100, function(dataUrl) {
            if (!dataUrl) {
                errors.push(file.name);
                loaded++;
                checkDone();
                return;
            }
            // 上传到 Firebase Storage
            uploadImageToStorage(dataUrl, currentProject.id, function(storageUrl) {
                console.log('Upload callback:', storageUrl ? 'success' : 'failed');
                if (storageUrl) {
                    currentProject.records[curRow].imgs.push(storageUrl);
                } else {
                    // 如果上传失败，存储 base64（作为备用）
                    console.warn('Storage upload failed, using base64 fallback');
                    currentProject.records[curRow].imgs.push(dataUrl);
                }
                loaded++;
                checkDone();
            });
        });
    });

    function checkDone() {
        if (loaded < files.length) return;
        loadingDiv.classList.remove('active');
        loadingDiv.querySelector('p').textContent = '处理中... / Dang xu ly...';
        if (errors.length > 0) {
            alert('部分图片上传失败: ' + errors.join(', '));
        }
        render();
        autoSave();
    }

    e.target.value = '';
});

// ========== 处理产品图片上传 ==========
function handleProductImgUpload(e) {
    console.log('handleProductImgUpload called', e.target.files);
    if (!e.target.files.length || !currentProject) {
        console.log('Early return: files=', e.target.files.length, 'currentProject=', currentProject);
        return;
    }

    if (!currentProject.productImgs) currentProject.productImgs = [];

    var files = Array.from(e.target.files).slice(0, 6 - currentProject.productImgs.length);
    if (files.length === 0) { alert('最多6张图片 / Toi da 6 anh'); return; }

    var loadingDiv = document.getElementById('loadingOverlay');
    loadingDiv.querySelector('p').textContent = '上传中... / Dang tai len...';
    loadingDiv.classList.add('active');

    var loaded = 0;
    var errors = [];

    files.forEach(function(file) {
        // 压缩到 100KB
        compressImage(file, 100, function(dataUrl) {
            console.log('Image compressed, uploading...');
            // 上传到 Firebase Storage
            uploadImageToStorage(dataUrl, currentProject.id, function(storageUrl) {
                console.log('Upload result:', storageUrl ? 'success' : 'failed');
                if (storageUrl) {
                    currentProject.productImgs.push(storageUrl);
                } else {
                    // 如果上传失败，存储 base64（作为备用）
                    console.warn('Product image upload failed, using base64 fallback');
                    currentProject.productImgs.push(dataUrl);
                }
                loaded++;
                if (loaded === files.length) {
                    loadingDiv.classList.remove('active');
                    loadingDiv.querySelector('p').textContent = '处理中... / Dang xu ly...';
                    if (errors.length > 0) {
                        alert('部分图片上传失败: ' + errors.join(', '));
                    }
                    renderProductImgs();
                    autoSave();
                }
            });
        });
    });

    e.target.value = '';
}

    var filename = getFileName('.pdf');
    var h = currentProject.header;
    var records = currentProject.records;

    var pdfContent = document.createElement('div');
    pdfContent.style.cssText = 'position:fixed;left:-9999px;top:0;width:1100px;padding:30px;background:#fff;font-family:Arial,sans-serif;';

// ========== 导出功能 ==========
var currentExportMode = '';
var currentExportData = [];

function toggleExportMenu() {
    var menu = document.getElementById('exportMenu');
    menu.classList.toggle('show');
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.export-dropdown')) {
        var menu = document.getElementById('exportMenu');
        if (menu) menu.classList.remove('show');
    }
});

function showExportModal(mode) {
    currentExportMode = mode;
    var menu = document.getElementById('exportMenu');
    var modal = document.getElementById('exportModal');
    var desc = document.getElementById('exportModalDesc');
    var inputDiv = document.getElementById('exportProjectInput');
    var projectInput = document.getElementById('exportProjectNumber');
    
    if (menu) menu.classList.remove('show');
    
    if (mode === 'current') {
        if (!currentProject || !currentProject.records || currentProject.records.length === 0) {
            alert('当前没有数据 / Khong co du lieu hien tai');
            return;
        }
        desc.textContent = '导出当前项目：' + (currentProject.header.project || '未命名');
        inputDiv.style.display = 'none';
    } else if (mode === 'all') {
        desc.textContent = '导出所有项目数据汇总';
        inputDiv.style.display = 'none';
    } else if (mode === 'bynumber') {
        desc.textContent = '按项目号导出 - 输入项目号筛选';
        inputDiv.style.display = 'block';
        projectInput.value = '';
        projectInput.focus();
    }
    
    modal.classList.add('active');
}

function closeExportModal() {
    document.getElementById('exportModal').classList.remove('active');
}

async function doExport() {
    var format = document.getElementById('exportFormat').value;
    var projectNumber = document.getElementById('exportProjectNumber').value.trim();
    
    closeExportModal();
    
    var loadingOverlay = document.getElementById('loadingOverlay');
    loadingOverlay.classList.add('active');
    
    // 如果导出当前项目，先等待翻译完成
    if (currentExportMode === 'current' && currentProject && currentProject.records) {
        await waitForTranslations();
    }
    
    try {
        var data;
        var username = sessionStorage.getItem('apex_username') || 'guest';
        var isUserAdmin = isAdmin();
        
        if (currentExportMode === 'current') {
            // 安全检查：普通用户只能导出自己的项目
            if (!isUserAdmin && currentProject.user !== username) {
                alert('您只能导出自己创建的项目 / Ban chi co the xuat du an cua minh');
                loadingOverlay.classList.remove('active');
                return;
            }
            data = [currentProject];
        } else if (currentExportMode === 'all') {
            data = await loadAllProjectsForExport();
        } else if (currentExportMode === 'bynumber') {
            if (!projectNumber) {
                alert('请输入项目号 / Vui long nhap ma du an');
                loadingOverlay.classList.remove('active');
                return;
            }
            data = await loadProjectsByNumber(projectNumber);
            if (data.length === 0) {
                alert('未找到项目号：' + projectNumber);
                loadingOverlay.classList.remove('active');
                return;
            }
        }
        
        if (data.length === 0) {
            alert('没有数据可导出 / Khong co du lieu de xuat');
            loadingOverlay.classList.remove('active');
            return;
        }
        
        if (format === 'excel') {
            await exportToExcel(data);
        } else {
            await exportToPDF(data);
        }
    } catch (err) {
        console.error('Export error:', err);
        alert('导出失败 / Xuat that bai');
    }
    
    loadingOverlay.classList.remove('active');
}

async function loadAllProjectsForExport() {
    var username = sessionStorage.getItem('apex_username') || 'guest';
    var isUserAdmin = isAdmin();
    console.log('loadAllProjectsForExport - user:', username, 'isAdmin:', isUserAdmin);
    
    // 管理员导出全部，普通用户只导出自己的
    var snapshot;
    if (isUserAdmin) {
        snapshot = await db.collection('tracker_projects').get();
    } else {
        snapshot = await db.collection('tracker_projects').where('user', '==', username).get();
    }
    
    console.log('Firebase returned', snapshot.size, 'documents');
    
    var projects = [];
    snapshot.forEach(function(doc) {
        var p = doc.data();
        p.id = doc.id;
        var recordCount = p.records ? p.records.length : 0;
        console.log('  Project:', p.header?.project || 'unnamed', '| Records:', recordCount);
        projects.push(p);
    });
    
    projects.sort(function(a, b) {
        var timeA = a.updatedAt ? new Date(a.updatedAt) : new Date(0);
        var timeB = b.updatedAt ? new Date(b.updatedAt) : new Date(0);
        return timeB - timeA;
    });
    
    console.log('Total projects loaded:', projects.length);
    return projects;
}

// 等待所有翻译完成后再导出
var pendingTranslations = 0;

function waitForTranslations() {
    return new Promise(function(resolve) {
        var checkInterval = setInterval(function() {
            if (pendingTranslations === 0) {
                clearInterval(checkInterval);
                resolve();
            }
        }, 100);
        
        // 最多等待10秒超时
        setTimeout(function() {
            clearInterval(checkInterval);
            resolve();
        }, 10000);
    });
}

async function loadProjectsByNumber(projectNumber) {
    var username = sessionStorage.getItem('apex_username') || 'guest';
    var isUserAdmin = isAdmin();
    
    // 管理员可以搜索所有项目，普通用户只能搜索自己的
    var snapshot;
    if (isUserAdmin) {
        snapshot = await db.collection('tracker_projects').get();
    } else {
        snapshot = await db.collection('tracker_projects').where('user', '==', username).get();
    }
    
    var projects = [];
    snapshot.forEach(function(doc) {
        var p = doc.data();
        p.id = doc.id;
        if (p.header && p.header.project && p.header.project.includes(projectNumber)) {
            projects.push(p);
        }
    });
    
    return projects;
}

// 获取图片base64数据
async function fetchImageBase64(url) {
    try {
        var response = await fetch(url);
        var blob = await response.blob();
        return new Promise(function(resolve, reject) {
            var reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    } catch (e) {
        console.log('获取图片失败:', url, e);
        return null;
    }
}

// 带图片缩略图的Excel导出
async function exportToExcel(data) {
    try {
        // 加载 exceljs 库
        if (typeof ExcelJS === 'undefined') {
            await new Promise(function(resolve, reject) {
                var script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js';
                script.onload = resolve;
                script.onerror = function() { reject(new Error('ExcelJS加载失败')); };
                document.head.appendChild(script);
            });
        }
        
        var workbook = new ExcelJS.Workbook();
        workbook.creator = 'Apex';
        workbook.created = new Date();
        
        var sheet = workbook.addWorksheet('全部记录');
        
        // 设置表头
        var headers = ['项目号', '日期', '记录人', '工单号', '分类', '问题描述(CN)', '问题描述(VN)', '解决方法(CN)', '解决方法(VN)', '责任部门', '跟进人'];
        var headerRow = sheet.addRow(headers);
        
        // 设置表头样式
        headerRow.eachCell(function(cell) {
            cell.font = { bold: true, color: { argb: 'FFFFFF' } };
            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '4A90D9' } };
            cell.alignment = { vertical: 'middle', horizontal: 'center' };
            cell.border = {
                top: { style: 'thin' },
                left: { style: 'thin' },
                bottom: { style: 'thin' },
                right: { style: 'thin' }
            };
        });
        
        // 收集所有记录
        var allRecords = [];
        data.forEach(function(project) {
            var h = project.header || {};
            var records = project.records || [];
            if (!Array.isArray(records)) {
                records = Object.values(records || {});
            }
            records.forEach(function(r) {
                if (r) {
                    allRecords.push({h: h, r: r});
                }
            });
        });
        
        // 预加载所有图片
        for (var i = 0; i < allRecords.length; i++) {
            var item = allRecords[i];
            var imgs = item.r.imgs || [];
            var loadedImgs = [];
            
            for (var j = 0; j < Math.min(imgs.length, 3); j++) {
                var base64 = await fetchImageBase64(imgs[j]);
                if (base64) {
                    loadedImgs.push(base64);
                }
            }
            item.r._imgs = loadedImgs;
        }
        
        // 添加数据行
        allRecords.forEach(function(item, idx) {
            var h = item.h;
            var r = item.r;
            var catText = CATEGORIES[r.category] ? CATEGORIES[r.category].cn : '';
            var deptText = DEPARTMENTS[r.department] ? DEPARTMENTS[r.department].cn : '';
            var imgs = r._imgs || [];
            
            // 创建行
            var row = sheet.addRow([
                h.project || '',
                h.date || '',
                h.recorder || '',
                h.ticket || '',
                catText,
                r.issueCn || '',
                r.issueVi || '',
                r.solCn || '',
                r.solVi || '',
                deptText,
                r.pic || ''
            ]);
            
            // 设置行高
            if (imgs.length > 0) {
                row.height = 70;
            }
            
            // 设置单元格样式
            row.eachCell(function(cell) {
                cell.alignment = { vertical: 'top', wrapText: true };
                cell.border = {
                    top: { style: 'thin' },
                    left: { style: 'thin' },
                    bottom: { style: 'thin' },
                    right: { style: 'thin' }
                };
            });
            
            // 添加图片缩略图
            if (imgs.length > 0) {
                var rowNum = idx + 2;  // 表头是第1行，数据从第2行开始
                
                imgs.forEach(function(base64, imgIdx) {
                    try {
                        // 移除 data:image/xxx;base64, 前缀
                        var base64Data = base64.replace(/^data:image\/\w+;base64,/, '');
                        
                        var imageId = workbook.addImage({
                            base64: base64Data,
                            extension: 'png'
                        });
                        
                        // 计算图片位置：放在数据列的右侧
                        // 每个图片宽度约80px，在第12列(L)开始
                        var colOffset = imgIdx;
                        
                        sheet.addImage(imageId, {
                            tl: { col: 11 + colOffset, row: rowNum - 1 },
                            ext: { width: 80, height: 60 },
                            hyperlinks: {
                                hyperlink: r.imgs[imgIdx],
                                tooltip: '点击查看原图'
                            }
                        });
                    } catch (e) {
                        console.log('添加图片失败:', e);
                    }
                });
            }
        });
        
        // 设置列宽
        sheet.columns = [
            { width: 15 }, { width: 12 }, { width: 10 }, { width: 12 },
            { width: 12 }, { width: 35 }, { width: 35 }, { width: 35 },
            { width: 35 }, { width: 12 }, { width: 10 }
        ];
        
        // 图片列宽
        sheet.getColumn(12).width = 10;
        sheet.getColumn(13).width = 10;
        sheet.getColumn(14).width = 10;
        
        // 冻结首行
        sheet.views = [{ state: 'frozen', xSplit: 0, ySplit: 1 }];
        
        // 导出
        var buffer = await workbook.xlsx.writeBuffer();
        var blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = '问题追踪表_全部记录_' + new Date().toISOString().slice(0,10) + '.xlsx';
        a.click();
        URL.revokeObjectURL(url);
        
    } catch (err) {
        console.error('Excel导出错误:', err);
        alert('Excel导出失败: ' + err.message + '\n\n请按F12查看控制台详情');
    }
}

        }

function getLocalDate() {
    var now = new Date();
    return now.getFullYear() + '-' +
           String(now.getMonth() + 1).padStart(2, '0') + '-' +
           String(now.getDate()).padStart(2, '0');
}

function getFileName(suffix) {
    var project = currentProject ? (currentProject.header.project || 'KhongCoDuAn') : 'KhongCoDuAn';
    var date = currentProject ? (currentProject.header.date || getLocalDate()) : getLocalDate();
    project = project.replace(/[\\/:*?"<>|]/g, '_');
    return '问题追踪表-' + project + '-' + date + suffix;
}

function getCategoryText(idx, lang) {
    if (idx >= 0 && idx < CATEGORIES.length) {
        return lang === 'cn' ? CATEGORIES[idx].cn : CATEGORIES[idx].vn;
    }
    return '';
}

// ========== 翻译函数（统一使用 Google Translate） ==========
function translateText(text, fromLang, toLang, callback) {
    if (!text || !text.trim()) { callback(''); return; }

    pendingTranslations++;  // 开始翻译，计数+1

    // Google Translate API
    var googleLangMap = {
        'zh-CN': 'zh',
        'vi': 'vi',
        'en': 'en'
    };
    var sl = googleLangMap[fromLang] || fromLang;
    var tl = googleLangMap[toLang] || toLang;
    
    var url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + sl + '&tl=' + tl + '&dt=t&q=' + encodeURIComponent(text);

    console.log('Translating:', text.substring(0, 50), sl, '->', tl);

    fetch(url)
        .then(function(response) { return response.json(); })
        .then(function(data) {
            console.log('Translation response:', data);
            if (data && data[0]) {
                var result = '';
                for (var i = 0; i < data[0].length; i++) {
                    result += data[0][i][0];
                }
                console.log('Translation result:', result);
                pendingTranslations--;  // 翻译完成，计数-1
                callback(result);
            } else {
                console.warn('Translation failed:', data);
                pendingTranslations--;
                callback('');
            }
        })
        .catch(function(err) {
            console.error('Translation error:', err);
            pendingTranslations--;
            callback('');
        });
}

function escHtml(str) {
    return str ? str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : '';
}

function showLoading(show) {
    var el = document.getElementById('loadingOverlay');
    if (show) el.classList.add('active');
    else el.classList.remove('active');
}
