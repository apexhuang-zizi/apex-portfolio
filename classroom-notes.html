<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课堂笔记与测试</title>
<style>
:root{--pri:#6366f1;--pri-d:#4338ca;--bg:#f8fafc;--sf:#fff;--bd:#e2e8f0;--tx:#1e293b;--tx-m:#64748b;--ok:#22c55e;--er:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:.5rem 1rem;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:.8rem}
.btn-back{background:none;border:1px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);border-radius:8px;padding:.3rem .7rem;cursor:pointer;font-size:.85rem;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,.15);color:#fff}
.hdr h1{font-size:1rem;font-weight:700}
.hdr-r{font-size:.82rem;opacity:.9}
.selector-bar{display:flex;align-items:center;gap:.7rem;padding:.45rem 1rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.sel-group{display:flex;align-items:center;gap:.4rem}
.sel-group label{font-size:.83rem;font-weight:600;white-space:nowrap}
.sel-sm{padding:.3rem .6rem;border:1.5px solid var(--bd);border-radius:6px;font-size:.83rem;background:var(--sf);color:var(--tx);cursor:pointer}
.sel-sm:focus{border-color:var(--pri);outline:none}
.btn-extract{background:var(--pri);color:#fff;border:none;border-radius:8px;padding:.32rem .85rem;cursor:pointer;font-size:.83rem;font-weight:600;transition:background .15s}
.btn-extract:hover{background:var(--pri-d)}
.btn-extract:disabled{background:#94a3b8;cursor:not-allowed}
.main-wrap{display:flex;flex:1;overflow:hidden}
.side-l{width:16%;min-width:140px;max-width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.side-h{padding:.5rem .7rem;font-weight:700;font-size:.83rem;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0}
.word-list{flex:1;overflow-y:auto;padding:.3rem}
.word-item{padding:.38rem .6rem;cursor:pointer;border-radius:6px;font-size:.82rem;transition:background .15s;display:flex;justify-content:space-between;align-items:center;gap:.2rem}
.word-item:hover{background:var(--bg)}
.word-item.show-zh{background:#ede9fe}
.word-vi{font-weight:500;flex:1}
.word-zh{font-size:.72rem;color:var(--tx-m);flex:1;display:none}
.word-item.show-zh .word-vi{display:none}
.word-item.show-zh .word-zh{display:block}
.tts-btn{background:none;border:none;cursor:pointer;font-size:.9rem;padding:0 .15rem;opacity:.55;flex-shrink:0}
.tts-btn:hover{opacity:1}
.center-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--bd);padding:0 .4rem;flex-shrink:0}
.tab{padding:.5rem .9rem;cursor:pointer;font-size:.87rem;font-weight:500;color:var(--tx-m);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--pri)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:700}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.whiteboard{flex:1;overflow-y:auto;padding:.7rem;background:var(--bg)}
.wb-empty{text-align:center;color:var(--tx-m);padding:2rem;font-size:.87rem}
.sentence-card{background:var(--sf);border-radius:8px;padding:.65rem .9rem;margin-bottom:.45rem;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:.9rem;line-height:1.7}
.sentence-card .row-num{display:inline-block;min-width:1.4rem;font-weight:700;color:var(--pri);margin-right:.4rem}
.card-actions{display:flex;gap:.35rem;justify-content:flex-end;margin-top:.35rem}
.sentence-btn{background:none;border:1px solid var(--bd);border-radius:6px;padding:.18rem .5rem;cursor:pointer;font-size:.77rem;color:var(--tx-m);transition:all .15s}
.sentence-btn:hover{background:var(--bg)}
.sentence-btn.readonly-btn{opacity:.4;cursor:default}
.input-area{flex-shrink:0;display:flex;flex-direction:column;padding:.55rem .8rem;background:var(--sf);border-top:1px solid var(--bd);transition:max-height .2s ease;max-height:200px;overflow:hidden}
.input-area.collapsed{max-height:36px;padding:.35rem .8rem}
.input-area.collapsed .input-main{display:none}
.input-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem}
.input-header label{font-size:.8rem;color:var(--tx-m)}
.collapse-btn{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--tx-m);padding:0 .2rem}
.collapse-btn:hover{color:var(--pri)}
.input-main{display:flex;flex-direction:column;gap:.35rem}
.input-box{border:2px solid var(--bd);border-radius:8px;padding:.5rem .7rem;font-size:.9rem;resize:none;font-family:inherit;min-height:68px;max-height:140px;overflow-y:auto}
.input-box:focus{border-color:var(--pri);outline:none}
.input-actions{display:flex;justify-content:flex-end;gap:.4rem}
.btn-submit{background:var(--pri);color:#fff;border:none;border-radius:8px;padding:.38rem .9rem;cursor:pointer;font-size:.83rem;font-weight:600}
.btn-submit:hover{background:var(--pri-d)}
.btn-sm{background:none;border:1px solid var(--bd);border-radius:8px;padding:.38rem .7rem;cursor:pointer;font-size:.83rem;color:var(--tx-m)}
.btn-sm:hover{background:var(--bg)}
.side-r{width:18%;min-width:150px;max-width:260px;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.side-r .side-h{display:flex;justify-content:space-between;align-items:center}
.extract-list{flex:1;overflow-y:auto;padding:.35rem}
.extract-item{padding:.35rem .55rem;border-radius:6px;font-size:.8rem;margin-bottom:.28rem}
.extract-item.word-type{background:#ede9fe;border-left:3px solid var(--pri)}
.extract-item.grammar-type{background:#fef9c3;border-left:3px solid #ca8a04}
.extract-word{font-weight:600;margin-bottom:.1rem}
.extract-meta{font-size:.7rem;color:var(--tx-m)}
.side-r-footer{padding:.45rem;border-top:1px solid var(--bd);flex-shrink:0}
.btn-test{width:100%;background:var(--ok);color:#fff;border:none;border-radius:8px;padding:.45rem;cursor:pointer;font-size:.86rem;font-weight:700}
.btn-test:hover{background:#16a34a}
.float-toolbar{display:none;position:fixed;background:#1e293b;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:9999;padding:.25rem .35rem;gap:.15rem;align-items:center}
.float-toolbar.show{display:flex}
.ft-btn{background:none;border:none;color:#fff;border-radius:5px;padding:.28rem .5rem;cursor:pointer;font-size:.78rem;white-space:nowrap;transition:background .1s}
.ft-btn:hover{background:rgba(255,255,255,.2)}
.ft-sep{width:1px;height:16px;background:rgba(255,255,255,.25);margin:0 .15rem}
.hl-bg{background:#fde68a}
.hl-hard{background:#fecaca}
.hl-grammar{background:#bfdbfe}
.context-menu{display:none;position:fixed;background:var(--sf);border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:2000;min-width:150px;padding:.3rem 0}
.context-menu.show{display:block}
.ctx-item{padding:.38rem .75rem;cursor:pointer;font-size:.82rem;transition:background .1s}
.ctx-item:hover{background:var(--bg)}
.ctx-sep{height:1px;background:var(--bd);margin:.2rem 0}
.test-area{display:none;flex:1;overflow-y:auto;padding:.8rem;background:var(--bg)}
.test-area.active{display:flex;flex-direction:column}
.test-empty{text-align:center;color:var(--tx-m);padding:2rem;font-size:.88rem}
.test-result-card{background:var(--sf);border-radius:10px;padding:.9rem;margin-bottom:.7rem;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.test-result-score{font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:.4rem}
.test-result-score.high{color:var(--ok)}
.test-result-score.mid{color:#f59e0b}
.test-result-score.low{color:var(--er)}
@media(max-width:900px){.side-l{width:130px;min-width:110px}.side-r{width:140px;min-width:120px}}
</style>
</head>
<body>
<div class="hdr">
<div class="hdr-l"><a class="btn-back" href="index.html">← 返回首页</a><h1>📒 课堂笔记与测试</h1></div>
<div class="hdr-r" id="user-display">加载中...</div>
</div>
<div class="selector-bar">
<div class="sel-group"><label>课本:</label><select class="sel-sm" id="textbook-sel"><option value="">-- 课本 --</option><option value="VSL1">VSL1</option><option value="VSL2">VSL2</option></select></div>
<div class="sel-group"><label>单元:</label><select class="sel-sm" id="unit-sel" disabled><option value="">-- 先选课本 --</option></select></div>
<button class="btn-extract" id="btn-extract-words" disabled onclick="extractWords()">📖 提取单词</button>
<button class="btn-extract" id="btn-extract-dialogue" disabled onclick="extractDialogue()">💬 提取课文</button>
</div>
<div class="main-wrap">
<div class="side-l"><div class="side-h">📚 单词表</div><div class="word-list" id="word-list"><div class="wb-empty">选择课本和单元后<br>点击「提取单词」按钮</div></div></div>
<div class="center-panel">
<div class="tabs">
<div class="tab active" data-tab="notes" onclick="switchTab('notes')">📝 笔记</div>
<div class="tab" data-tab="exercises" onclick="switchTab('exercises')">✏️ 练习</div>
<div class="tab" data-tab="dialogue" onclick="switchTab('dialogue')">📖 课文</div>
<div class="tab" data-tab="test" onclick="switchTab('test')">📊 测试</div>
</div>
<div class="content-area" id="content-area"><div class="whiteboard" id="whiteboard"><div class="wb-empty">在下方输入框录入内容...</div></div>
<div class="input-area" id="input-area"><div class="input-header"><label id="input-label">✍️ 录入内容</label><button class="collapse-btn" id="collapse-btn" onclick="toggleInputCollapse()" title="隐藏/展开">▼</button></div><div class="input-main"><textarea class="input-box" id="sentence-input" placeholder="输入内容，选中文字后弹出工具条可标记..."></textarea><div class="input-actions"><button class="btn-sm" onclick="clearInput()">🗑️ 清空</button><button class="btn-submit" onclick="submitSentence()">📤 提交</button></div></div></div>
</div>
<div class="test-area" id="test-area"><div class="test-empty" id="test-empty"><div style="font-size:2rem;margin-bottom:.5rem">📝</div>点击右侧「进入测试」开始</div><div id="test-results" style="flex:1"></div></div>
</div>
<div class="side-r"><div class="side-h">⭐ 重点提取</div><div class="extract-list" id="extract-list"><div class="wb-empty" style="padding:1rem;font-size:.8rem">标记的词语和语法<br>将自动汇聚到这里</div></div><div class="side-r-footer"><button class="btn-test" onclick="enterTest()">🎯 进入测试</button></div></div>
</div>
<div class="float-toolbar" id="float-toolbar"><button class="ft-btn" onclick="applyMark('bg')">🔤 背景</button><button class="ft-btn" onclick="applyMark('hard')">⚠ 难点</button><button class="ft-btn" onclick="applyMark('grammar')">📝 语法</button><div class="ft-sep"></div><button class="ft-btn" onclick="applyMark('note')">💬 注释</button><button class="ft-btn" onclick="applyMark('antonym')">↔ 反</button><button class="ft-btn" onclick="applyMark('synonym')">↔ 同</button></div>
<div class="context-menu" id="context-menu"><div class="ctx-item" onclick="ctxMark('bg')">🔤 标记背景色</div><div class="ctx-item" onclick="ctxMark('hard')">⚠ 标记为难点</div><div class="ctx-item" onclick="ctxMark('grammar')">📝 标记为语法</div><div class="ctx-sep"></div><div class="ctx-item" onclick="ctxMark('note')">💬 添加注释</div><div class="ctx-item" onclick="ctxMark('antonym')">↔ 添加反义词</div><div class="ctx-item" onclick="ctxMark('synonym')">↔ 添加同义词</div></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
var firebaseConfig={apiKey:"AIzaSyCMPFTNEBWXA_EnkF7Yk__F1gdHYfPg8kM",authDomain:"vietnames-data.firebaseapp.com",projectId:"vietnames-data",storageBucket:"vietnames-data.firebasestorage.app",messagingSenderId:"1234567890",appId:"1:1234567890:web:abcdef1234567890"};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore(),auth=firebase.auth();
var currentUser=null,currentTextbook='',currentUnit='',currentTab='notes',wordList=[],extractedDialogue=[],records=[],marks=[];
var UNIT_MAP={VSL1:['U1','U2','U3','U4','U5','U6','U7','U8','U9','U10','U11','U12'],VSL2:['U1','U2','U3','U4','U5','U6','U7','U8','U9','U10','U11','U12']};
auth.onAuthStateChanged(function(u){if(u){currentUser=u;document.getElementById('user-display').textContent='\uD83D\uDC64 '+(u.displayName||u.email||'\u7528\u6237');}else{auth.signInAnonymously().then(function(c){currentUser=c.user;document.getElementById('user-display').textContent='\uD83D\uDC64 \u5BA2\u4EBA';}).catch(function(){document.getElementById('user-display').textContent='\uD83D\uDC64 \u5BA2\u4EBA';});}});
document.getElementById('textbook-sel').addEventListener('change',function(e){currentTextbook=e.target.value;var us=document.getElementById('unit-sel');us.innerHTML='<option value="">-- \u5355\u5143 --</option>';if(!currentTextbook){us.disabled=true;document.getElementById('btn-extract-words').disabled=true;document.getElementById('btn-extract-dialogue').disabled=true;return;}us.disabled=false;UNIT_MAP[currentTextbook].forEach(function(u){var o=document.createElement('option');o.value=u;o.textContent=u;us.appendChild(o);});document.getElementById('btn-extract-words').disabled=true;document.getElementById('btn-extract-dialogue').disabled=true;});
document.getElementById('unit-sel').addEventListener('change',function(e){currentUnit=e.target.value;var hasUnit=!!currentUnit;document.getElementById('btn-extract-words').disabled=!hasUnit;document.getElementById('btn-extract-dialogue').disabled=!hasUnit;if(hasUnit)loadAllData();else{wordList=[];extractedDialogue=[];records=[];marks=[];renderWordList();renderWhiteboard();renderExtractList();}});
async function loadAllData(){if(!currentUser||!currentTextbook||!currentUnit)return;try{var snap=await db.collection('cn_records').where('userId','==',currentUser.uid).where('textbook','==',currentTextbook).where('unit','==',currentUnit).get();records=[];snap.forEach(function(d){var item={id:d.id};var data=d.data();for(var k in data)item[k]=data[k];records.push(item);});var mSnap=await db.collection('cn_marks').where('userId','==',currentUser.uid).where('textbook','==',currentTextbook).where('unit','==',currentUnit).get();marks=[];mSnap.forEach(function(d){var item={id:d.id};var data=d.data();for(var k in data)item[k]=data[k];marks.push(item);});renderWordList();renderWhiteboard();renderExtractList();}catch(e){console.error(e);}}
async function extractWords(){if(!currentTextbook||!currentUnit)return;var vocab=currentTextbook==='VSL1'?window._vsl1Vocab:window._vsl2Vocab;if(!vocab){alert('\u8BCD\u5E93\u672A\u52A0\u8F7D\uFF0C\u8BF7\u5237\u65B0\u91CD\u8BD5');return;}var unitNum=parseInt(currentUnit.replace('U',''));var unitData=vocab.find(function(u){return u.id===unitNum;});if(!unitData){alert('\u672A\u627E\u5230\u8BE5\u5355\u5143\u8BCD\u5E93');return;}wordList=(unitData.words||[]).map(function(w){return{vi:w.vi||w.word||'',zh:w.zh||w.chinese||'',extracted:true};});renderWordList();}
async function extractDialogue(){if(!currentTextbook||!currentUnit)return;var unitNum=parseInt(currentUnit.replace('U',''));try{var snap=await db.collection('vietnamese_dialogues').where('textbook','==',currentTextbook).where('unit','==',unitNum).get();extractedDialogue=[];snap.forEach(function(d){var data=d.data();if(data.topic&&data.topic.indexOf(currentTextbook)!==-1){var item={id:d.id};for(var k in data)item[k]=data[k];extractedDialogue.push(item);}});if(!extractedDialogue.length)alert('\u672A\u627E\u5230\u8BE5\u5355\u5143\u7684\u8BFE\u6587\u5185\u5BB9');renderWhiteboard();}catch(e){console.error(e);alert('\u63D0\u53D6\u8BFE\u6587\u5931\u8D25');}}
function renderWordList(){var c=document.getElementById('word-list');if(!wordList.length){c.innerHTML='<div class="wb-empty">\u9009\u62E9\u8BFE\u672C\u548C\u5355\u5143\u540E<br>\u70B9\u51FB\u300C\u63D0\u53D6\u5355\u8BCD\u300D\u6309\u94AE</div>';return;}c.innerHTML='';wordList.forEach(function(w,i){var d=document.createElement('div');d.className='word-item';d.innerHTML='<span class="word-vi">'+escHtml(w.vi)+'</span><span class="word-zh">'+escHtml(w.zh)+'</span><button class="tts-btn" onclick="event.stopPropagation();tts(\''+w.vi.replace(/'/g,"\\'")+'\')">\uD83C\uDFA4</button>';d.onclick=function(){d.classList.toggle('show-zh');};c.appendChild(d);});}
function renderWhiteboard(){var wb=document.getElementById('whiteboard');if(currentTab==='dialogue'){renderDialogueTab(wb);return;}var tabRecs=records.filter(function(r){return r.tabType===currentTab;});if(!tabRecs.length){wb.innerHTML='<div class="wb-empty">\u6682\u65E0\u5185\u5BB9\uFF0C\u5728\u4E0B\u65B9\u5F55\u5165...</div>';return;}wb.innerHTML='';tabRecs.forEach(function(rec,idx){var card=document.createElement('div');card.className='sentence-card';card.innerHTML='<span class="row-num">'+(idx+1)+'.</span>'+(rec.html||escHtml(rec.textVi||''))+'<div class="card-actions"><button class="sentence-btn" onclick="ttsCard(this,\''+(rec.textVi||'').replace(/'/g,"\\'")+'\')">\uD83C\uDFA4</button><button class="sentence-btn" onclick="editRecord(\''+rec.id+'\')">\u270F\uFE0F</button><button class="sentence-btn" onclick="delRecord(\''+rec.id+'\')">\uD83D\uDDD1</button></div>';wb.appendChild(card);});}
function renderDialogueTab(wb){if(!extractedDialogue.length){wb.innerHTML='<div class="wb-empty">\u70B9\u51FB\u4E0A\u65B9\u300C\u63D0\u53D6\u8BFE\u6587\u300D\u6309\u94AE<br>\u67E5\u770B\u8BE5\u5355\u5143\u7684\u5BF9\u8BDD\u5185\u5BB9</div>';return;}wb.innerHTML='';var globalIdx=0;extractedDialogue.forEach(function(dlg){var text=dlg.textVi||dlg.text||'';var lines=text.split('\n');lines.forEach(function(line){if(line.trim()===''&&globalIdx>0){var spacer=document.createElement('div');spacer.style.height='.4rem';wb.appendChild(spacer);return;}globalIdx++;var card=document.createElement('div');card.className='sentence-card';card.innerHTML='<span class="row-num">'+globalIdx+'.</span>'+escHtml(line)+'<div class="card-actions"><button class="sentence-btn" onclick="ttsCard(this,\''+line.replace(/'/g,"\\'")+'\')">\uD83C\uDFA4</button><button class="sentence-btn readonly-btn">\u270F\uFE0F</button><button class="sentence-btn readonly-btn">\uD83D\uDDD1</button></div>';wb.appendChild(card);});});}
function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});var ca=document.getElementById('content-area'),ta=document.getElementById('test-area'),ia=document.getElementById('input-area'),il=document.getElementById('input-label');if(tab==='test'){ca.style.display='none';ta.classList.add('active');renderTestResults();}else{ta.classList.remove('active');ca.style.display='flex';ia.style.display='flex';var labels={notes:'\u5F55\u5165\u7B14\u8BB0',exercises:'\u5F55\u5165\u7EC3\u4E60',dialogue:'\u8BFE\u6587\u5185\u5BB9\uFF08\u53EA\u8BFB\uFF09'};il.textContent=labels[tab]||'\u5F55\u5165\u5185\u5BB9';if(tab==='dialogue'){ia.classList.add('collapsed');}else{ia.classList.remove('collapsed');}renderWhiteboard();}}
async function submitSentence(){if(currentTab==='dialogue')return;var input=document.getElementById('sentence-input'),text=input.value.trim();if(!text){alert('\u8BF7\u8F93\u5165\u5185\u5BB9');return;}if(!currentUser||!currentTextbook||!currentUnit){alert('\u8BF7\u5148\u9009\u62E9\u8BFE\u672C\u548C\u5355\u5143');return;}try{var doc=await db.collection('cn_records').add({userId:currentUser.uid,textbook:currentTextbook,unit:currentUnit,tabType:currentTab,textVi:text,html:escHtml(text),createdAt:firebase.firestore.FieldValue.serverTimestamp()});records.unshift({id:doc.id,userId:currentUser.uid,textbook:currentTextbook,unit:currentUnit,tabType:currentTab,textVi:text,html:escHtml(text)});input.value='';renderWhiteboard();}catch(e){console.error(e);alert('\u4FDD\u5B58\u5931\u8D25');}}
async function editRecord(id){var rec=records.find(function(r){return r.id===id;});if(!rec)return;var newText=prompt('\u4FEE\u6539\u5185\u5BB9:',rec.textVi||'');if(!newText||newText===rec.textVi)return;try{await db.collection('cn_records').doc(id).update({textVi:newText,html:escHtml(newText),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});rec.textVi=newText;rec.html=escHtml(newText);renderWhiteboard();}catch(e){console.error(e);alert('\u4FEE\u6539\u5931\u8D25');}}
async function delRecord(id){if(!confirm('\u786E\u8BA4\u5220\u9664\uFF1F'))return;try{await db.collection('cn_records').doc(id).delete();records=records.filter(function(r){return r.id!==id;});renderWhiteboard();}catch(e){console.error(e);alert('\u5220\u9664\u5931\u8D25');}}
function renderExtractList(){var c=document.getElementById('extract-list');var wMarks=marks.filter(function(m){return m.type==='hard'||m.type==='bg';});var gMarks=marks.filter(function(m){return m.type==='grammar';});if(!wMarks.length&&!gMarks.length){c.innerHTML='<div class="wb-empty" style="padding:1rem;font-size:.8rem">\u6807\u8BB0\u7684\u8BCD\u8BED\u548C\u8BED\u6CD5<br>\u5C06\u81EA\u52A8\u6C47\u805A\u5230\u8FD9\u91CC</div>';return;}c.innerHTML='';wMarks.forEach(function(m){var d=document.createElement('div');d.className='extract-item word-type';d.innerHTML='<div class="extract-word">\u2605 '+escHtml(m.word)+'</div><div class="extract-meta">'+(m.type==='hard'?'\u26A0 \u96BE\u70B9':'\u80CC\u666F')+'</div>';c.appendChild(d);});gMarks.forEach(function(m){var d=document.createElement('div');d.className='extract-item grammar-type';d.innerHTML='<div class="extract-word">\u25C6 '+escHtml(m.word)+'</div><div class="extract-meta">\u8BED\u6CD5</div>';c.appendChild(d);});}
async function applyMark(type){var sel=window._selText;if(!sel)return;var word=sel.text;hideFloatToolbar();var extra=null;if(type==='note'){extra=prompt('\u8BF7\u8F93\u5165\u6CE8\u91CA\u5185\u5BB9:');if(extra===null)return;}else if(type==='antonym'){extra=prompt('\u8BF7\u8F93\u5165\u53CD\u4E49\u8BCD:');if(extra===null)return;}else if(type==='synonym'){extra=prompt('\u8BF7\u8F93\u5165\u540C\u4E49\u8BCD:');if(extra===null)return;}if(!currentUser||!currentTextbook||!currentUnit)return;try{var doc=await db.collection('cn_marks').add({userId:currentUser.uid,textbook:currentTextbook,unit:currentUnit,tabType:currentTab,word:word,type:type,extra:extra,createdAt:firebase.firestore.FieldValue.serverTimestamp()});marks.push({id:doc.id,userId:currentUser.uid,textbook:currentTextbook,unit:currentUnit,tabType:currentTab,word:word,type:type,extra:extra});renderExtractList();}catch(e){console.error(e);}}
function ctxMark(type){document.getElementById('context-menu').classList.remove('show');applyMark(type);}
function enterTest(){if(!currentTextbook||!currentUnit){alert('\u8BF7\u5148\u9009\u62E9\u8BFE\u672C\u548C\u5355\u5143');return;}switchTab('test');}
function renderTestResults(){var empty=document.getElementById('test-empty');var c=document.getElementById('test-results');var testRecs=records.filter(function(r){return r.tabType==='test';});if(!testRecs.length){empty.style.display='block';c.innerHTML='';return;}empty.style.display='none';c.innerHTML='';testRecs.forEach(function(rec){var card=document.createElement('div');card.className='test-result-card';var score=rec.score||0;var cls=score>=80?'high':score>=60?'mid':'low';card.innerHTML='<div class="test-result-score '+cls+'">'+score+'\u5206</div><div style="font-size:.85rem;color:var(--tx-m);margin-bottom:.5rem">'+(rec.date||'')+' '+(rec.weakAreas?'\u5F31\u9879: '+rec.weakAreas:'')+'</div><div style="font-size:.87rem">'+(rec.analysis||'')+'</div>';c.appendChild(card);});}
function toggleInputCollapse(){document.getElementById('input-area').classList.toggle('collapsed');}
function clearInput(){document.getElementById('sentence-input').value='';}
var currentAudio=null;
function tts(text){if(!text)return;if(currentAudio){currentAudio.pause();currentAudio=null;}var url='https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q='+encodeURIComponent(text);currentAudio=new Audio(url);currentAudio.play().catch(function(){});}
function ttsCard(btn,text){if(!text)return;if(currentAudio){currentAudio.pause();currentAudio=null;}var url='https://translate.google.com/translate_tts?ie=UTF-8&tl=vi&client=tw-ob&q='+encodeURIComponent(text);currentAudio=new Audio(url);currentAudio.play().catch(function(){});var orig=btn.textContent;btn.textContent='⏸';currentAudio.onended=function(){btn.textContent=orig;};}
window._selText=null;
document.addEventListener('mouseup',function(e){var input=document.getElementById('sentence-input');var sel=window.getSelection();var text=sel.toString().trim();if(input.contains(e.target)&&text){window._selText={text:text,element:input};var toolbar=document.getElementById('float-toolbar');var rect=sel.getRangeAt(0).getBoundingClientRect();toolbar.style.left=Math.max(4,rect.left+rect.width/2-120)+'px';toolbar.style.top=(rect.top-42)+'px';toolbar.classList.add('show');}else{hideFloatToolbar();}});
document.addEventListener('mousedown',function(e){if(!document.getElementById('float-toolbar').contains(e.target))hideFloatToolbar();});
function hideFloatToolbar(){document.getElementById('float-toolbar').classList.remove('show');window._selText=null;}
document.addEventListener('click',function(){document.getElementById('context-menu').classList.remove('show');});
document.getElementById('sentence-input').addEventListener('contextmenu',function(e){var text=window.getSelection().toString().trim();if(!text)return;e.preventDefault();window._selText={text:text};var menu=document.getElementById('context-menu');menu.style.left=e.pageX+'px';menu.style.top=e.pageY+'px';menu.classList.add('show');});
window._vsl1Vocab=null;window._vsl2Vocab=null;
function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var params=new URLSearchParams(window.location.search);var tb=params.get('textbook');var un=params.get('unit');if(tb&&UNIT_MAP[tb]){document.getElementById('textbook-sel').value=tb;document.getElementById('textbook-sel').dispatchEvent(new Event('change'));if(un){var timer=setInterval(function(){var us=document.getElementById('unit-sel');if(us.querySelector('option[value="'+un+'"]')){us.value=un;us.dispatchEvent(new Event('change'));clearInterval(timer);}},100);}}}
</script>
<script src="vsl1-vocab.js" onerror="console.warn('vsl1-vocab.js not found')"></script>
<script src="vsl2-vocab.js" onerror="console.warn('vsl2-vocab.js not found')"></script>
<script>
if(typeof VSL1_VOCAB!=='undefined')window._vsl1Vocab=VSL1_VOCAB;
if(typeof VSL2_VOCAB!=='undefined')window._vsl2Vocab=VSL2_VOCAB;
</script>
