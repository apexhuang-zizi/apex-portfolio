<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课堂笔记与测试</title>
<style>
:root{--pri:#6366f1;--pri-d:#4338ca;--bg:#f8fafc;--sf:#fff;--bd:#e2e8f0;--tx:#1e293b;--tx-m:#64748b;--ok:#22c55e;--er:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:.5rem 1rem;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:.8rem}
.btn-back{background:none;border:1px solid rgba(255,255,255,.4);color:rgba(255,255,255,.9);border-radius:8px;padding:.3rem .7rem;cursor:pointer;font-size:.85rem;text-decoration:none}
.btn-back:hover{background:rgba(255,255,255,.15);color:#fff}
.hdr h1{font-size:1rem;font-weight:700}
.hdr-r{font-size:.82rem;opacity:.9}
.selector-bar{display:flex;align-items:center;gap:.7rem;padding:.45rem 1rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.sel-group{display:flex;align-items:center;gap:.4rem}
.sel-group label{font-size:.83rem;font-weight:600;white-space:nowrap}
.sel-sm{padding:.3rem .6rem;border:1.5px solid var(--bd);border-radius:6px;font-size:.83rem;background:var(--sf);color:var(--tx);cursor:pointer}
.sel-sm:focus{border-color:var(--pri);outline:none}
.btn-extract{background:var(--pri);color:#fff;border:none;border-radius:8px;padding:.32rem .85rem;cursor:pointer;font-size:.83rem;font-weight:600;transition:background .15s}
.btn-extract:hover{background:var(--pri-d)}
.btn-extract:disabled{background:#94a3b8;cursor:not-allowed}
.main-wrap{display:flex;flex:1;overflow:hidden}
.side-l{width:16%;min-width:140px;max-width:220px;background:var(--sf);border-right:2px solid #cbd5e1;display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 8px rgba(0,0,0,.06)}
.side-h{padding:.5rem .7rem;font-weight:700;font-size:.83rem;border-bottom:2px solid #cbd5e1;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);flex-shrink:0;border-radius:0}
.word-list{flex:1;overflow-y:auto;padding:.3rem}
.word-item{padding:.38rem .6rem;cursor:pointer;border-radius:6px;font-size:.82rem;transition:background .15s;display:flex;justify-content:space-between;align-items:center;gap:.2rem}
.word-item:hover{background:var(--bg)}
.word-item.show-zh{background:#ede9fe}
.word-vi{font-weight:500;flex:1}
.word-zh{font-size:.72rem;color:var(--tx-m);flex:1;display:none}
.word-item.show-zh .word-vi{display:none}
.word-item.show-zh .word-zh{display:block}
.tts-btn{background:none;border:none;cursor:pointer;font-size:.9rem;padding:0 .15rem;opacity:.55;flex-shrink:0}
.tts-btn:hover{opacity:1}
.center-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;border-left:2px solid #cbd5e1;border-right:2px solid #cbd5e1;box-shadow:inset 0 0 0 0}
.tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--bd);padding:0 .4rem;flex-shrink:0}
.tab{padding:.5rem .9rem;cursor:pointer;font-size:.87rem;font-weight:500;color:var(--tx-m);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--pri)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:700}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.test-area{display:none;flex:1;flex-direction:column;overflow:hidden}
.whiteboard{flex:1;overflow-y:auto;padding:.7rem;background:var(--bg)}
.wb-empty{text-align:center;color:var(--tx-m);padding:2rem;font-size:.87rem}
.sentence-card{background:var(--sf);border-radius:8px;padding:.65rem .9rem;margin-bottom:.45rem;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:.9rem;line-height:1.7}
.sentence-card .row-num{display:inline-block;min-width:1.4rem;font-weight:700;color:var(--pri);margin-right:.4rem}
.card-actions{display:flex;gap:.35rem;justify-content:flex-end;margin-top:.35rem}
.dlg-section-header{font-weight:700;color:var(--pri);font-size:.95rem;margin:1.2rem 0 .5rem;padding-bottom:.35rem;border-bottom:2px solid var(--pri)}
.sentence-btn{background:none;border:1px solid var(--bd);border-radius:6px;padding:.18rem .5rem;cursor:pointer;font-size:.77rem;color:var(--tx-m);transition:all .15s}
.sentence-btn:hover{background:var(--bg)}
.sentence-btn.readonly-btn{opacity:.4;cursor:default}
.input-area{flex-shrink:0;display:flex;flex-direction:column;padding:.55rem .8rem;background:var(--sf);border-top:1px solid var(--bd);transition:max-height .2s ease;max-height:200px;overflow:hidden}
.input-area.collapsed{max-height:36px;padding:.35rem .8rem}
.input-area.collapsed .input-main{display:none}
.input-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.25rem}
.input-header label{font-size:.8rem;color:var(--tx-m)}
.collapse-btn{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--tx-m);padding:0 .2rem}
.collapse-btn:hover{color:var(--pri)}
.input-main{display:flex;flex-direction:column;gap:.35rem}
.input-box{border:2px solid var(--bd);border-radius:8px;padding:.5rem .7rem;font-size:.9rem;min-height:68px;max-height:140px;overflow-y:auto;outline:none;line-height:1.6}
.input-box:focus{border-color:var(--pri);}
.input-box:empty:before{content:attr(data-placeholder);color:#94a3b8;pointer-events:none}
.input-actions{display:flex;justify-content:flex-end;gap:.4rem}
.btn-submit{background:var(--pri);color:#fff;border:none;border-radius:8px;padding:.38rem .9rem;cursor:pointer;font-size:.83rem;font-weight:600}
.btn-submit:hover{background:var(--pri-d)}
.btn-sm{background:none;border:1px solid var(--bd);border-radius:8px;padding:.38rem .7rem;cursor:pointer;font-size:.83rem;color:var(--tx-m)}
.btn-sm:hover{background:var(--bg)}
.side-r{width:18%;min-width:150px;max-width:260px;background:var(--sf);border-left:2px solid #cbd5e1;display:flex;flex-direction:column;overflow:hidden;box-shadow:-2px 0 8px rgba(0,0,0,.06)}
.side-r .side-h{display:flex;justify-content:space-between;align-items:center}
.extract-list{flex:1;overflow-y:auto;padding:.35rem;min-height:0}
.extract-section{flex:1;display:flex;flex-direction:column;min-height:0;margin-bottom:.2rem}
.extract-section-title{font-size:.75rem;font-weight:700;color:#64748b;padding:.25rem .5rem;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
.extract-item{padding:.35rem .55rem;border-radius:6px;font-size:.8rem;margin-bottom:.28rem}
.extract-item.word-type{background:#ede9fe;border-left:3px solid var(--pri)}
.extract-item.grammar-type{background:#fef9c3;border-left:3px solid #ca8a04}
.word-selected{background:rgba(99,102,241,.15);border-radius:2px;outline:2px solid #6366f1}
    .word-marked{font-weight:700;color:#2563eb;text-decoration:underline;text-decoration-color:#93c5fd}
    .extract-section .extract-item{padding:.32rem .55rem;font-size:.79rem;margin-bottom:.22rem}
    .extract-item .extract-word{font-weight:600;margin-bottom:.05rem}
    .extract-item .extract-zh{font-size:.7rem;color:#64748b;margin-top:.08rem;display:block}
    .note-type{background:#f0fdf4;border-left:3px solid #22c55e}

.extract-word{font-weight:600;margin-bottom:.1rem}
.extract-meta{font-size:.7rem;color:var(--tx-m)}
.side-r-footer{padding:.45rem;border-top:1px solid var(--bd);flex-shrink:0}
.btn-test{width:100%;background:var(--ok);color:#fff;border:none;border-radius:8px;padding:.45rem;cursor:pointer;font-size:.86rem;font-weight:700}
.btn-test:hover{background:#16a34a}

/* 右键菜单 */
.ctx-wrap{position:relative;display:inline}
.ctx-menu{display:none;position:fixed;background:var(--sf);border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:99999;min-width:150px;padding:.3rem 0}
.ctx-menu.show{display:block}
.ctx-item{padding:.4rem .8rem;cursor:pointer;font-size:.82rem;transition:background .1s;position:relative;user-select:none}
.ctx-item:hover{background:var(--bg)}
.ctx-sep{height:1px;background:var(--bd);margin:.2rem 0}
.ctx-item.has-sub::after{content:'\u25B6';position:absolute;right:.7rem;top:50%;transform:translateY(-50%);font-size:.6rem;color:var(--tx-m)}
.ctx-sub{display:none;position:absolute;left:100%;top:0;background:var(--sf);border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:150px;padding:.3rem 0;margin-left:2px}
.ctx-wrap:hover .ctx-sub,.ctx-item.has-sub:hover .ctx-sub{display:block}
.ctx-sub-item{padding:.38rem .75rem;cursor:pointer;font-size:.8rem;transition:background .1s}
.ctx-sub-item:hover{background:var(--bg)}

/* 富文本标记样式 */
.m-grammar{background:#bfdbfe;border-radius:2px;cursor:pointer}
.m-hard{color:#dc2626;font-weight:700;cursor:pointer}
.m-note{color:#7c3aed;text-decoration:underline dotted;cursor:pointer}
.m-relation{color:#0891b2;border-bottom:1px dashed #0891b2;cursor:pointer}

/* 白板 tooltip */
.wb-tooltip{position:fixed;background:#1e293b;color:#fff;border-radius:6px;padding:.35rem .6rem;font-size:.75rem;max-width:220px;z-index:9999;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3);line-height:1.5}
.btn-test-inline{background:var(--ok);color:#fff;border:none;border-radius:8px;padding:.38rem .9rem;cursor:pointer;font-size:.85rem;font-weight:700;white-space:nowrap;transition:background .15s}.btn-test-inline:hover{background:#16a34a}.btn-test-inline:disabled{background:#94a3b8;cursor:not-allowed}

/* ===== 测试试卷样式 ===== */
.test-container{flex:1;overflow-y:auto;padding:1.5rem 2rem;background:var(--bg)}
.test-container h2{font-size:1.3rem;color:var(--pri);margin-bottom:.8rem}
.test-meta{display:flex;gap:1.5rem;color:var(--tx-m);font-size:.83rem;margin-bottom:1.5rem;flex-wrap:wrap}
.test-section{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1.5rem;margin-bottom:1.2rem}
.test-sec-title{font-weight:700;font-size:1rem;color:var(--pri);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.test-sec-title .badge{font-size:.72rem;background:#eef2ff;color:var(--pri);padding:.15rem .55rem;border-radius:10px;font-weight:600}
.test-q{margin-bottom:.9rem;padding-left:.6rem;border-left:3px solid transparent;transition:border-color .15s}
.test-q:hover{border-left-color:var(--pri)}
.test-q-num{font-weight:700;color:var(--pri);font-size:.83rem;margin-right:.4rem}
.test-q-text{font-size:.9rem;color:var(--tx);margin-bottom:.3rem}
.test-q-hint{font-size:.78rem;color:var(--tx-m);margin-bottom:.3rem}
.test-input{border:1.5px solid var(--bd);border-radius:8px;padding:.42rem .65rem;font-size:.88rem;width:100%;max-width:360px;outline:none;transition:border-color .15s;font-family:inherit}
.test-input:focus{border-color:var(--pri)}
.test-textarea{border:1.5px solid var(--bd);border-radius:8px;padding:.5rem .7rem;font-size:.88rem;width:100%;min-height:90px;resize:vertical;outline:none;transition:border-color .15s;font-family:inherit;line-height:1.6}
.test-textarea:focus{border-color:var(--pri)}
.test-actions{display:flex;gap:.6rem;justify-content:center;padding:1.2rem 0 2rem;flex-wrap:wrap}
.btn-grade{background:var(--ok);color:#fff;border:none;border-radius:10px;padding:.55rem 1.5rem;cursor:pointer;font-size:.92rem;font-weight:700;transition:background .15s}
.btn-grade:hover{background:#16a34a}
.btn-grade:disabled{background:#94a3b8;cursor:not-allowed}
.btn-export{background:var(--pri);color:#fff;border:none;border-radius:10px;padding:.55rem 1.2rem;cursor:pointer;font-size:.9rem;font-weight:600}
.btn-export:hover{background:var(--pri-d)}
.btn-gen{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:10px;padding:.6rem 1.8rem;cursor:pointer;font-size:.95rem;font-weight:700;transition:opacity .15s;box-shadow:0 2px 12px rgba(245,158,11,.3)}
.btn-gen:hover{opacity:.9}
.btn-gen:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed}

/* Results */
.result-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:1.5rem;margin-top:1.2rem}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.result-score{font-size:2.5rem;font-weight:800}
.result-score.high{color:var(--ok)}
.result-score.mid{color:var(--amber)}
.result-score.low{color:var(--er)}
.result-detail{font-size:.87rem;color:var(--tx-m);line-height:1.7}
.result-detail strong{color:var(--tx)}
.result-weakness{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:.8rem 1rem;margin-top:.8rem;font-size:.83rem;color:#991b1b;line-height:1.6}

/* History */
.test-history-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.7rem;cursor:pointer;transition:box-shadow .15s}
.test-history-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.history-score{font-size:1.3rem;font-weight:800;display:inline-block;margin-right:.8rem}
.history-score.high{color:var(--ok)}.history-score.mid{color:var(--amber)}.history-score.low{color:var(--er)}
.history-meta{font-size:.78rem;color:var(--tx-m)}

/* Loading spinner */
.spinner{display:inline-block;width:1rem;height:1rem;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:.4rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.test-empty-state{text-align:center;padding:3rem 2rem}
.test-empty-state .icon{font-size:3rem;margin-bottom:.8rem}
.test-empty-state p{color:var(--tx-m);font-size:.9rem;margin-bottom:.3rem}


.test-input-inline{width:auto!important;min-width:80px;display:inline-block;vertical-align:middle;margin:0 4px;padding:2px 8px;font-size:inherit;border:none;border-bottom:2px dashed var(--accent, #4f46e5);border-radius:0;background:transparent;text-align:center}

.word-bank{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:var(--bg-alt,#f8fafc);border:1px dashed var(--accent,#6366f1);border-radius:10px;margin-bottom:1rem}
.word-bank-item{display:inline-block;padding:4px 12px;background:var(--bg,#fff);border:1px solid var(--border,#e2e8f0);border-radius:999px;font-size:.85rem;font-weight:600}
.test-q-word{display:inline-block;font-weight:700;color:var(--accent,#6366f1);font-size:1.05rem;margin-right:4px}
.test-q-zh{font-size:.8rem;color:var(--tx-m)}
</style>
</head>
<body>
<div class="hdr">
<div class="hdr-l"><a class="btn-back" href="index.html">← 返回首页</a><h1>📒 课堂笔记与测试</h1></div>
<div class="hdr-r" id="user-display">加载中...</div>
</div>
<div class="selector-bar">
<div class="sel-group"><label>课本:</label><select class="sel-sm" id="textbook-sel"><option value="">-- 课本 --</option><option value="VSL1">VSL1</option><option value="VSL2">VSL2</option></select></div>
<div class="sel-group"><label>单元:</label><select class="sel-sm" id="unit-sel" disabled><option value="">-- 先选课本 --</option></select></div>
<button class="btn-extract" id="btn-sync-extract" disabled onclick="syncExtract()">🔄 同步提取</button>
<div style="flex:1"></div>
<button class="btn-test-inline" id="btn-enter-test" disabled onclick="enterTest()">🎯 进入测试</button>
</div>
<div class="main-wrap">
<div class="side-l"><div class="side-h">📚 单词表</div><div class="word-list" id="word-list"><div class="wb-empty">选择课本和单元后<br>点击「提取单词」按钮</div></div></div>
<div class="center-panel">
<div class="tabs">
<div class="tab active" data-tab="notes" onclick="switchTab('notes')">📝 笔记</div>
<div class="tab" data-tab="exercises" onclick="switchTab('exercises')">✏️ 练习</div>
<div class="tab" data-tab="dialogue" onclick="switchTab('dialogue')">📖 课文</div>
<div class="tab" data-tab="test" onclick="switchTab('test')">📊 测试</div>
</div>
<div class="content-area" id="content-area"><div class="whiteboard" id="whiteboard"><div class="wb-empty">在下方输入框录入内容...</div></div>
<div class="input-area" id="input-area"><div class="input-header"><label id="input-label">✍️ 录入内容</label><button class="collapse-btn" id="collapse-btn" onclick="toggleInputCollapse()" title="隐藏/展开">▼</button></div><div class="input-main"><div class="input-box" id="sentence-input" contenteditable="true" data-placeholder="输入内容，选中文字后右键标记..."></div><div class="input-actions"><button class="btn-sm" onclick="clearInput()">🗑️ 清空</button><button class="btn-submit" onclick="submitSentence()">📤 提交</button></div></div></div>
</div>
<div class="test-area" id="test-area">
  <!-- 生成按钮 -->
  <div id="test-gen-area" style="text-align:center;padding:2.5rem">
    <p style="color:var(--tx-m);font-size:.95rem;margin-bottom:1rem">基于当前单元的学习内容，AI 自动生成测试试卷</p>
    <button class="btn-gen" id="btn-generate-test" onclick="generateTestPaper()">🤖 AI 生成试卷</button>
    <p style="font-size:.75rem;color:#94a3b8;margin-top:.8rem">需要 Gemini API Key · 使用前请确保已完成单词提取</p>
  </div>
  <!-- 试卷容器 -->
  <div id="test-paper-container" class="test-container" style="display:none"></div>
  <!-- 加载状态 -->
  <div id="test-loading" style="display:none;text-align:center;padding:3rem">
    <div class="spinner" style="width:2rem;height:2rem;border-color:rgba(99,102,241,.3);border-top-color:#6366f1"></div>
    <p style="color:var(--tx-m);margin-top:.8rem;font-size:.9rem" id="test-loading-msg">正在生成试卷...</p>
  </div>
  <!-- 空状态 -->
  <div id="test-empty" style="text-align:center;padding:3rem 2rem;display:block">
    <div style="font-size:3rem;margin-bottom:.8rem">📊</div>
    <p style="color:var(--tx-m);font-size:.9rem">还没有测试记录</p>
    <p style="color:#94a3b8;font-size:.8rem">点击上方按钮生成第一份测试</p>
  </div>
  <!-- 批改结果 -->
  <div id="test-grading-result" style="display:none;padding:1.5rem 2rem;overflow-y:auto"></div>
  <!-- 测试结果列表 -->
  <div id="test-results" style="display:none;padding:1.5rem 2rem;overflow-y:auto"></div>
  <!-- 历史记录 -->
  <div id="test-history" style="display:none;padding:1.5rem 2rem">
    <h3 style="font-size:1rem;color:var(--pri);margin-bottom:1rem">📋 测试历史</h3>
    <div id="test-history-list"></div>
  </div>
</div>
</div>
<div class="side-r">
  <div class="side-h">⭐ 重点提取</div>
  <div class="extract-section">
    <div class="extract-section-title">难点</div>
    <div class="extract-list" id="extract-hard">
      <div class="wb-empty" style="padding:.5rem;font-size:.78rem;color:#94a3b8">标记的难点词将在这里</div>
    </div>
  </div>
  <div class="extract-section">
    <div class="extract-section-title">注释</div>
    <div class="extract-list" id="extract-note">
      <div class="wb-empty" style="padding:.5rem;font-size:.78rem;color:#94a3b8">注释内容将在这里</div>
    </div>
  </div>
  <div class="extract-section">
    <div class="extract-section-title">语法</div>
    <div class="extract-list" id="extract-grammar">
      <div class="wb-empty" style="padding:.5rem;font-size:.78rem;color:#94a3b8">标记的语法点将在这里</div>
    </div>
  </div>
  <div class="side-r-footer" style="display:none"></div>
</div>
</div>

<!-- 右键菜单 -->
<div class="ctx-menu" id="ctx-menu">
<div class="ctx-item" onclick="ctxMark('grammar')">📝 语法</div>
<div class="ctx-item" onclick="ctxMark('hard')">⚠ 难点</div>
<div class="ctx-sep"></div>
<div class="ctx-item" onclick="ctxMark('note')">💬 注释</div>
</div>

<!-- 白板 tooltip 容器 -->
<div class="wb-tooltip" id="wb-tooltip" style="display:none"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
var firebaseConfig={apiKey:"AIzaSyCMPFTNEBWXA_EnkF7Yk__F1gdHYfPg8kM",authDomain:"vietnames-data.firebaseapp.com",projectId:"vietnames-data",storageBucket:"vietnames-data.firebasestorage.app",messagingSenderId:"1234567890",appId:"1:1234567890:web:abcdef1234567890"};
firebase.initializeApp(firebaseConfig);

// 获取固定用户标识（优先使用URL参数中的用户名，其次是本地存储的固定ID）

async function loadAllData(){if(!currentTextbook||!currentUnit)return;
  
  // 获取固定用户标识
  var fixedUserId = getFixedUserId();
  
  // 1. 先从本地存储恢复缓存
  var localKey = 'classroom_notes_records_' + currentTextbook + '_' + currentUnit;
  var localMarksKey = 'classroom_notes_marks_' + currentTextbook + '_' + currentUnit;
  var localRecords = [], localMarks = [];
  
  try {
    var savedRecs = localStorage.getItem(localKey);
    if(savedRecs) localRecords = JSON.parse(savedRecs);
  } catch(e) { console.warn('本地记录解析失败', e); }
  
  try {
    var savedMarks = localStorage.getItem(localMarksKey);
    if(savedMarks) localMarks = JSON.parse(savedMarks);
  } catch(e) { console.warn('本地标记解析失败', e); }
  
  // 2. 用本地数据先渲染，提高感知速度
  records = localRecords;
  marks = localMarks;
  renderWordList();
  renderWhiteboard();
  renderExtractList();
  
  // 3. 从 Firebase 增量同步（使用固定用户标识）
  try {
    // 获取云端记录
    var snap = await db.collection('cn_records')
      .where('textbook','==',currentTextbook)
      .where('unit','==',currentUnit)
      .get();
    
    var cloudRecords = [];
    snap.forEach(function(d){
      var item = {id: d.id};
      var data = d.data();
      for(var k in data) item[k] = data[k];
      cloudRecords.push(item);
    });
    
    // 合并：以云端为准，本地补充（本地可能有未同步的）
    var recordMap = {};
    localRecords.forEach(function(r) { if(r.id) recordMap[r.id] = r; });
    cloudRecords.forEach(function(r) { if(r.id) recordMap[r.id] = r; });
    records = Object.values(recordMap);
    
    // 获取云端标记
    var mSnap = await db.collection('cn_marks')
      .where('textbook','==',currentTextbook)
      .where('unit','==',currentUnit)
      .get();
    
    var cloudMarks = [];
    mSnap.forEach(function(d){
      var item = {id: d.id};
      var data = d.data();
      for(var k in data) item[k] = data[k];
      cloudMarks.push(item);
    });
    
    // 合并标记
    var markMap = {};
    localMarks.forEach(function(m) { if(m.id) markMap[m.id] = m; });
    cloudMarks.forEach(function(m) { if(m.id) markMap[m.id] = m; });
    marks = Object.values(markMap);
    
    // 4. 保存合并后的数据到本地存储
    localStorage.setItem(localKey, JSON.stringify(records));
    localStorage.setItem(localMarksKey, JSON.stringify(marks));
    
    // 5. 重新渲染
    renderWordList();
    renderWhiteboard();
    renderExtractList();
    
  } catch(e) {
    console.error('云端同步失败，使用本地数据:', e);
  }
}

// 同步提取：串联 提取单词 → 提取课文 → 提取记录
async function syncExtract(){
  if(!currentTextbook||!currentUnit){
    alert('请先选择课本和单元');
    return;
  }
  var btn = document.getElementById('btn-sync-extract');
  btn.disabled = true;
  btn.textContent = '⏳ 提取中...';
  try {
    // === 段落1：提取单词 ===
    await extractWords();
    // === 段落2：提取课文 ===
    await extractDialogueAsync();
    // === 段落3：提取记录 ===
    await extractRecords();
    btn.textContent = '✅ 提取完成';
    setTimeout(function(){ btn.textContent = '🔄 同步提取'; btn.disabled = false; }, 2000);
  } catch(e) {
    console.error('同步提取失败:', e);
    alert('同步提取失败: ' + (e.message || '未知错误'));
    btn.textContent = '🔄 同步提取';
    btn.disabled = false;
  }
}

async function extractWords(){if(!currentTextbook||!currentUnit)return;var vocab=currentTextbook==='VSL1'?window._vsl1Vocab:window._vsl2Vocab;if(!vocab){alert('Vocabulary not loaded. Please refresh.');return;}var unitNum=parseInt(currentUnit.replace('U',''));var unitWords=vocab.filter(function(w){return w[3]===unitNum||w[4]===unitNum;});if(!unitWords.length){alert('No words found for this unit');wordList=[];}else{wordList=unitWords.map(function(w){return{vi:w[0]||'',zh:w[1]||'',extracted:true};});}localStorage.setItem('classroom_notes_word_list', JSON.stringify(wordList));renderWordList();document.getElementById('btn-enter-test').disabled=!wordList.length;}// === 段落2：提取课文（Promise wrapper for IndexedDB） ===
function extractDialogueAsync(){
  return new Promise(function(resolve){
    if(!currentTextbook||!currentUnit){ resolve(); return; }
    var unitNum=parseInt(currentUnit.replace('U',''));
    try{
      var dbReq=indexedDB.open('vnDialoguesDB',1);
      dbReq.onsuccess=function(e){
        var db=e.target.result;
        if(!db.objectStoreNames.contains('dialogues')){
          alert('Dialogue DB not initialized');
          resolve();
          return;
        }
        var tx=db.transaction(['dialogues'],'readonly');
        var store=tx.objectStore('dialogues');
        var getReq=store.get('vnDialogues');
        getReq.onsuccess=function(ev){
          var result=ev.target.result;
          var dialogues=result&&result.data?result.data:result;
          if(!Array.isArray(dialogues)){
            alert('No dialogue data found');
            extractedDialogue=[];
          }else{
            extractedDialogue=dialogues.filter(function(d){
              if (!d.topic) return false;
              var tbPattern = currentTextbook.replace(/([A-Za-z]+)(\d+)/, '$1\\s*$2');
              var textbookRegex = new RegExp(tbPattern + '(?![0-9])', 'i');
              var matchTextbook = textbookRegex.test(d.topic);
              var unitRegex = new RegExp('(bài|bai)\\s*0*' + unitNum + '(?![0-9])', 'i');
              var matchUnit = unitRegex.test(d.topic);
              return matchTextbook && matchUnit;
            });
            localStorage.setItem('classroom_notes_extracted_dialogue', JSON.stringify(extractedDialogue));
            if(!extractedDialogue.length){
              alert('No content for this unit');
            } else {
              switchTab('dialogue');
            }
          }
          renderWhiteboard();
          resolve();
        };
        getReq.onerror=function(){
          alert('Failed to read dialogue');
          resolve();
        };
      };
      dbReq.onerror=function(){
        alert('Failed to open IndexedDB');
        resolve();
      };
    }catch(err){
      console.error(err);
      alert('Error: '+err.message);
      resolve();
    }
  });
}

// 原始 extractDialogue（保留供直接调用，内部逻辑同上）
async function extractDialogue(){
  if(!currentTextbook||!currentUnit)return;
  var unitNum=parseInt(currentUnit.replace('U',''));
  try{
    var dbReq=indexedDB.open('vnDialoguesDB',1);
    dbReq.onsuccess=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('dialogues')){
        alert('Dialogue DB not initialized');
        return;
      }
      var tx=db.transaction(['dialogues'],'readonly');
      var store=tx.objectStore('dialogues');
      var getReq=store.get('vnDialogues');
      getReq.onsuccess=function(ev){
        var result=ev.target.result;
        var dialogues=result&&result.data?result.data:result;
        if(!Array.isArray(dialogues)){
          alert('No dialogue data found');
          extractedDialogue=[];
        }else{
          extractedDialogue=dialogues.filter(function(d){
            if (!d.topic) return false;
            // Case-insensitive matching for textbook, allowing optional spaces (e.g. VSL1 and VSL 1)
            var tbPattern = currentTextbook.replace(/([A-Za-z]+)(\d+)/, '$1\\s*$2');
            var textbookRegex = new RegExp(tbPattern + '(?![0-9])', 'i');
            var matchTextbook = textbookRegex.test(d.topic);
            
            // Case-insensitive matching for unit, ensuring word boundary and digit exactness (e.g. U1 won't match U11)
            var unitRegex = new RegExp('(bài|bai)\\s*0*' + unitNum + '(?![0-9])', 'i');
            var matchUnit = unitRegex.test(d.topic);
            
            return matchTextbook && matchUnit;
          });
          localStorage.setItem('classroom_notes_extracted_dialogue', JSON.stringify(extractedDialogue));
          if(!extractedDialogue.length){
            alert('No content for this unit');
          } else {
            // Automatically switch to the dialogue tab to display the content
            switchTab('dialogue');
          }
        }
        renderWhiteboard();
      };
      getReq.onerror=function(){
        alert('Failed to read dialogue');
      };
    };
    dbReq.onerror=function(){
      alert('Failed to open dialogue DB');
    };
  }catch(e){
    console.error(e);
    alert('Extract dialogue failed');
  }
}

// 从云端提取历史记录
async function extractRecords(){
  if(!currentTextbook||!currentUnit){
    alert('请先选择课本和单元');
    return;
  }
  try{
    var fixedUserId = getFixedUserId();
    // 不用 userId 过滤（不同会话 UID 不统一），JS 端排序
    var snapshot = await db.collection('cn_records')
      .where('textbook', '==', currentTextbook)
      .where('unit', '==', currentUnit)
      .get();
    
    if(snapshot.empty){
      alert('该单元暂无历史记录');
      return;
    }
    
    var downloadedRecords = [];
    snapshot.forEach(function(doc){
      var data = doc.data();
      downloadedRecords.push({
        id: doc.id,
        userId: data.userId,
        textbook: data.textbook,
        unit: data.unit,
        tabType: data.tabType || 'notes',
        textVi: data.textVi || '',
        html: data.html || '',
        createdAt: data.createdAt ? data.createdAt.toDate().toISOString() : new Date().toISOString()
      });
    });
    
    // JS 端按时间倒序排列
    downloadedRecords.sort(function(a,b){ return b.createdAt.localeCompare(a.createdAt); });
    
    // 合并到本地记录（避免重复）
    var existingIds = {};
    records.forEach(function(r){ existingIds[r.id] = true; });
    
    var newRecords = downloadedRecords.filter(function(r){ return !existingIds[r.id]; });
    if(newRecords.length > 0){
      records = records.concat(newRecords);
      // 合并后也按时间排序
      records.sort(function(a,b){ return (a.createdAt||'').localeCompare(b.createdAt||''); });
      var localKey = 'classroom_notes_records_' + currentTextbook + '_' + currentUnit;
      localStorage.setItem(localKey, JSON.stringify(records));
      alert('成功下载 ' + newRecords.length + ' 条记录');
      renderWhiteboard();
    } else {
      alert('所有记录已同步，无新记录');
    }
  }catch(e){
    console.error('提取记录失败:', e);
    alert('提取记录失败: ' + (e.message || '未知错误'));
  }
}

function renderWordList(){var c=document.getElementById('word-list');if(!wordList.length){c.innerHTML='<div class="wb-empty">选择课本和单元后<br>点击「提取单词」按钮</div>';return;}c.innerHTML='';wordList.forEach(function(w,i){var d=document.createElement('div');d.className='word-item';var isMarked=marks.some(function(m){return m.word===w.vi&&(m.type==='hard'||m.type==='bg');});if(isMarked)d.classList.add('word-marked');d.innerHTML='<span class="word-vi">'+escHtml(w.vi)+'</span><span class="word-zh">'+escHtml(w.zh)+'</span><button class="tts-btn" onclick="event.stopPropagation();tts(\''+w.vi.replace(/'/g,'\\\'')+'\')">🔊</button>';d.onclick=function(){d.classList.toggle('show-zh');};c.appendChild(d);});}

    var inp = document.getElementById('sentence-input');

    if(inp && inp.contains(range.commonAncestorContainer)){

      }

// 共享鼠标事件处理函数（笔记录入框 + 编辑框）

// 共享 mouseup 处理：保存选区
function handleMouseUp(e, inputElement) {
  var sel = window.getSelection();
  if(!sel.isCollapsed && sel.rangeCount){
    var range = sel.getRangeAt(0);
    if(inputElement.contains(range.commonAncestorContainer)){
      window._selRange = range.cloneRange();
    }
  }
}

// 共享 contextmenu 处理：显示右键菜单
function handleContextMenu(e, inputElement) {
  e.preventDefault();
  var sel = window.getSelection();
  if(sel.isCollapsed || !sel.rangeCount) return;
  var range = sel.getRangeAt(0);
  if(!inputElement.contains(range.commonAncestorContainer)) return;
  window._selRange = range.cloneRange();
  var menu = document.getElementById('ctx-menu');
  var x = e.clientX, y = e.clientY;
  var menuW = menu.offsetWidth || 160, menuH = menu.offsetHeight || 200;
  menu.style.left = Math.max(8, Math.min(x, window.innerWidth - menuW - 12)) + 'px';
  menu.style.top = Math.max(8, Math.min(y, window.innerHeight - menuH - 12)) + 'px';
  menu.classList.add('show');
}

// 全局 Ctrl 键状态跟踪（selectionchange 事件不携带 ctrlKey）
document.addEventListener('keydown', function(e) { if(e.key === 'Control') window._ctrlPressed = true; });
document.addEventListener('keyup', function(e) { if(e.key === 'Control') window._ctrlPressed = false; });

// 共享 selectionchange 处理：Ctrl 多选
function handleSelectionChange(e, inputElement) {
  var sel = window.getSelection();
  if(!sel.isCollapsed && sel.rangeCount){
    var range = sel.getRangeAt(0);
    if(inputElement.contains(range.commonAncestorContainer)){
      window._selRange = range.cloneRange();
      // Ctrl 多选：追加到 selectedWords（使用全局跟踪，因为 selectionchange 不携带 ctrlKey）
      if(window._ctrlPressed){
        var w = range.toString().trim();
        if(w && selectedWords.indexOf(w) === -1){ selectedWords.push(w); }
      }
    }
  }
}

// ctxMark：根据类型弹出输入框或直接标记，然后写入 DOM + 数据库
async function ctxMark(type){
  document.getElementById('ctx-menu').classList.remove('show');
  
  // 批量标记模式：如果 selectedWords 有内容
  if(selectedWords.length>0){
    var wordsToMark=selectedWords.slice();
    selectedWords=[];
    for(var wi=0;wi<wordsToMark.length;wi++){
      var w=wordsToMark[wi].trim();
      if(!w)continue;
      await ctxMarkSingle(w,type);
    }
    renderExtractList();
    renderWordList();
    return;
  }
  
  // 单次标记模式
  var range=window._selRange;
  if(!range)return;
  var word=range.toString().trim();
  if(!word)return;
  await ctxMarkSingle(word,type);
  window._selRange=null;
  renderExtractList();
  renderWordList();
}

async function ctxMarkSingle(word,type){
  var extra=null;
  if(type==='note'){
    extra=prompt('请输入注释内容:');
    if(extra===null)return;
  }else if(type==='antonym'){
    extra=prompt('请输入反义词:');
    if(extra===null)return;
  }else if(type==='synonym'){
    extra=prompt('请输入同义词:');
    if(extra===null)return;
  }
  
  // 写入富文本 DOM（如果 _selRange 存在）
  if(window._selRange){
    wrapSelection(window._selRange,type,extra);
  }
  
  // 先保存到本地存储
  var fixedUserId=getFixedUserId();
  var newMark={
    id:'local_mark_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),
    userId:fixedUserId,
    textbook:currentTextbook||'',
    unit:currentUnit||'',
    tabType:currentTab,
    word:word,
    type:type,
    extra:extra||null
  };
  // 去重
  var dup=marks.some(function(m){return m.word===word&&m.type===type;});
  if(!dup){marks.push(newMark);}
  
  var localMarksKey='classroom_notes_marks_'+(currentTextbook||'unknown')+'_'+(currentUnit||'unknown');
  localStorage.setItem(localMarksKey,JSON.stringify(marks));
  
  // 存入数据库
  if(currentTextbook&&currentUnit){
    try{
      var doc=await db.collection('cn_marks').add({
        userId:fixedUserId,
        textbook:currentTextbook,
        unit:currentUnit,
        tabType:currentTab,
        word:word,
        type:type,
        extra:extra||null,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      newMark.id=doc.id;
      localStorage.setItem(localMarksKey,JSON.stringify(marks));
    }catch(e){
      console.error('保存标记失败:',e);
    }
  }
}

// wrapSelection：用 <span> 包裹当前选区并恢复光标
function wrapSelection(range,type,extra){
  var sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  var cls='m-'+type;
  if(type==='note'||type==='relation'){
    // 注释/关联：纯文本标记，外层 span 存数据属性
    var sp=document.createElement('span');
    sp.className=cls;
    sp.dataset.extra=(extra||'');
    try{range.surroundContents(sp);}catch(e){console.warn('surroundContents failed:',e);}
  }else{
    // 语法/难点：样式标记
    var sp=document.createElement('span');
    sp.className=cls;
    sp.dataset.extra=(extra||'');
    try{range.surroundContents(sp);}catch(e){console.warn('surroundContents failed:',e);}
  }
  // 选中新 span，保持词后位置，方便继续分段选择
  sel.removeAllRanges();
  var newRange=document.createRange();
  newRange.selectNodeContents(sp);
  newRange.collapse(false);
  sel.addRange(newRange);
}

async function submitSentence(){
  if(currentTab==='dialogue')return;
  var editor=document.getElementById('sentence-input');
  var html=editor.innerHTML.trim();
  // 取纯文本供统计
  var text=editor.innerText.trim();
  // 自动附中文翻译（已知词在句中出现时附翻译标题）
  if(wordList&&wordList.length){
    var done={};
    wordList.forEach(function(w){
      if(!w.vi||done[w.vi])return;
      var ve=w.vi.replace(/[.*+?^\x24{}()|[\]\\]/g,function(m){return'\\'+m;});
      var re=new RegExp(ve,'gi');
      if(re.test(text)){
        done[w.vi]=true;
        var zh=w.zh||'';
        html=html.replace(re,zh?function(m){return'<span class="auto-zh" title="'+zh+'">'+m+'</span>';}:function(m){return'<span class="auto-zh">'+m+'</span>';});
      }
    });
  }
  if(!text){alert('\u8BF7\u8F93\u5165\u5185\u5BB9');return;}
  
  var fixedUserId = getFixedUserId();
  var newRecord = {
    id: 'local_' + Date.now(),
    userId: fixedUserId,
    textbook: currentTextbook || '',
    unit: currentUnit || '',
    tabType: currentTab,
    textVi: text,
    html: html
  };
  
  // 先保存到本地存储（确保数据不丢失）
  records.push(newRecord);
  var localKey = 'classroom_notes_records_' + (currentTextbook || 'unknown') + '_' + (currentUnit || 'unknown');
  localStorage.setItem(localKey, JSON.stringify(records));
  
  if(!currentTextbook||!currentUnit){alert('\u8BF7\u5148\u9009\u62E9\u8BFE\u672C\u548C\u5355\u5143');return;}
  try{
    var doc=await db.collection('cn_records').add({
      userId:fixedUserId,
      textbook:currentTextbook,
      unit:currentUnit,
      tabType:currentTab,
      textVi:text,
      html:html,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    // 更新本地记录的ID为云端ID
    newRecord.id = doc.id;
    localStorage.setItem(localKey, JSON.stringify(records));
    
    editor.innerHTML='';
    localStorage.removeItem('classroom_notes_draft');
    renderWhiteboard();
  }catch(e){
    console.error('\u4FDD\u5B58\u5931\u8D25:',e);
    alert('\u4FDD\u5B58\u5931\u8D25\uFF0C\u5185\u5BB9\u5DF2\u4FDD\u5B58\u5728\u672C\u5730');
    editor.innerHTML='';
    localStorage.removeItem('classroom_notes_draft');
    renderWhiteboard();
  }
}

function renderWhiteboard(){

  if(currentTab==='dialogue'){renderDialogueTab(wb);return;}
  var tabRecs=records.filter(function(r){return r.tabType===currentTab;});
  if(!tabRecs.length){wb.innerHTML='<div class="wb-empty">\u6682\u65E0\u5185\u5BB9\uFF0C\u5728\u4E0B\u65B9\u5F55\u5165...</div>';return;}
  wb.innerHTML='';
  tabRecs.forEach(function(rec,idx){
    var card=document.createElement('div');
    card.className='sentence-card';
    card.innerHTML='<span class="row-num">'+(idx+1)+'.</span>'+(rec.html||escHtml(rec.textVi||''))+
      '<div class="card-actions"><button class="sentence-btn" onclick="ttsCard(this,\''+(rec.textVi||'').replace(/'/g,"\\'")+'\')">\uD83D\uDD0A</button><button class="sentence-btn" onclick="editRecord(\''+rec.id+'\')">\u270F\uFE0F</button><button class="sentence-btn" onclick="delRecord(\''+rec.id+'\')">\uD83D\uDDD1</button></div>';
    wb.appendChild(card);
  });
  // 绑定白板 tooltip 事件
  bindWhiteboardTooltips();
}

function renderDialogueTab(wb){
  if(!extractedDialogue.length){wb.innerHTML='<div class="wb-empty">\u70B9\u51FB\u4E0A\u65B9\u300C\u63D0\u53D6\u8BFE\u6587\u300D\u6309\u94AE<br>\u67E5\u770B\u8BE5\u5355\u5143\u7684\u5BF9\u8BDD\u5185\u5BB9</div>';return;}
  wb.innerHTML='';
  var globalIdx=0;
  
  extractedDialogue.forEach(function(dlg, dlgIdx){
    // If there are multiple dialogues, put an empty line/spacer between dialogues
    if (extractedDialogue.length > 1) {
      var dlgHeader = document.createElement('div');
      dlgHeader.className = 'dlg-section-header';
      dlgHeader.textContent = '📖 Đoạn ' + (dlgIdx + 1);
      wb.appendChild(dlgHeader);
    }

    var text = dlg.content || dlg.textVi || dlg.text || '';
    var lines = text.split('\n');
    var processedLines = [];
    
    lines.forEach(function(line){
      var tLine = line.trim();
      if (tLine === '') {
        processedLines.push('');
        return;
      }
      
      // 去除括号（英文或中文括号）内的中文翻译
      var cleanLine = tLine.replace(/\s*[\(（][^\)）]*[\u4e00-\u9fff]+[^\)）]*[\)）]/g, '').trim();
      
      // 如果去掉括号后，仍然包含中文字符，说明是一行纯中文翻译，跳过
      if (/[\u4e00-\u9fff]/.test(cleanLine)) {
        return;
      }
      
      // 此时剩下的一定是越南文行
      processedLines.push(cleanLine);
    });

    // 过滤连续的空行，只保留单个空行
    var finalLines = [];
    processedLines.forEach(function(line) {
      if (line === '') {
        if (finalLines.length > 0 && finalLines[finalLines.length - 1] !== '') {
          finalLines.push('');
        }
      } else {
        finalLines.push(line);
      }
    });
    // 去除末尾空行
    if (finalLines.length > 0 && finalLines[finalLines.length - 1] === '') {
      finalLines.pop();
    }

    // 渲染每一行
    finalLines.forEach(function(line){
      if(line === '' && globalIdx > 0){
        var spacer = document.createElement('div');
        spacer.style.height = '.8rem';
        wb.appendChild(spacer);
        return;
      }
      globalIdx++;
      var card = document.createElement('div');
      card.className = 'sentence-card';
      card.innerHTML = '<span class="row-num">' + globalIdx + '.</span><span class="dlg-text">' + escHtml(line) + '</span>' +
        '<div class="card-actions"><button class="sentence-btn" onclick="ttsCard(this,\'' + line.replace(/'/g, "\\'") + '\')">\uD83D\uDD0A</button><button class="sentence-btn" onclick="editDialogueLine(this)">\u270F\uFE0F</button></div>';
      wb.appendChild(card);
    });
  });
}

function bindWhiteboardTooltips(){
  var tooltip=document.getElementById('wb-tooltip');
  var hideTimer=null;
  // 鼠标移入：显示 tooltip
  document.getElementById('whiteboard').addEventListener('mouseover',function(e){
    var el=e.target;
    if(!el.classList.contains('m-note')&&!el.classList.contains('m-relation'))return;
    clearTimeout(hideTimer);
    var extra=el.dataset.extra||'';
    var label=el.classList.contains('m-note')?'\u6CE8\u91CA':'\u5173\u8054\u8BCD';
    tooltip.innerHTML='<div class="tt-label">'+label+'</div><div>'+escHtml(extra)+'</div>';
    var rect=el.getBoundingClientRect();
    var tx=rect.left,ty=rect.bottom+6;
    if(tx+220>window.innerWidth)tx=window.innerWidth-230;
    if(ty+80>window.innerHeight)ty=rect.top-80;
    tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';tooltip.style.display='block';
  });
  // 鼠标移出：延迟隐藏
  document.getElementById('whiteboard').addEventListener('mouseout',function(e){
    var el=e.target;
    if(!el.classList.contains('m-note')&&!el.classList.contains('m-relation'))return;
    hideTimer=setTimeout(function(){tooltip.style.display='none';},200);
  });
}

async function editRecord(id){
  var rec=records.find(function(r){return r.id===id;});
  if(!rec)return;
  // 弹出编辑框，加载内容到临时编辑器
  var overlay=document.createElement('div');
  overlay.id='edit-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:5000;display:flex;align-items:center;justify-content:center;padding:1rem';
  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:12px;padding:1.2rem;width:100%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;gap:.6rem;box-shadow:0 8px 32px rgba(0,0,0,.2)';
  box.innerHTML='<div style="font-weight:700;font-size:.95rem">\u7F16\u8F91\u5185\u5BB9</div>'+
    '<div id="edit-editor" contenteditable="true" style="border:2px solid #e2e8f0;border-radius:8px;padding:.5rem .7rem;min-height:120px;max-height:400px;overflow-y:auto;font-size:.9rem;line-height:1.6;outline:none" onfocus="this.style.borderColor=\'#6366f1\'" onblur="this.style.borderColor=\'#e2e8f0\'">'+rec.html+'</div>'+
    '<div style="display:flex;gap:.5rem;justify-content:flex-end"><button onclick="document.getElementById(\'edit-overlay\').remove()" style="background:none;border:1px solid #e2e8f0;border-radius:8px;padding:.35rem .7rem;cursor:pointer;font-size:.83rem">\u53D6\u6D88</button><button id="edit-save-btn" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:.35rem .8rem;cursor:pointer;font-size:.83rem;font-weight:600">\u4FDD\u5B58</button></div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  document.getElementById('edit-editor').focus();
  // 让编辑弹窗内的 contenteditable 也支持右键标记
  var editEd=document.getElementById('edit-editor');
  editEd.addEventListener('mouseup',function(e){
    var sel=window.getSelection();
    if(!sel.isCollapsed&&sel.rangeCount){
      var range=sel.getRangeAt(0);
      if(editEd.contains(range.commonAncestorContainer)){
        window._selRange=range.cloneRange();
      }
    }
  });
  // 编辑框的 selectionchange 已在 document 级别统一处理
  
  editEd.addEventListener('contextmenu',function(e){
    e.preventDefault();
    var sel=window.getSelection();
    if(sel.isCollapsed||!sel.rangeCount)return;
    var range=sel.getRangeAt(0);
    if(!editEd.contains(range.commonAncestorContainer))return;
    window._selRange=range.cloneRange();
    var menu=document.getElementById('ctx-menu');
    var x=e.clientX,y=e.clientY;
    var menuW=menu.offsetWidth||160,menuH=menu.offsetHeight||200;
    menu.style.left=Math.max(8,Math.min(x,window.innerWidth-menuW-12))+'px';
    menu.style.top=Math.max(8,Math.min(y,window.innerHeight-menuH-12))+'px';
    menu.classList.add('show');
  });
  document.getElementById('edit-save-btn').onclick=async function(){
    var newHtml=document.getElementById('edit-editor').innerHTML;
    var newText=document.getElementById('edit-editor').innerText.trim();
    if(!newText){alert('\u5185\u5BB9\u4E0D\u80FD\u4E3A\u7A7A');return;}
    
    // 先更新本地数据
    rec.textVi=newText;rec.html=newHtml;
    var localKey = 'classroom_notes_records_' + (currentTextbook || 'unknown') + '_' + (currentUnit || 'unknown');
    localStorage.setItem(localKey, JSON.stringify(records));
    overlay.remove();
    renderWhiteboard();
    
    try{
      await db.collection('cn_records').doc(id).update({textVi:newText,html:newHtml,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){
      console.error(e);
      alert('\u4FEE\u6539\u5DF2\u4FDD\u5B58\u5728\u672C\u5730\uFF0C\u4E91\u7AEF\u540C\u6B65\u5931\u8D25');
    }
  };
}

async function delRecord(id){if(!confirm('\u786E\u8BA4\u5220\u9664\uFF1F'))return;

  records=records.filter(function(r){return r.id!==id;});

// ===== 课文行编辑 =====

function editDialogueLine(btn){
  var card = btn.closest('.sentence-card');
  var textSpan = card.querySelector('.dlg-text');
  if(!textSpan) return;
  
  // 如果已经在编辑中，保存
  var editor = card.querySelector('.dlg-editor');
  if(editor){
    saveDialogueLine(card, editor);
    return;
  }
  
  // 进入编辑模式
  var originalText = textSpan.textContent;
  textSpan.style.display = 'none';
  
  var editorDiv = document.createElement('div');
  editorDiv.className = 'dlg-editor';
  editorDiv.contentEditable = true;
  editorDiv.style.cssText = 'border:2px solid #6366f1;border-radius:6px;padding:.3rem .5rem;font-size:.9rem;line-height:1.6;outline:none;min-height:1.5rem;background:#fff;';
  editorDiv.textContent = originalText;
  
  // 插入编辑框
  textSpan.parentNode.insertBefore(editorDiv, textSpan.nextSibling);
  editorDiv.focus();
  
  // 添加右键菜单支持（与笔记页面相同）
  editorDiv.addEventListener('mouseup', function(e) {
    handleMouseUp(e, this);
  });
  
  editorDiv.addEventListener('contextmenu', function(e) {
    handleContextMenu(e, this);
  });
  
  // 更改按钮为保存图标
  btn.textContent = '\u2705';
  btn.onclick = function() { saveDialogueLine(card, editorDiv); };
  
  // 点击外部保存
  function outsideClick(e){
    if(!card.contains(e.target)){
      saveDialogueLine(card, editorDiv);
      document.removeEventListener('click', outsideClick);
    }
  }
  setTimeout(function(){
    document.addEventListener('click', outsideClick);
  }, 100);
}

function saveDialogueLine(card, editor){
  var newText = editor.innerText.trim();
  if(!newText){
    alert('\u5185\u5BB9\u4E0D\u80FD\u4E3A\u7A7A');
    return;
  }
  
  var textSpan = card.querySelector('.dlg-text');
  textSpan.textContent = newText;
  textSpan.style.display = '';
  editor.remove();
  
  // 恢复编辑按钮
  var editBtn = card.querySelector('.sentence-btn[onclick^="editDialogueLine"]');
  if(editBtn){
    editBtn.textContent = '\u270F\uFE0F';
    editBtn.onclick = function() { editDialogueLine(this); };
  }
  
  // 更新 extractedDialogue 数据
  var rowNum = card.querySelector('.row-num');
  if(rowNum){
    var idx = parseInt(rowNum.textContent) - 1;
    // 找到对应的 dialogue 和行索引
    var currentIdx = 0;
    for(var i = 0; i < extractedDialogue.length; i++){
      var lines = (extractedDialogue[i].content || extractedDialogue[i].textVi || extractedDialogue[i].text || '').split('\n');
      for(var j = 0; j < lines.length; j++){
        if(currentIdx === idx){
          lines[j] = newText;
          var dlg = extractedDialogue[i];
          dlg.content = lines.join('\n');
          dlg.textVi = dlg.content;
          dlg.text = dlg.content;
          // 保存到本地存储
          localStorage.setItem('classroom_notes_extracted_dialogue', JSON.stringify(extractedDialogue));
          return;
        }
        if(lines[j].trim()) currentIdx++;
      }
    }
  }
}

function renderExtractList(){
  var cHard=document.getElementById('extract-hard');
  var cNote=document.getElementById('extract-note');
  var cGrammar=document.getElementById('extract-grammar');
  var hMarks=marks.filter(function(m){return m.type==='hard'||m.type==='bg';});
  var nMarks=marks.filter(function(m){return m.type==='note';});
  var gMarks=marks.filter(function(m){return m.type==='grammar';});
  
  // 难点词：只显示不在 wordList 中的词
  var seenHard={};
  if(cHard)cHard.innerHTML='';
  hMarks.forEach(function(m){
    if(seenHard[m.word])return;
    seenHard[m.word]=true;
    // 检查是否在单词表中
    var inWordList=false;
    var zhHint='';
    if(wordList&&wordList.length){
      for(var wi=0;wi<wordList.length;wi++){
        if(wordList[wi].vi===m.word){
          inWordList=true;
          zhHint=wordList[wi].zh||'';
          break;
        }
      }
    }
    // 只在不在单词表中时显示到难点栏
    if(!inWordList&&cHard){
      var d=document.createElement('div');
      d.className='extract-item word-type';
      d.innerHTML='<div class="extract-word" style="display:flex;justify-content:space-between;align-items:center;gap:.5rem">'+
        '<span style="font-weight:600">'+escHtml(m.word)+'</span>'+
        '<span class="extract-zh" style="color:#64748b;font-size:.72rem;white-space:nowrap"></span>'+
        '<div class="extract-meta" style="display:none">难点</div></div>';
      cHard.appendChild(d);
      
      // 异步翻译
      (async function(dEl, word) {
        var zh = await translateWord(word);
        if (zh) {
          var zhEl = dEl.querySelector('.extract-zh');
          if (zhEl) zhEl.textContent = ' ' + zh;
        }
      })(d, m.word);
    }
  });
  if(cHard&&!cHard.children.length){
    cHard.innerHTML='<div class="wb-empty" style="padding:.5rem;font-size:.78rem;color:#94a3b8">标记的难点词将在这里</div>';
  }
  
  // 注释：显示所有 note 类型标记
  var seenNote={};
  if(cNote)cNote.innerHTML='';
  nMarks.forEach(function(m){
    if(seenNote[m.word])return;
    seenNote[m.word]=true;
    if(cNote){
      var d=document.createElement('div');
      d.className='extract-item note-type';
      d.innerHTML='<div class="extract-word">'+escHtml(m.word)+'</div>'+
        '<div class="extract-meta">'+(m.extra||'无注释')+'</div>'+
        '<div class="extract-meta" style="display:none">注释</div>';
      cNote.appendChild(d);
    }
  });
  if(cNote&&!cNote.children.length){
    cNote.innerHTML='<div class="wb-empty" style="padding:.5rem;font-size:.78rem;color:#94a3b8">注释内容将在这里</div>';
  }
  
  // 语法点
  var seenGrammar={};
  if(cGrammar)cGrammar.innerHTML='';
  gMarks.forEach(function(m){
    if(seenGrammar[m.word])return;
    seenGrammar[m.word]=true;
    if(cGrammar){
      var d=document.createElement('div');
      d.className='extract-item grammar-type';
      d.innerHTML='<div class="extract-word">'+escHtml(m.word)+'</div>'+
        (m.extra?'<div class="extract-meta">'+escHtml(m.extra)+'</div>':'')+
        '<div class="extract-meta" style="display:none">语法</div>';
      cGrammar.appendChild(d);
    }
  });
  if(cGrammar&&!cGrammar.children.length){
    cGrammar.innerHTML='<div class="wb-empty" style="padding:.5rem;font-size:.78rem;color:#94a3b8">标记的语法点将在这里</div>';
  }
}

<script>
// ============================================
// AI 测试试卷系统 (Gemini API)
// ============================================
var currentTestPaper = null;
var GEMINI_MODEL = 'gemini-2.5-flash';

function getApiKey() {
  var key = localStorage.getItem('gemini_api_key');
  if (!key) {
    key = prompt('请输入你的 Gemini API Key（仅需一次，将保存在浏览器中）：');
    if (key) localStorage.setItem('gemini_api_key', key);
  }
  return key;
}

// 生成试卷
// 修复 JSON 字符串内未转义换行（Gemini/LLM 常犯错误）
function repairJSONString(s) {
  var inString = false, esc = false, out = '';
  for (var i = 0; i < s.length; i++) {
    var ch = s[i];
    if (esc) { esc = false; out += ch; continue; }
    if (ch === '\\') { esc = true; out += ch; continue; }
    if (ch === '"') { inString = !inString; out += ch; continue; }
    if (inString && ch === '\n') { out += '\\n'; continue; }
    if (inString && ch === '\r') { out += '\\r'; continue; }
    out += ch;
  }
  return out;
}

async function generateTestPaper() {
  if (!wordList || !wordList.length) {
    alert('请先提取单词（点击「同步提取」按钮）');
    return;
  }
  var geminiKey = getApiKey();
  if (!geminiKey) return;

  var btn = document.getElementById('btn-generate-test');
  var genArea = document.getElementById('test-gen-area');
  var loading = document.getElementById('test-loading');
  var loadingMsg = document.getElementById('test-loading-msg');

  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  loading.style.display = 'block';
  genArea.style.display = 'none';
  var container = document.getElementById('test-paper-container');
  container.style.display = 'none';
  document.getElementById('test-history').style.display = 'none';

  try {
    loadingMsg.textContent = '正在收集学习数据...';

    // 1. 收集词汇（打乱，取20个不重复的词）
    var shuffled = wordList.slice().sort(function(){return Math.random()-0.5;});
    var wordsForType1 = shuffled.slice(0, 10);
    var wordsForType2 = shuffled.slice(10, 20);
    if (wordsForType2.length < 10) {
      // 不足20个单词，Type2 复用但确保不重复
      var remaining = shuffled.filter(function(w){return wordsForType1.indexOf(w)===-1;});
      wordsForType2 = remaining.slice(0, Math.min(10, remaining.length));
    }

    // 2. 收集例句（从用户录入的笔记中取 notes 类型的 textVi）
    var userSentences = [];
    records.forEach(function(r){
      if (r.tabType === 'notes' && r.textVi) {
        userSentences.push(r.textVi);
      }
    });
    // 如果笔记不够，从 extractedDialogue 补充
    if (userSentences.length < 3 && extractedDialogue && extractedDialogue.length) {
      extractedDialogue.forEach(function(dlg){
        var text = dlg.content || dlg.textVi || dlg.text || '';
        var lines = text.split('\n').filter(function(l){return l.trim().length > 5;});
        lines.forEach(function(l){userSentences.push(l.trim());});
      });
    }

    // 3. 收集语法点
    var grammarPoints = [];
    marks.forEach(function(m){
      if (m.type === 'grammar' && grammarPoints.indexOf(m.word) === -1) {
        grammarPoints.push({word: m.word, extra: m.extra || ''});
      }
    });
    if (!grammarPoints.length) {
      // 没有用户标记的语法点，从词库中找有语法意义的词
      grammarPoints.push({word: 'cần phải', extra: 'Cấu trúc: cần phải + động từ (必须做某事)'});
      grammarPoints.push({word: 'hình như', extra: 'Cấu trúc: hình như + mệnh đề (好像…)'});
    }

    // 4. 构建 Gemini prompt
    var vocabList1 = wordsForType1.map(function(w){return w.vi + ' (' + w.zh + ')';}).join(', ');
    var vocabList2 = wordsForType2.map(function(w){return w.vi + ' (' + w.zh + ')';}).join(', ');
    var allVocab = wordList.map(function(w){return w.vi + ' (' + w.zh + ')';}).join(', ');
    var sentencesStr = userSentences.slice(0, 8).join(' | ');
    var grammarStr = grammarPoints.map(function(g){return g.word + (g.extra ? ' (' + g.extra + ')' : '');}).join(', ');

    loadingMsg.textContent = '正在调用 AI 生成试卷...';

    var prompt = `Bạn là giáo viên tiếng Việt. Hãy tạo một bài kiểm tra dựa trên dữ liệu học tập sau:

TỪ VỰNG TOÀN BỘ UNIT: ${allVocab}

TỪ CHO PHẦN 1 (điền từ - ngân hàng từ): ${vocabList1}
TỪ CHO PHẦN 2 (đặt câu với từ cho sẵn): ${vocabList2}

CÂU VÍ DỤ CỦA HỌC VIÊN: ${sentencesStr}

ĐIỂM NGỮ PHÁP: ${grammarStr}

Hãy tạo bài kiểm tra gồm 5 phần, định dạng JSON như sau:
{
  "title": "Bài Kiểm Tra - [tên unit]",
  "unit": "${currentUnit || ''}",
  "textbook": "${currentTextbook || ''}",
  "fillBlanks": {
    "words": ["từ1", "từ2", ..., "từ10"],  // 10 từ tiếng Việt làm "ngân hàng từ" cho học viên chọn
    "questions": [
      {"sentence": "Câu tiếng Việt có chỗ trống ___", "blankWord": "từ đúng (trong words)", "hint": "gợi ý tiếng Trung"}
    ]
  }, // 10 câu × 2đ = 20đ. Mỗi câu dùng MỘT từ trong vocabList1. 10 từ trong "words" là danh sách từ để học viên chọn.
  "makeSentence": [
    {"word": "từ tiếng Việt", "zh": "nghĩa tiếng Trung", "hint": "gợi ý đặt câu"}
  ], // 10 câu × 2đ = 20đ. Học viên dùng từ cho sẵn để đặt câu. Dùng từ TRONG vocabList2, KHÔNG trùng với fillBlanks.
  "sentenceTranslate": [
    {"zh": "câu tiếng Trung hoàn chỉnh", "answerVi": "câu tiếng Việt tham khảo"}
  ], // 5 câu × 6đ = 30đ, chủ đề liên quan đến unit này
  "grammarSentences": [
    {"task": "yêu cầu đặt câu", "grammar": "điểm ngữ pháp cần dùng", "hint": "gợi ý chủ đề"}
  ], // 2 câu × 5đ = 10đ, dùng điểm ngữ pháp từ grammarStr
  "essay": {
    "topic": "đề bài viết đoạn văn (tiếng Việt)",
    "requirements": "yêu cầu cụ thể: trên 100 từ, dùng ít nhất 5 từ trong unit",
    "points": 20
  }
}

Yêu cầu:
- Phần 1 (fillBlanks): 10 câu, mỗi câu có MỘT chỗ trống ___ cần điền từ. 10 từ trong "words" được liệt kê ở đầu làm ngân hàng từ. Mỗi từ CHỈ dùng MỘT lần. Câu phải tự nhiên, có ngữ cảnh rõ ràng.
- Phần 2 (makeSentence): 10 câu, mỗi câu cho MỘT từ tiếng Việt. Học viên tự đặt câu chứa từ đó. Từ phải là từ THÔNG DỤNG, dễ đặt câu.
- Phần 3 (sentenceTranslate): ƯU TIÊN dùng câu từ CÂU VÍ DỤ CỦA HỌC VIÊN ở trên, dịch sang tiếng Trung làm đề bài.
- Phần 4 (grammarSentences): yêu cầu học viên đặt câu dùng đúng điểm ngữ pháp.
- Phần 5 (essay): chủ đề liên quan đến nội dung unit này.
- TRẢ VỀ CHỈ JSON, không thêm giải thích gì khác.`;

    // 5. 调用 Gemini API
    loadingMsg.textContent = 'AI 正在出题中…（约 10-20 秒）';
    var resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':generateContent?key=' + geminiKey, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{
          parts: [{text: prompt}]
        }],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 8192
        }
      })
    });

    if (!resp.ok) {
      var errText = await resp.text();
      throw new Error('API Error ' + resp.status + ': ' + errText.substring(0, 200));
    }

    var data = await resp.json();
    var raw = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;

    if (!raw) throw new Error('Gemini 返回空内容');

    // 6. 解析 JSON（参考 vietnamese-words 更稳健的提取方式）
    var jsonStr = raw.trim();
    // 清除所有 markdown 代码块标记
    jsonStr = jsonStr.replace(/```json?\n?/g, '').replace(/```/g, '');
    // 提取最外层 JSON 对象
    var m = jsonStr.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('Gemini 返回中未找到 JSON 对象');
    jsonStr = m[0];
    // 修复常见问题
    jsonStr = jsonStr.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
    jsonStr = repairJSONString(jsonStr);
    currentTestPaper = JSON.parse(jsonStr);

    // 7. 渲染试卷
    loading.style.display = 'none';
    genArea.style.display = 'none';
    renderTestPaper();

  } catch(e) {
    loading.style.display = 'none';
    genArea.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '🤖 AI 生成试卷';
    var errMsg = e.message || '未知错误';
    console.error('生成试卷失败:', e, '\nraw length:', (raw||'').length, '\njsonStr length:', (jsonStr||'').length);
    if (errMsg.includes('API') || errMsg.includes('403') || errMsg.includes('401')) {
      alert('API Key 无效或已过期：\n' + errMsg + '\n\n请检查 Gemini API Key');
    } else if (errMsg.includes('JSON')) {
      alert('AI 返回格式有误（已记录诊断信息）：\n' + errMsg + '\n\n请稍后重试');
    } else {
      alert('生成试卷失败: ' + errMsg);
    }
  }
}

}

// 提交批改
async function submitTestForGrading() {
  if (!currentTestPaper || !getApiKey()) {
    alert('无法批改：缺少 Gemini API Key 或试卷数据');
    return;
  }
  var p = currentTestPaper;

  // 收集答案
  var answers = {
    fillBlanks: [],
    makeSentence: [],
    sentenceTranslate: [],
    grammarSentences: [],
    essay: ''
  };

  if (p.fillBlanks && p.fillBlanks.questions) {
    var wordsArr = p.fillBlanks.words || [];
    p.fillBlanks.questions.forEach(function(q, i){
      answers.fillBlanks.push({
        sentence: q.sentence || '',
        correctAnswer: q.blankWord || '',
        wordBank: wordsArr,
        userAnswer: (document.getElementById('test-fb-' + i) || {}).value || ''
      });
    });
  }
  if (p.makeSentence) p.makeSentence.forEach(function(q, i){
    answers.makeSentence.push({
      word: q.word || '',
      zh: q.zh || '',
      userAnswer: (document.getElementById('test-ms-' + i) || {}).value || ''
    });
  });
  if (p.sentenceTranslate) p.sentenceTranslate.forEach(function(q, i){
    answers.sentenceTranslate.push({
      question: q.zh || '',
      referenceAnswer: q.answerVi || '',
      userAnswer: (document.getElementById('test-st-' + i) || {}).value || ''
    });
  });
  if (p.grammarSentences) p.grammarSentences.forEach(function(q, i){
    answers.grammarSentences.push({
      task: q.task || '',
      grammar: q.grammar || '',
      userAnswer: (document.getElementById('test-gs-' + i) || {}).value || ''
    });
  });
  answers.essay = {
    topic: p.essay ? p.essay.topic : '',
    requirements: p.essay ? p.essay.requirements : '',
    userAnswer: (document.getElementById('test-essay') || {}).value || ''
  };

  // 计数
  var totalQ = answers.fillBlanks.length + answers.makeSentence.length 
    + answers.sentenceTranslate.length + answers.grammarSentences.length + (answers.essay.topic ? 1 : 0);
  var answeredQ = answers.fillBlanks.filter(function(a){return a.userAnswer;}).length
    + answers.makeSentence.filter(function(a){return a.userAnswer;}).length
    + answers.sentenceTranslate.filter(function(a){return a.userAnswer;}).length
    + answers.grammarSentences.filter(function(a){return a.userAnswer;}).length
    + (answers.essay.userAnswer ? 1 : 0);
  if (answeredQ === 0) {
    alert('请至少回答一道题再提交批改');
    return;
  }
  if (answeredQ < totalQ) {
    var left = totalQ - answeredQ;
    if (!confirm('还有 ' + left + ' 道题未作答，确定提交批改吗？\n\n已答：' + answeredQ + ' / ' + totalQ)) {
      return;
    }
  }

  // 禁用按钮
  var btn = document.querySelector('.btn-grade');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 批改中...';

  // 显示加载
  var resultDiv = document.getElementById('test-grading-result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<div style="text-align:center;padding:2rem"><div class="spinner" style="width:2rem;height:2rem;border-color:rgba(99,102,241,.3);border-top-color:#6366f1"></div><p style="color:var(--tx-m);margin-top:.8rem">AI 正在批改试卷...</p></div>';

  try {
    // 构建 Grading Prompt
    var gradingPrompt = `Bạn là giáo viên tiếng Việt. Hãy chấm điểm bài kiểm tra sau:

CẤU TRÚC BÀI KIỂM TRA:
- Phần 1 (Điền từ - chọn từ ngân hàng): 10 câu × 2đ = 20đ
- Phần 2 (Đặt câu với từ cho sẵn): 10 câu × 2đ = 20đ  
- Phần 3 (Dịch câu): 5 câu × 6đ = 30đ
- Phần 4 (Đặt câu ngữ pháp): 2 câu × 5đ = 10đ
- Phần 5 (Viết đoạn văn): 1 câu × 20đ = 20đ

BÀI LÀM CỦA HỌC VIÊN:
${JSON.stringify(answers, null, 2)}

Hãy trả về JSON:
{
  "totalScore": 85,
  "sectionScores": {"fillBlanks": 16, "makeSentence": 18, "sentenceTranslate": 24, "grammarSentences": 8, "essay": 16},
  "perQuestion": {
    "fillBlanks": [{"score": 2, "correct": true, "feedback": "Đúng"}, ...],
    "makeSentence": [{"score": 2, "feedback": "Câu đúng, dùng từ chính xác"}, ...],
    "sentenceTranslate": [{"score": 5, "feedback": "Câu đúng nhưng thiếu dấu..."}, ...],
    "grammarSentences": [{"score": 4, "feedback": "Ngữ pháp đúng, từ vựng tốt"}, ...],
    "essay": {"score": 16, "feedback": "..."}
  },
  "weaknesses": ["Từ vựng: hay nhầm lẫn giữa...", "Ngữ pháp: cần luyện thêm cấu trúc..."],
  "strengths": ["Phát âm tốt", "..."],
  "overallComment": "Nhận xét tổng quan (tiếng Việt, 2-3 câu)"
}

LƯU Ý:
- Phần 1: 2đ=đúng từ, đúng chính tả. 1đ=sai dấu/thiếu dấu. 0đ=sai từ.
- Phần 2: 2đ=câu đúng ngữ pháp, dùng từ chính xác, tự nhiên. 1đ=có lỗi nhỏ. 0đ=không dùng đúng từ hoặc sai hoàn toàn.
- Phần 3: Chấm theo ý nghĩa (không cần giống hệt reference). 6đ=hoàn hảo, 4-5đ=có lỗi nhỏ, 2-3đ=sai nhiều, 1đ=cố gắng.
- Phần 4: Đánh giá sử dụng đúng ngữ pháp + từ vựng + tự nhiên.
- Phần 5: 20đ=trên 100 từ, đúng chủ đề, ngữ pháp tốt, dùng đủ từ vựng unit. Giảm điểm theo lỗi.
- Nếu học viên không trả lời câu nào, cho 0 điểm câu đó.
- TRẢ VỀ CHỈ JSON.`;

    var resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':generateContent?key=' + getApiKey(), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{parts: [{text: gradingPrompt}]}],
        generationConfig: {temperature: 0.3, maxOutputTokens: 8192}
      })
    });

    if (!resp.ok) throw new Error('API Error ' + resp.status);

    var data = await resp.json();
    var raw = data.candidates[0].content.parts[0].text;
    var jsonStr = raw.trim();
    jsonStr = jsonStr.replace(/```json?\n?/g, '').replace(/```/g, '');
    var m2 = jsonStr.match(/\{[\s\S]*\}/);
    if (!m2) throw new Error('Gemini 批改返回中未找到 JSON 对象');
    jsonStr = m2[0];
    jsonStr = jsonStr.replace(/,\s*}/g, '}').replace(/,\s*]/g, ']');
    jsonStr = repairJSONString(jsonStr);
    var result = JSON.parse(jsonStr);

    // 渲染结果
    currentTestPaper._gradingResult = result;
    currentTestPaper._userAnswers = answers;
    renderGradingResult(result);

    // 保存到 Firebase + localStorage
    saveTestResult(result, answers);

    btn.disabled = false;
    btn.innerHTML = '📝 提交批改';

  } catch(e) {
    console.error('批改失败:', e);
    resultDiv.innerHTML = '<div style="color:var(--er);padding:1rem;background:#fef2f2;border-radius:8px">❌ 批改失败: ' + escHtml(e.message || '未知错误') + '</div>';
    btn.disabled = false;
    btn.innerHTML = '📝 重试批改';
  }
}

// 渲染批改结果
function renderGradingResult(result) {
  var div = document.getElementById('test-grading-result');
  div.style.display = 'block';
  var score = result.totalScore || 0;
  var cls = score >= 80 ? 'high' : score >= 60 ? 'mid' : 'low';

  var html = '<div class="result-card">';
  html += '<div class="result-header">';
  html += '<div><span class="result-score ' + cls + '">' + score + '</span><span style="font-size:1rem;color:var(--tx-m)"> / 100</span></div>';
  html += '<div style="font-size:.85rem;color:var(--tx-m)">' + new Date().toLocaleString('vi-VN') + '</div>';
  html += '</div>';

  // 各段分数
  if (result.sectionScores) {
    html += '<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem">';
    var labels = {fillBlanks: '📝 Điền từ', wordTranslate: '🔤 Dịch từ', sentenceTranslate: '📖 Dịch câu', grammarSentences: '📐 Ngữ pháp', essay: '✍️ Viết'};
    for(var k in result.sectionScores) {
      html += '<div style="font-size:.8rem;color:var(--tx-m)"><strong>' + (labels[k]||k) + ':</strong> ' + result.sectionScores[k] + 'đ</div>';
    }
    html += '</div>';
  }

  // 强项
  if (result.strengths && result.strengths.length) {
    html += '<div style="margin-bottom:.6rem"><strong style="color:var(--ok)">✅ Điểm mạnh:</strong></div>';
    result.strengths.forEach(function(s){html += '<div style="font-size:.83rem;color:var(--tx-m);margin-left:.5rem">• ' + escHtml(s) + '</div>';});
  }

  // 弱项
  if (result.weaknesses && result.weaknesses.length) {
    html += '<div class="result-weakness"><strong>⚠️ Cần cải thiện:</strong><br>';
    result.weaknesses.forEach(function(w){html += '• ' + escHtml(w) + '<br>';});
    html += '</div>';
  }

  // 总体评价
  if (result.overallComment) {
    html += '<div style="margin-top:.8rem;padding:.8rem;background:var(--bg);border-radius:8px;font-size:.87rem;line-height:1.7">';
    html += '<strong>💬 Nhận xét:</strong> ' + escHtml(result.overallComment) + '</div>';
  }

  html += '</div>';
  div.innerHTML = html;
  div.scrollIntoView({behavior: 'smooth'});
}

// 保存测试结果
async function saveTestResult(result, answers) {
  var fixedUserId = getFixedUserId();
  var dateStr = new Date().toISOString().slice(0, 10);
  var testRecord = {
    id: 'test_' + Date.now(),
    userId: fixedUserId,
    textbook: currentTextbook || '',
    unit: currentUnit || '',
    tabType: 'test',
    date: dateStr,
    score: result.totalScore || 0,
    totalPoints: 100,
    weaknesses: (result.weaknesses || []).join(', '),
    strengths: (result.strengths || []).join(', '),
    overallComment: result.overallComment || '',
    sectionScores: result.sectionScores || {},
    paper: currentTestPaper,
    answers: answers,
    timestamp: Date.now()
  };

  // 本地存储
  records.push(testRecord);
  var localKey = 'classroom_notes_records_' + (currentTextbook || 'unknown') + '_' + (currentUnit || 'unknown');
  localStorage.setItem(localKey, JSON.stringify(records));

  // Firebase
  try {
    var doc = await db.collection('cn_records').add({
      userId: fixedUserId,
      textbook: currentTextbook || '',
      unit: currentUnit || '',
      tabType: 'test',
      date: dateStr,
      score: result.totalScore || 0,
      weaknesses: result.weaknesses || [],
      strengths: result.strengths || [],
      overallComment: result.overallComment || '',
      sectionScores: result.sectionScores || {},
      paperTitle: currentTestPaper ? currentTestPaper.title : '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    testRecord.id = doc.id;
    localStorage.setItem(localKey, JSON.stringify(records));
  } catch(e) {
    console.error('保存测试结果到云端失败:', e);
  }

  // 刷新历史
  renderTestHistory();
}

// 渲染测试历史
function renderTestHistory() {
  var testRecs = records.filter(function(r){return r.tabType === 'test';});
  var list = document.getElementById('test-history-list');
  var historyDiv = document.getElementById('test-history');
  if (!list) return;

  if (!testRecs.length) {
    list.innerHTML = '<div class="test-empty-state"><div class="icon">📋</div><p>暂无测试记录</p><p style="font-size:.8rem">生成并完成一次测试后，结果将显示在此处</p></div>';
    historyDiv.style.display = 'block';
    return;
  }

  historyDiv.style.display = 'block';
  // 按时间倒序
  testRecs.sort(function(a,b){return (b.timestamp||0) - (a.timestamp||0);});

  list.innerHTML = '';
  testRecs.forEach(function(rec) {
    var score = rec.score || 0;
    var cls = score >= 80 ? 'high' : score >= 60 ? 'mid' : 'low';
    var card = document.createElement('div');
    card.className = 'test-history-card';
    card.onclick = function() {
      if (rec.paper && rec.answers) {
        currentTestPaper = rec.paper;
        if (rec._gradingResult) {
          currentTestPaper._gradingResult = rec._gradingResult;
        }
        renderTestPaper();
        var gradingDiv = document.getElementById('test-grading-result');
        if (gradingDiv && currentTestPaper._gradingResult) {
          renderGradingResult(currentTestPaper._gradingResult);
        }
      }
    };
    card.innerHTML = '<span class="history-score ' + cls + '">' + score + 'đ</span>' +
      '<span class="history-meta">' + (rec.date || '') + ' | ' + escHtml(rec.textbook || '') + ' ' + escHtml(rec.unit || '') +
      (rec.weaknesses ? ' | ⚠️ ' + escHtml(rec.weaknesses.substring(0, 50)) : '') + '</span>';
    list.appendChild(card);
  });
}

// 重新出题
function resetTest() {
  if (!confirm('确定要重新出题吗？当前答题内容将丢失。')) return;
  currentTestPaper = null;
  document.getElementById('test-paper-container').style.display = 'none';
  document.getElementById('test-paper-container').innerHTML = '';
  document.getElementById('test-gen-area').style.display = 'block';
  document.getElementById('btn-generate-test').disabled = false;
  document.getElementById('btn-generate-test').textContent = '🤖 AI 生成试卷';
  renderTestHistory();
}

  printWin.document.write('<style>');

  printWin.document.write('h2{color:#6366f1;margin-bottom:.5rem}');
  printWin.document.write('.meta{color:#64748b;font-size:.85rem;margin-bottom:1.5rem}');
  printWin.document.write('.section{border:1px solid #e2e8f0;border-radius:8px;padding:1rem;margin-bottom:1rem;page-break-inside:avoid}');

  printWin.document.write(container.innerHTML);
  printWin.document.write('</body></html>');
  printWin.document.close();
  setTimeout(function(){ printWin.print(); }, 500);
}

// 进入测试页签时刷新历史和显示生成按钮
var _origSwitchTab = switchTab;
switchTab = function(tab) {
  _origSwitchTab(tab);
  if (tab === 'test') {
    // 显示生成按钮
    document.getElementById('test-gen-area').style.display = currentTestPaper ? 'none' : 'block';
    document.getElementById('test-paper-container').style.display = currentTestPaper ? 'block' : 'none';
    document.getElementById('test-loading').style.display = 'none';
    renderTestHistory();
  }
};

// 修改 enterTest 按钮行为
var _origEnterTest = enterTest;
enterTest = function(){
  if(!currentTextbook||!currentUnit){alert('请先选择课本和单元');return;}
  // 检查是否有词汇数据
  if(!wordList||!wordList.length){
    alert('请先点击「同步提取」按钮加载单词');
    return;
  }
  switchTab('test');
};
